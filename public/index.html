<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit - ÖPNV in Echtzeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #ef4444;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        .dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .search-container {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-primary);
            padding: 1rem 0;
        }

        .trip-item {
            border-bottom: 1px solid rgba(156, 163, 175, 0.1);
        }

        #trip-itinerary {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .itinerary-item {
            padding: 0.25rem 0;
        }

        .cancelled {
            color: #9ca3af !important;
            text-decoration: line-through;
        }

        .realtime-on-time { color: var(--success); }
        .realtime-delay { color: var(--error); }

        .platform-changed {
            color: #f97316;
            font-weight: bold;
        }

        /* Wagenreihung */
        .wagon { display: inline-flex; flex-direction: column; align-items: center; font-size: 9px; }
        .wagon-body { border: 1.5px solid #4b5563; border-radius: 3px; padding: 2px 5px; font-weight: 700; font-family: 'JetBrains Mono', monospace; min-width: 28px; text-align: center; }
        .wagon-loco { background: #ef4444; color: white; border-color: #ef4444; }
        .wagon-1st  { background: #f59e0b22; border-color: #f59e0b; color: #f59e0b; }
        .wagon-2nd  { background: #3b82f622; border-color: #3b82f6; color: #9bb3cc; }
        .wagon-bistro { background: #22c55e22; border-color: #22c55e; color: #22c55e; }
        .wagon-disabled { background: #8b5cf622; border-color: #8b5cf6; color: #a78bfa; }

        /* Zugposition – Fortschrittsbalken */
        .trip-progress-bar { height: 4px; background: #27272a; border-radius: 2px; overflow: hidden; }
        .trip-progress-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #f97316); border-radius: 2px; transition: width 1s ease; }

        /* Zugverfolgung Karte */
        #train-map { height: 280px; border-radius: 12px; overflow: hidden; z-index: 1; }
        .train-marker-icon {
            background: #ef4444; color: white; border-radius: 50%;
            width: 28px; height: 28px; display: flex; align-items: center;
            justify-content: center; font-size: 13px; border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* Umstieg-Ampel */
        .transfer-ok     { color: #22c55e; }
        .transfer-tight  { color: #f59e0b; }
        .transfer-risky  { color: #ef4444; }

        .detail-view {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-primary);
            z-index: 100;
            overflow-y: auto;
        }

        .detail-view.active { display: block; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

        .search-as-you-type-results { max-height: 300px; overflow-y: auto; }

        .thin-prognosis { font-weight: 300; }
        .precision-time { font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* ── Kompakter Fahrtverlauf (bahn.expert-Stil) ── */
        .itinerary-line { display: none; } /* wird nicht mehr gebraucht */

        .itinerary-item {
            display: grid;
            grid-template-columns: 130px 14px 1fr;
            align-items: center;
            min-height: 32px;
            column-gap: 6px;
            padding: 1px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 11px;
            line-height: 1.3;
        }
        .itinerary-item:last-child { border-bottom: none; }
        .itinerary-item.is-cancelled { opacity: 0.4; text-decoration: line-through; }
        .itinerary-item.is-additional { border-left: 2px solid #22c55e; }

        /* Zeitleiste-Spalte */
        .itin-dot-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }
        .itin-seg { width: 2px; flex: 1; background: #4b5563; min-height: 6px; }
        .itin-dot {
            width: 8px; height: 8px; border-radius: 50%;
            border: 2px solid #09090b;
            flex-shrink: 0;
        }
        .itin-dot.terminus { width: 10px; height: 10px; }
        .itin-dot.passed   { background: #4b5563; }

        /* Zeiten-Spalte */
        .itin-times {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }
        .itin-time-row {
            display: flex;
            align-items: baseline;
            gap: 4px;
            justify-content: flex-end;
            width: 100%;
        }
        .itin-label  { font-size: 8px; color: #4b5563; text-transform: uppercase; min-width: 12px; }
        .itin-sched  { color: #9ca3af; min-width: 38px; text-align: right; }
        .itin-actual { font-weight: 700; }
        .itin-delay  { font-size: 9px; font-weight: 700; padding: 0 2px; border-radius: 2px; }
        .delay-pos  { color: #f87171; }   /* rot – Verspätung  */
        .delay-neg  { color: #60a5fa; }   /* blau – Verfrühung */
        .delay-zero { color: #4ade80; }   /* grün – pünktlich  */

        /* Stationsname */
        .itin-name {
            font-size: 11.5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .itin-name.terminus { font-weight: 600; font-size: 12px; }
        .itin-name.passed   { opacity: 0.5; }

        .itin-platform { font-size: 9px; color: #6b7280; font-family: 'JetBrains Mono', monospace; margin-left: 4px; }
        .itin-platform.changed { color: #f97316; font-weight: 700; }

        .itin-remark { font-size: 9px; color: #ef4444; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

        #trip-itinerary { max-height: 62vh; overflow-y: auto; }
        #detail-trip-id { font-size: 0.76rem; font-weight: 700; }
        .itinerary-info { font-size: 0.73rem; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { zinc: { 950: '#09090b' } } } }
        }
    </script>
</head>
<body class="dark transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter italic">dilaeit</h1>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end text-xs mono text-gray-500">
                    <span id="current-date">--.--.----</span>
                    <span id="current-time" class="text-sm font-bold text-gray-300">--:--:--</span>
                </div>
                <button id="api-base-btn" class="hidden px-3 py-2 rounded-xl bg-gray-100 dark:bg-zinc-900 text-xs font-semibold hover:text-red-500 transition-colors">
                    Backend-URL
                </button>
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-zinc-900 hover:scale-110 transition-transform">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>
            </div>
        </header>

        <div class="search-container space-y-4">
            <div class="flex flex-col gap-3">
                <!-- Quelle-Umschalter -->
                <div class="flex bg-gray-100 dark:bg-zinc-900 p-1 rounded-xl self-start">
                    <button id="source-vrr" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white shadow-sm">VRR</button>
                    <button id="source-db" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-gray-500 hover:text-gray-300">Deutsche Bahn</button>
                </div>
                
                <div class="flex gap-2">
                    <div class="relative group flex-1">
                        <input 
                            type="text" 
                            id="station-search" 
                            placeholder="Haltestelle suchen (VRR)..." 
                            autocomplete="off"
                            class="w-full bg-gray-100 dark:bg-zinc-900 border-none rounded-2xl py-5 pl-14 pr-4 text-lg focus:ring-2 focus:ring-red-500/50 transition-all outline-none shadow-sm"
                        >
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 text-xl"></i>
                        <div id="search-results" class="absolute top-full left-0 w-full mt-3 bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl overflow-hidden hidden z-50 border border-gray-100 dark:border-zinc-800 search-as-you-type-results"></div>
                    </div>
                    <a href="trip-search.html" class="px-4 py-5 bg-red-600 text-white rounded-2xl font-semibold hover:bg-red-500 transition flex items-center gap-2 shadow-lg shadow-red-600/20">
                        <i class="fas fa-train"></i>
                        <span class="hidden md:inline">Zug-/Busnummer</span>
                        <span class="md:hidden">Nummer</span>
                    </a>
                </div>
            </div>

            <div class="flex gap-3 items-center overflow-x-auto pb-2 no-scrollbar">
                <div class="flex items-center bg-gray-100 dark:bg-zinc-900 rounded-xl px-3 py-2 gap-2">
                    <i class="far fa-calendar text-gray-400 text-xs"></i>
                    <input type="date" id="query-date" class="bg-transparent border-none text-xs outline-none focus:ring-0 w-28">
                </div>
                <div class="flex items-center bg-gray-100 dark:bg-zinc-900 rounded-xl px-3 py-2 gap-2">
                    <i class="far fa-clock text-gray-400 text-xs"></i>
                    <input type="time" id="query-time" class="bg-transparent border-none text-xs outline-none focus:ring-0 w-20">
                </div>
                <button id="reset-query" class="px-4 py-2 bg-gray-100 dark:bg-zinc-900 rounded-xl text-xs font-medium hover:text-red-500 transition-colors">Jetzt</button>
            </div>
        </div>

        <div class="mt-6 p-4 rounded-2xl bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 space-y-3">
            <h3 class="text-sm font-bold uppercase tracking-wider text-gray-600 dark:text-gray-300">Verbindungssuche</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                <div class="relative">
                    <input id="route-start" type="text" placeholder="Start" class="w-full rounded-xl p-2 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700" />
                    <div id="route-start-results" class="absolute top-full left-0 w-full mt-1 bg-white dark:bg-zinc-900 rounded-xl shadow-2xl overflow-hidden hidden z-50 border border-gray-100 dark:border-zinc-800 max-h-60 overflow-y-auto"></div>
                </div>
                <div class="relative">
                    <input id="route-via" type="text" placeholder="Via (optional)" class="w-full rounded-xl p-2 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700" />
                    <div id="route-via-results" class="absolute top-full left-0 w-full mt-1 bg-white dark:bg-zinc-900 rounded-xl shadow-2xl overflow-hidden hidden z-50 border border-gray-100 dark:border-zinc-800 max-h-60 overflow-y-auto"></div>
                </div>
                <div class="relative">
                    <input id="route-dest" type="text" placeholder="Ziel" class="w-full rounded-xl p-2 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700" />
                    <div id="route-dest-results" class="absolute top-full left-0 w-full mt-1 bg-white dark:bg-zinc-900 rounded-xl shadow-2xl overflow-hidden hidden z-50 border border-gray-100 dark:border-zinc-800 max-h-60 overflow-y-auto"></div>
                </div>
                <button id="route-search" class="w-full rounded-xl px-4 py-2 bg-red-600 text-white font-semibold hover:bg-red-500 transition">Suchen</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                <input id="route-date" type="date" class="w-full rounded-xl p-2 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700" />
                <input id="route-time" type="time" class="w-full rounded-xl p-2 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700" />
            </div>
            <div id="route-results" class="mt-2 text-sm text-gray-600 dark:text-gray-300"></div>
        </div>

        <div id="trip-archive" class="mt-6 rounded-2xl bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 cursor-pointer select-none" onclick="toggleArchive()">
                <div class="flex items-center gap-2">
                    <i id="archive-chevron" class="fas fa-chevron-right text-[10px] text-gray-400 transition-transform duration-200"></i>
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-600 dark:text-gray-300">Archiv letzte Fahrten (48h)</h3>
                </div>
                <button onclick="event.stopPropagation(); clearArchive()" class="text-[10px] text-gray-400 hover:text-red-500 transition-colors px-2 py-1 rounded-lg hover:bg-gray-200 dark:hover:bg-zinc-700">
                    <i class="fas fa-trash-alt mr-1"></i>Leeren
                </button>
            </div>
            <div id="archive-list" class="hidden px-4 pb-4 space-y-2 text-sm text-gray-700 dark:text-gray-200"></div>
        </div>

        <div id="board-container" class="mt-8 space-y-6">
            <div id="board-header" class="hidden flex justify-between items-end border-b border-gray-100 dark:border-zinc-800 pb-4">
                <div>
                    <h2 id="station-display-name" class="text-2xl font-bold tracking-tight"></h2>
                    <p id="board-type" class="text-xs text-gray-500 uppercase tracking-widest mt-1">Abfahrtstafel</p>
                </div>
                <div id="refresh-indicator" class="text-[10px] text-gray-500 mono flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    LIVE REFRESH
                </div>
            </div>
            <!-- Linienfilter – wird nach erstem Laden befüllt -->
            <div id="line-filter-bar" class="hidden flex flex-wrap gap-2 pb-2"></div>

            <div id="departures-list" class="divide-y divide-gray-100 dark:divide-zinc-900">
                <div class="flex flex-col items-center justify-center py-32 text-gray-500 space-y-6 opacity-40">
                    <div class="relative">
                        <i class="fas fa-train text-7xl"></i>
                        <i class="fas fa-search absolute -bottom-2 -right-2 text-2xl"></i>
                    </div>
                    <p class="text-sm font-medium">Suche nach einer Station, um Live-Abfahrten zu sehen.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="detail-view" class="detail-view">
        <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen flex flex-col">
            <header class="flex items-center gap-3 mb-4">
                <button id="close-detail" class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-zinc-900 flex items-center justify-center hover:scale-105 transition-transform">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button id="reload-trip" class="px-3 py-2 rounded-xl bg-blue-600 text-white text-xs font-semibold hover:bg-blue-500 transition">Neu laden</button>
                <div class="flex-1">
                    <div class="flex items-center gap-3">
                        <span id="detail-line-badge" class="px-3 py-1 rounded-lg text-xs font-black bg-red-600 text-white italic">--</span>
                        <h2 id="detail-train-direction" class="text-xl font-bold truncate">--</h2>
                    </div>
                    <p id="detail-operator" class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest">--</p>
                </div>
                <!-- Push-Benachrichtigung abonnieren -->
                <button id="push-subscribe-btn" title="Fahrt beobachten"
                    class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-700 flex items-center justify-center hover:border-yellow-400 transition-colors text-gray-400 hover:text-yellow-400">
                    <i class="far fa-bell"></i>
                </button>
            </header>

            <!-- Aktuelle Zugposition (Fortschrittsbalken) -->
            <div id="trip-position-bar" class="hidden mb-4 p-3 rounded-xl bg-zinc-900 border border-zinc-800 text-xs">
                <div class="flex justify-between text-gray-400 mb-2">
                    <span id="pos-origin" class="truncate max-w-[40%]">--</span>
                    <span id="pos-status" class="text-yellow-400 font-bold text-center flex-1"></span>
                    <span id="pos-dest" class="truncate max-w-[40%] text-right">--</span>
                </div>
                <div class="trip-progress-bar">
                    <div id="pos-fill" class="trip-progress-fill" style="width:0%"></div>
                </div>
                <div id="pos-next" class="mt-2 text-[10px] text-gray-500"></div>
            </div>

            <!-- Wagenreihung -->
            <div id="wagon-section" class="hidden mb-4 p-3 rounded-xl bg-zinc-900 border border-zinc-800">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400"><i class="fas fa-train-subway mr-1"></i>Wagenreihung</span>
                    <span id="wagon-source" class="text-[9px] text-gray-600"></span>
                </div>
                <div id="wagon-display" class="flex gap-1 overflow-x-auto pb-1 flex-wrap"></div>
                <div class="flex gap-3 mt-2 flex-wrap" id="wagon-legend"></div>
            </div>

            <div class="flex-1 relative" id="panel-itinerary">
                <div id="trip-itinerary" class="relative z-10"></div>
            </div>

            <footer class="mt-8 pt-4 border-t border-gray-100 dark:border-zinc-900">
                <!-- Tabs: Fahrtverlauf / Historische Pünktlichkeit / Zuglauf -->
                <div class="flex gap-1 mb-4">
                    <button onclick="switchDetailTab('itinerary')" id="tab-itinerary"
                        class="detail-tab px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors bg-red-600 text-white">
                        Fahrtverlauf
                    </button>
                    <button onclick="switchDetailTab('map')" id="tab-map"
                        class="detail-tab px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors bg-zinc-800 text-gray-400 hover:text-white">
                        <i class="fas fa-map mr-1"></i>Karte
                    </button>
                    <button onclick="switchDetailTab('punctuality')" id="tab-punctuality"
                        class="detail-tab px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors bg-zinc-800 text-gray-400 hover:text-white">
                        Pünktlichkeit
                    </button>
                    <button onclick="switchDetailTab('zuglauf')" id="tab-zuglauf"
                        class="detail-tab px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors bg-zinc-800 text-gray-400 hover:text-white">
                        Zuglauf
                    </button>
                </div>

                <!-- Karte -->
                <div id="panel-map" class="hidden">
                    <div id="train-map" class="w-full mb-2"></div>
                    <div id="map-status" class="text-[10px] text-gray-500 text-center"></div>
                </div>

                <!-- Historische Pünktlichkeit -->
                <div id="panel-punctuality" class="hidden">
                    <div id="punctuality-content" class="text-xs text-gray-400">
                        <i class="fas fa-spinner fa-spin mr-1"></i>Lade Statistiken...
                    </div>
                </div>

                <!-- Zuglauf-Übersicht -->
                <div id="panel-zuglauf" class="hidden">
                    <div id="zuglauf-content" class="text-xs text-gray-400">
                        <i class="fas fa-spinner fa-spin mr-1"></i>Lade Zuglauf...
                    </div>
                </div>

                <div class="flex justify-between items-center text-[10px] text-gray-500 mono mt-4 pt-4 border-t border-zinc-900">
                    <span id="detail-trip-id">TRIP: --</span>
                    <span class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        ECHTZEIT AKTIV
                    </span>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // ─── Konfiguration ───────────────────────────────────────────────────────────
        // Abfahrtstafel + Details nutzen unseren Proxy (/api/*), der VRR OpenService nutzt.
        // Verbindungssuche bleibt über DB (v6.db.transport.rest), damit ganz Deutschland abgedeckt ist.
        //
        // Wenn du die Seite statisch über GitHub Pages hostest, brauchst du zusätzlich eine Backend-URL.
        // Du kannst sie im UI unter "Backend-URL" setzen (wird in localStorage gespeichert).
        const DEFAULT_REMOTE_API_BASE = ''; // optional hart setzen, z.B. 'https://dilaeit.onrender.com'
        const API_BASE = (() => {
            const saved = localStorage.getItem('dilaeit_api_base');
            if (saved) return saved;
            if (DEFAULT_REMOTE_API_BASE) return DEFAULT_REMOTE_API_BASE;
            // Wenn wir auf einem Host laufen, der selbst /api/health hat, nutzen wir same-origin.
            // (z.B. Render/localhost)
            return '';
        })();

        function setApiBaseFromPrompt() {
            const current = localStorage.getItem('dilaeit_api_base') || DEFAULT_REMOTE_API_BASE || '';
            const next = prompt('Backend-URL (z.B. https://dein-service.onrender.com). Leer lassen = same-origin.', current);
            if (next === null) return;
            const trimmed = next.trim();
            if (!trimmed) {
                localStorage.removeItem('dilaeit_api_base');
            } else {
                localStorage.setItem('dilaeit_api_base', trimmed.replace(/\/+$/, ''));
            }
            location.reload();
        }
        const REFRESH_INTERVAL = 60000;

        // ─── FIX 1: Rate-Limit-Cooldown von 1500 ms → 200 ms ────────────────────────
        // War der Hauptgrund: jeder Klick auf eine Station blockierte 1,5 Sekunden.
        const REQUEST_COOLDOWN_MS = 200;

        let state = {
            currentStation:  null,
            currentRegion:   'NRW',
            departures:      [],
            refreshTimer:    null,
            searchTimer:     null,
            lastSearchQuery: '',
            isRateLimited:   false,
            lastRequestTime: 0,
            searchCache:     new Map(),
            // FIX 2: Departures-Cache – gleiche Station+Zeit nicht nochmal fetchen
            departureCache:  new Map(),
            source:          'VRR' // Standardquelle für die Suche
        };

        const $ = id => document.getElementById(id);

        // ─── FIX 3: Schnellster API-Endpunkt wird gemerkt und zuerst verwendet ───────
        // Statt jedes Mal alle Endpunkte der Reihe nach zu probieren,
        // speichern wir welcher zuletzt funktioniert hat.
        let fastestDepartureApi = null;

        // VRR-Zugriff passiert serverseitig über /api; wir brauchen keine DNS-Workarounds im Browser.

        function setSource(src) {
            state.source = src;
            const vrrBtn = $('source-vrr');
            const dbBtn = $('source-db');
            const input = $('station-search');

            if (src === 'VRR') {
                vrrBtn.className = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white shadow-sm';
                dbBtn.className = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-gray-500 hover:text-gray-300';
                input.placeholder = 'Haltestelle suchen (VRR)...';
            } else {
                dbBtn.className = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white shadow-sm';
                vrrBtn.className = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-gray-500 hover:text-gray-300';
                input.placeholder = 'Haltestelle suchen (Deutsche Bahn)...';
            }
            
            // Suche zurücksetzen
            input.value = '';
            $('search-results').innerHTML = '';
            $('search-results').classList.add('hidden');
            state.lastSearchQuery = '';
        }

        function detectRegion(stationName) {
            if (!stationName) return 'NATIONAL';
            const name = stationName.toLowerCase();
            const nrwKeywords = ['düsseldorf','duisburg','essen','bochum','dortmund','gelsenkirchen',
                'mönchengladbach','wuppertal','oberhausen','krefeld','hagen','hamm','mülheim',
                'leverkusen','solingen','neuss','herne','rheydt','viersen','korschenbroich',
                'kleinenbroich','büttgen','jüchen','erkelenz','hückelhoven','baal','wassenberg',
                'wegberg','mg','moenchengladbach',
                // Spezifische NRW-Orte / Schreibvarianten
                'neersen','willich'];
            if (nrwKeywords.some(k => name.includes(k))) return 'NRW';
            // Stationsnamen enden oft mit Zusatz wie "(Westf)" oder "(Westfalen)"
            if (/\((?:westf|westfalen)\)/i.test(stationName)) return 'NRW';
            if (name.includes('berlin') || name.includes('potsdam') || name.includes('cottbus')) return 'BERLIN';
            if (name.includes('hamburg') || name.includes('lübeck') || name.includes('kiel')) return 'HAMBURG';
            return 'NATIONAL';
        }

        function calculateSimilarity(query, target) {
            const q = query.toLowerCase();
            const t = target.toLowerCase();
            if (t.includes(q)) return 1.0;
            const qWords = q.split(/[\s,.-]+/).filter(w => w.length >= 2);
            if (qWords.length === 0) return 0;
            let matches = 0;
            qWords.forEach(w => { if (t.includes(w)) matches++; });
            let boost = t.startsWith(qWords[0]) ? 0.2 : 0;
            return Math.min(1.0, (matches / qWords.length) + boost);
        }

        // ─── Init ────────────────────────────────────────────────────────────────────
        function init() {
            setupClock();
            setupDefaultDateTime();
            attachEventListeners();
            renderArchive();
            // Button "Backend-URL" nur anzeigen, wenn wir statisch laufen (kein /api/health).
            // Dann kann man die Backend-URL einmalig speichern.
            (async () => {
                const btn = document.getElementById('api-base-btn');
                if (!btn) return;
                try {
                    const r = await fetch(`${API_BASE}/api/health`, { cache: 'no-store' });
                    if (r.ok) {
                        btn.classList.add('hidden');
                    } else {
                        btn.classList.remove('hidden');
                    }
                } catch {
                    btn.classList.remove('hidden');
                }
            })();
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && state.currentStation && !state.isRateLimited) {
                    refreshDepartures();
                }
            });
        }

        function setupClock() {
            const update = () => {
                const now = new Date();
                $('current-date').textContent = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
                $('current-time').textContent = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            };
            setInterval(update, 1000);
            update();
        }

        function setupDefaultDateTime() {
            const now = new Date();
            const year  = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day   = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const mins  = String(now.getMinutes()).padStart(2, '0');
            $('query-date').value = `${year}-${month}-${day}`;
            $('query-time').value = `${hours}:${mins}`;
        }

        function attachEventListeners() {
            $('station-search').addEventListener('input', e => handleSearchInput(e.target.value));
            $('station-search').addEventListener('focus', () => {
                if ($('search-results').children.length > 0) $('search-results').classList.remove('hidden');
            });

            // Quelle-Umschalter
            $('source-vrr').addEventListener('click', () => setSource('VRR'));
            $('source-db').addEventListener('click', () => setSource('DB'));

            $('reset-query').addEventListener('click', () => {
                setupDefaultDateTime();
                if (state.currentStation) refreshDepartures();
            });
            $('theme-toggle').addEventListener('click', () => document.body.classList.toggle('dark'));
            const apiBtn = document.getElementById('api-base-btn');
            if (apiBtn) apiBtn.addEventListener('click', setApiBaseFromPrompt);
            $('close-detail').addEventListener('click', () => {
                $('detail-view').classList.remove('active');
                $('wagon-section').classList.add('hidden');
                $('trip-position-bar').classList.add('hidden');
                if (mapRefreshTimer) { clearInterval(mapRefreshTimer); mapRefreshTimer = null; }
                currentDetailStopovers = null;
                switchDetailTab('itinerary');
            });
            $('push-subscribe-btn').addEventListener('click', async () => {
                const granted = await requestNotificationPermission();
                if (!granted) {
                    showLocalNotification('Benachrichtigungen blockiert', 'Bitte erlaube Benachrichtigungen in den Browser-Einstellungen.');
                    return;
                }
                if (currentTripDetail) {
                    toggleWatch(currentTripDetail);
                    // Sofort prüfen damit Nutzer Feedback bekommt
                    if (isWatched(makeTripKey(currentTripDetail))) {
                        showLocalNotification(
                            `${currentTripDetail.line?.name} wird beobachtet`,
                            'Du erhältst eine Benachrichtigung bei ≥3 Min Verspätung.'
                        );
                    }
                }
            });
            document.addEventListener('click', e => {
                if (!e.target.closest('.search-container')) $('search-results').classList.add('hidden');
            });
            $('query-date').addEventListener('change', () => state.currentStation && refreshDepartures());
            $('query-time').addEventListener('change', () => state.currentStation && refreshDepartures());
            $('route-search').addEventListener('click', performRouteSearch);
            $('reload-trip').addEventListener('click', async () => {
                if (!currentTripDetail) return;
                $('trip-itinerary').innerHTML = `<div class="py-20 text-center"><i class="fas fa-circle-notch fa-spin text-red-600 text-2xl"></i></div>`;
                await showTripDetails(currentTripDetail);
            });
        }

        // ─── Suche ───────────────────────────────────────────────────────────────────
        let searchSessionId = 0;
        let currentTripDetail = null;
        let routeStations = { start: null, via: null, dest: null };

        function createRouteSearchHandler(fieldId) {
            return async function(val) {
                const query = val.trim();
                const resultsContainer = $(`${fieldId}-results`);
                if (query.length < 2) { resultsContainer.classList.add('hidden'); return; }
                resultsContainer.innerHTML = '<div class="px-3 py-2 text-sm text-gray-500 italic"><i class="fas fa-spinner fa-spin mr-2"></i>Suche...</div>';
                resultsContainer.classList.remove('hidden');
                try {
                    const res = await fetch(`https://v6.db.transport.rest/locations?query=${encodeURIComponent(query)}&results=10`);
                    if (!res.ok) { resultsContainer.innerHTML = '<div class="px-3 py-2 text-sm text-red-500">Fehler bei der Suche</div>'; return; }
                    const data = await res.json();
                    let results = Array.isArray(data) ? data : (data.results || data.locations || []);
                    results = results
                        .filter(r => r && (r.name || r.stop?.name) && (r.id || r.extId || r.stop?.id))
                        .map(r => ({ name: r.name || r.stop?.name, id: r.id || r.extId || r.stop?.id, type: r.type || 'station' }))
                        .slice(0, 8);
                    if (results.length === 0) { resultsContainer.innerHTML = '<div class="px-3 py-2 text-sm text-gray-500">Keine Stationen gefunden</div>'; return; }
                    resultsContainer.innerHTML = '';
                    results.forEach(res => {
                        const item = document.createElement('div');
                        item.className = 'px-3 py-2 hover:bg-gray-50 dark:hover:bg-zinc-800 cursor-pointer border-b border-gray-100 dark:border-zinc-800 last:border-0 transition-colors';
                        item.innerHTML = `<div class="text-sm font-semibold">${res.name}</div>`;
                        item.onclick = () => {
                            $(fieldId).value = res.name;
                            routeStations[fieldId.replace('route-', '')] = res;
                            resultsContainer.classList.add('hidden');
                        };
                        resultsContainer.appendChild(item);
                    });
                } catch (e) {
                    resultsContainer.innerHTML = '<div class="px-3 py-2 text-sm text-red-500">Suche fehlgeschlagen</div>';
                }
            };
        }

        const routeStartHandler = createRouteSearchHandler('route-start');
        const routeViaHandler   = createRouteSearchHandler('route-via');
        const routeDestHandler  = createRouteSearchHandler('route-dest');

        $('route-start').addEventListener('focus', () => routeStartHandler($('route-start').value));
        $('route-start').addEventListener('input', e => routeStartHandler(e.target.value));
        $('route-via').addEventListener('focus',   () => routeViaHandler($('route-via').value));
        $('route-via').addEventListener('input',   e => routeViaHandler(e.target.value));
        $('route-dest').addEventListener('focus',  () => routeDestHandler($('route-dest').value));
        $('route-dest').addEventListener('input',  e => routeDestHandler(e.target.value));

        document.addEventListener('click', e => {
            if (!e.target.closest('.route-input-container')) {
                $('route-start-results').classList.add('hidden');
                $('route-via-results').classList.add('hidden');
                $('route-dest-results').classList.add('hidden');
            }
        });

        // Stationssuche (Abfahrtstafel): VRR Stopfinder via Backend
        let activeSearchController = null; // laufenden Fetch abbrechen wenn neue Eingabe kommt

        async function handleSearchInput(val) {
            const query = val.trim();
            if (query.length < 2) {
                state.lastSearchQuery = '';
                $('search-results').classList.add('hidden');
                return;
            }

            // Cache-Hit: sofort anzeigen, kein Netzwerk, kein Debounce
            const cacheKey = query.toLowerCase();
            if (state.searchCache.has(cacheKey)) {
                state.lastSearchQuery = query;
                renderSearchResults(state.searchCache.get(cacheKey));
                return;
            }

            // Vorherigen laufenden Fetch abbrechen – verhindert veraltete Ergebnisse
            if (activeSearchController) activeSearchController.abort();

            clearTimeout(state.searchTimer);
            state.searchTimer = setTimeout(async () => {
                // BUG 1 FIX: lastSearchQuery erst nach erfolgreichem Fetch setzen,
                // nicht vorher – sonst blockiert ein Fehler alle Retry-Versuche
                // für denselben Suchbegriff.
                searchSessionId += 1;
                const thisSearchId = searchSessionId;

                const container = $('search-results');
                container.innerHTML = '<div class="px-5 py-4 text-sm text-gray-500 italic"><i class="fas fa-spinner fa-spin mr-2"></i>Suche...</div>';
                container.classList.remove('hidden');

                // BUG 2 FIX: eigener AbortController pro Fetch-Aufruf, nicht ein
                // globaler Timeout – so wird der laufende Request sofort gecancelt
                // sobald der User weitertippt, statt auf Timeout zu warten.
                let abortedByTimeout = false;
                activeSearchController = new AbortController();
                const timeoutId = setTimeout(() => {
                    abortedByTimeout = true;
                    activeSearchController?.abort();
                }, 8000);
                let didRetry = false;

                try {
                    const apiPath = state.source === 'DB' ? '/api/db/locations' : '/api/locations';
                    const res = await fetch(`${API_BASE}${apiPath}?query=${encodeURIComponent(query)}`, { signal: activeSearchController.signal });
                    clearTimeout(timeoutId);

                    // BUG 3 FIX: Session-Check VOR dem JSON-Parse, nicht danach –
                    // verhindert dass ein langsamer Fetch die Ergebnisse eines
                    // schnelleren neueren Fetches überschreibt.
                    if (searchSessionId !== thisSearchId) return;
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const data = await res.json();
                    if (searchSessionId !== thisSearchId) return;

                    let results = data?.locations || [];
                    results = results
                        .filter(r => r && r.name && r.id)
                        .map(r => {
                            const name = r.name;
                            const id   = r.id;
                            return { ...r, name, id,
                                sourceRegion: r.source || 'NRW',
                                score: calculateSimilarity(query, name) * 100
                            };
                        })
                        .sort((a, b) => {
                            const aExact = a.name.toLowerCase() === cacheKey;
                            const bExact = b.name.toLowerCase() === cacheKey;
                            if (aExact !== bExact) return bExact ? 1 : -1;
                            return b.score - a.score;
                        })
                        .slice(0, 12);

                    if (results.length === 0) throw new Error('No results');

                    // Erst jetzt lastSearchQuery setzen – nur bei Erfolg
                    state.lastSearchQuery = query;
                    state.searchCache.set(cacheKey, results);
                    renderSearchResults(results);
                } catch (err) {
                    clearTimeout(timeoutId);
                    // Abgebrochene Requests (durch neue Eingabe) still ignorieren.
                    // Timeout-Abort zeigen wir aber als Meldung, sonst wirkt die Suche "hängen geblieben".
                    if (err.name === 'AbortError') {
                        if (abortedByTimeout && searchSessionId === thisSearchId) {
                            $('search-results').innerHTML =
                                `<div class="px-5 py-4 text-sm text-red-500 italic">
                                    Suche ist zeitüberschritten. ${didRetry ? 'Bitte manuell erneut versuchen.' : 'Retry läuft…'}
                                </div>`;
                            if (!didRetry) {
                                didRetry = true;
                                setTimeout(() => {
                                    // Nur retryen, wenn User den gleichen Suchbegriff noch im Feld hat.
                                    const current = $('station-search').value.trim().toLowerCase();
                                    if (current === cacheKey && searchSessionId === thisSearchId) {
                                        handleSearchInput(query);
                                    }
                                }, 1200);
                            }
                        }
                        return;
                    }
                    if (searchSessionId !== thisSearchId) return;
                    // lastSearchQuery NICHT setzen bei Fehler → nächster Versuch
                    // mit gleichem Begriff wird nicht blockiert
                    state.lastSearchQuery = '';
                    $('search-results').innerHTML =
                        `<div class="px-5 py-4 text-sm text-red-500 italic">
                            Suche fehlgeschlagen. Bitte kurz warten und erneut versuchen.
                        </div>`;
                }
            }, 200);
        }

        function renderSearchResults(results) {
            const container = $('search-results');
            container.innerHTML = '';
            if (results.length === 0) {
                container.innerHTML = `<div class="px-5 py-4 text-sm text-red-500 italic">Keine Station gefunden.</div>`;
                return;
            }
            results.forEach(res => {
                const item = document.createElement('div');
                item.className = 'px-5 py-3 hover:bg-gray-50 dark:hover:bg-zinc-800 cursor-pointer border-b border-gray-100 dark:border-zinc-800 last:border-0 transition-colors flex items-center gap-3';
                const icon = (res.type === 'stop' || res.type === 'station') ? 'fa-train' : 'fa-map-marker-alt';
                item.innerHTML = `
                    <i class="fas ${icon} text-gray-400 w-5"></i>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-semibold truncate">${res.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-wider">${res.sourceRegion || 'DEUTSCHLAND'}</div>
                    </div>`;
                item.onclick = () => {
                    state.currentStation = res;
                    state.currentRegion  = detectRegion(res.name);
                    activeLineFilter = null;   // Filter bei neuer Station zurücksetzen
                    $('station-search').value = res.name;
                    container.classList.add('hidden');
                    $('board-header').classList.remove('hidden');
                    $('station-display-name').textContent = res.name;
                    refreshDepartures();
                    if (state.refreshTimer) clearInterval(state.refreshTimer);
                    state.refreshTimer = setInterval(refreshDepartures, REFRESH_INTERVAL);
                };
                container.appendChild(item);
            });
        }

        // ─── Abfahrtstafel ───────────────────────────────────────────────────────────
        // Aktive Linien – null = alle, Set = nur ausgewählte
        let activeLineFilter = null;

        // Baut den Linienfilter aus state.departures und rendert die Chips
        function buildLineFilter() {
            const bar = $('line-filter-bar');
            if (!bar) return;

            // Alle eindeutigen Linien aus den Abfahrten sammeln, Reihenfolge beibehalten
            const seen = new Map();
            state.departures.forEach(d => {
                const name = d.line?.name;
                if (name && !seen.has(name)) seen.set(name, d.line);
            });

            // Wenn nur eine Linie, Filter ausblenden – nicht nötig
            if (seen.size <= 1) {
                bar.classList.add('hidden');
                activeLineFilter = null;
                return;
            }

            // Beim ersten Aufbau: alle Linien aktiv
            if (activeLineFilter === null) {
                activeLineFilter = new Set(seen.keys());
            } else {
                // Neue Linien, die noch nicht im Filter sind, automatisch aktivieren
                seen.forEach((_, name) => {
                    if (!activeLineFilter.has(name) && activeLineFilter !== null) {
                        // Nur hinzufügen wenn vorher alle aktiv waren (kein gezielter Filter)
                    }
                });
            }

            bar.innerHTML = '';
            bar.classList.remove('hidden');

            // "Alle"-Toggle
            const allActive = activeLineFilter.size === seen.size;
            const allBtn = document.createElement('button');
            allBtn.className = `px-3 py-1 rounded-xl text-[11px] font-bold border transition-colors ${
                allActive
                    ? 'bg-gray-600 border-gray-500 text-white'
                    : 'bg-transparent border-gray-600 text-gray-400 hover:border-gray-400'
            }`;
            allBtn.textContent = 'Alle';
            allBtn.onclick = () => {
                if (allActive) {
                    // Alle abwählen → nur erste Linie aktiv lassen
                    activeLineFilter = new Set([seen.keys().next().value]);
                } else {
                    activeLineFilter = new Set(seen.keys());
                }
                buildLineFilter();
                renderDepartures();
            };
            bar.appendChild(allBtn);

            // Ein Chip pro Linie
            seen.forEach((lineObj, name) => {
                const isActive = activeLineFilter.has(name);
                const chip = document.createElement('button');
                chip.className = `px-3 py-1 rounded-xl text-[11px] font-black italic border transition-colors ${
                    isActive
                        ? 'bg-red-600 border-red-600 text-white'
                        : 'bg-transparent border-gray-600 text-gray-400 hover:border-red-400 hover:text-red-400'
                }`;
                chip.textContent = name;
                chip.onclick = () => {
                    if (activeLineFilter.has(name)) {
                        // Abwählen – mindestens eine Linie muss aktiv bleiben
                        if (activeLineFilter.size > 1) activeLineFilter.delete(name);
                    } else {
                        activeLineFilter.add(name);
                    }
                    buildLineFilter();
                    renderDepartures();
                };
                bar.appendChild(chip);
            });
        }

        function renderDepartures() {
            const list = $('departures-list');
            list.innerHTML = '';

            // Linienfilter anwenden
            const filtered = activeLineFilter
                ? state.departures.filter(d => activeLineFilter.has(d.line?.name))
                : state.departures;

            if (filtered.length === 0) {
                list.innerHTML = `<div class="py-20 text-center text-gray-500">Keine aktuellen Abfahrten gefunden.</div>`;
                return;
            }
            filtered.forEach(dep => {
                const item = document.createElement('div');
                item.className = 'trip-item py-4 hover:bg-gray-50 dark:hover:bg-zinc-900/50 cursor-pointer transition-colors px-1 group';
                const lineName    = dep.line?.name || dep.line?.id || '???';
                const isCancelled = dep.cancelled;
                const schedTime   = new Date(dep.plannedWhen || dep.when);
                const actualTime  = dep.when ? new Date(dep.when) : null;

                // delay in Sekunden vom Server (null = kein Signal, negativ = Verfrühung)
                // Sekunden werden IMMER angezeigt wenn vorhanden (unabhängig von Quelle)
                const delaySec = (dep.delay !== null && dep.delay !== undefined) ? dep.delay : null;

                // Verfrühung: blau + Minus; Verspätung: rot + Plus; pünktlich: grün +0
                const delayColor = delaySec === null  ? ''
                    : delaySec >= 60 ? 'text-red-500'
                    : delaySec > 0   ? 'text-orange-400'
                    : delaySec < 0   ? 'text-blue-400'
                    :                  'text-green-500';
                const abs        = delaySec !== null ? Math.abs(delaySec) : 0;
                // Verfrühung immer anzeigen (auch <60s), Verspätung erst ab 60s
                const delayLabel = delaySec === null ? ''
                    : delaySec === 0    ? '+0'
                    : delaySec < 0      ? (abs >= 60 ? `-${Math.floor(abs/60)}'` : `-${abs}s`)
                    : delaySec >= 60    ? `+${Math.floor(delaySec/60)}'`
                    :                    '';   // Verspätung <60s: kein Label

                const showDelay  = !isCancelled && delaySec !== null && (delaySec <= 0 || abs >= 60);

                item.innerHTML = `
                    <div class="flex items-center gap-4 group">
                        <div class="w-16 flex flex-col items-center">
                            <span class="text-xs font-medium ${isCancelled ? 'line-through text-gray-500' : ''}">${schedTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>
                            ${showDelay ? `<span class="text-[10px] font-bold ${delayColor}">${delayLabel}</span>` : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-0.5">
                                <span class="px-2 py-0.5 rounded bg-red-600 text-[10px] font-black text-white italic">${lineName}</span>
                                <span class="text-sm font-bold truncate ${isCancelled ? 'line-through text-gray-500' : ''}">${dep.direction}</span>
                            </div>
                            <div class="flex items-center gap-3 text-[10px] mono text-gray-500">
                                <span class="${dep.prognosis?.platform && dep.prognosis.platform !== dep.plannedPlatform ? 'platform-changed' : ''}">
                                    ${dep.platform || '---'}
                                </span>
                                ${isCancelled ? '<span class="text-red-500 font-bold uppercase">[Fällt aus]</span>' : ''}
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 group-hover:text-red-500 transition-colors text-xs pr-2"></i>
                    </div>`;
                item.onclick = () => showTripDetails(dep);
                list.appendChild(item);
            });
        }

        // Schnellster API-Endpunkt pro Region merken (nicht global)
        const fastestApiByRegion = {};

        async function refreshDepartures() {
            if (!state.currentStation) return;
            if (!state.currentStation.id) {
                $('departures-list').innerHTML = `<div class="py-20 text-center text-red-500 font-bold">Fehlende Station-ID.</div>`;
                return;
            }
            const now = Date.now();
            if (now - state.lastRequestTime < REQUEST_COOLDOWN_MS) return;
            state.lastRequestTime = now;

            const dateVal = $('query-date').value;
            const timeVal = $('query-time').value;
            const timestamp = `${dateVal}T${timeVal}:00`;

            const cacheKey = `${state.currentStation.id}|${timestamp.slice(0, 16)}|${state.source}`;
            if (state.departureCache.has(cacheKey)) {
                state.departures = state.departureCache.get(cacheKey);
                renderDepartures();
                return;
            }
            try {
                const apiPath = state.source === 'DB' 
                    ? `/api/db/stops/${encodeURIComponent(state.currentStation.id)}/departures`
                    : `/api/stops/${encodeURIComponent(state.currentStation.id)}/departures`;

                const url = `${API_BASE}${apiPath}?when=${encodeURIComponent(timestamp)}&duration=120&results=40`;
                const res = await fetch(url, { signal: AbortSignal.timeout ? AbortSignal.timeout(9000) : undefined });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                state.isRateLimited = false;
                state.departures = (data?.departures || []).map(d => ({ ...d, sourceApi: state.source === 'DB' ? 'Deutsche Bahn' : 'VRR OpenService' }));
                state.departureCache.set(cacheKey, state.departures);
                setTimeout(() => state.departureCache.delete(cacheKey), 60000);
                buildLineFilter();
                renderDepartures();
                // Echtzeit-Daten im Hintergrund in IndexedDB speichern
                autoSaveDepartures(state.departures);
            } catch (err) {
                console.error('Departures fetch failed', err, { stationId: state.currentStation.id });
                $('departures-list').innerHTML = `<div class="py-20 text-center text-red-500 font-bold">Fehler beim Laden der Abfahrtsdaten.</div>`;
            }
        }

        // ─── Archiv ──────────────────────────────────────────────────────────────────
        function addTripToArchive(dep, tripData, usedApi) {
            try {
                const archiveKey = 'dilaeit_trip_archive';
                const existing   = JSON.parse(localStorage.getItem(archiveKey) || '[]');
                const record = {
                    timestamp: Date.now(),
                    station:   state.currentStation?.name || '',
                    stationId: state.currentStation?.id || '',
                    line:      dep.line?.name || dep.line?.id || '???',
                    direction: dep.direction || '',
                    tripId:    dep.tripId || dep.prognosis?.tripId || '',
                    api:       usedApi || dep.sourceApi || 'unknown',
                    data:      tripData
                };
                const next = [record, ...existing]
                    .filter(r => r?.timestamp && (!r.data || r.data.stopovers))
                    .filter(r => Date.now() - r.timestamp <= 48 * 3600 * 1000)
                    .slice(0, 80);
                localStorage.setItem(archiveKey, JSON.stringify(next));
                if (archiveOpen) renderArchive();
            } catch (e) { console.error('Archive error', e); }
        }

        let archiveOpen = false;

        function toggleArchive() {
            archiveOpen = !archiveOpen;
            $('archive-list').classList.toggle('hidden', !archiveOpen);
            $('archive-chevron').style.transform = archiveOpen ? 'rotate(90deg)' : '';
            if (archiveOpen) renderArchive();
        }

        function clearArchive() {
            localStorage.removeItem('dilaeit_trip_archive');
            renderArchive();
        }

        function renderArchive(showAll = false) {
            const listEl = $('archive-list');
            listEl.innerHTML = '';
            let items;
            try { items = JSON.parse(localStorage.getItem('dilaeit_trip_archive') || '[]'); } catch { items = []; }
            items = items.filter(r => Date.now() - r.timestamp <= 48 * 3600 * 1000);
            if (items.length === 0) {
                listEl.innerHTML = '<div class="text-gray-500 dark:text-gray-400 text-xs py-1">Noch keine Fahrten im Archiv.</div>';
                return;
            }
            const PAGE = 5;
            const visible = showAll ? items : items.slice(0, PAGE);
            visible.forEach(r => {
                const item = document.createElement('div');
                item.className = 'px-3 py-2 rounded-xl bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 cursor-pointer hover:border-red-400 transition-colors';
                const time = new Date(r.timestamp).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
                item.innerHTML = `
                    <div class="font-semibold text-xs">${r.station} • ${r.line}</div>
                    <div class="text-[10px] text-gray-500 dark:text-gray-400">${r.direction} • ${time}</div>`;
                item.onclick = () => {
                    state.currentStation = { id: r.stationId || r.data?.stop?.id || state.currentStation?.id, name: r.station };
                    state.currentRegion  = detectRegion(r.station);
                    $('station-search').value = r.station;
                    refreshDepartures();
                };
                listEl.appendChild(item);
            });
            if (!showAll && items.length > PAGE) {
                const btn = document.createElement('button');
                btn.className = 'w-full text-center text-[11px] text-gray-400 hover:text-red-500 py-2 transition-colors';
                btn.innerHTML = `<i class="fas fa-chevron-down mr-1"></i>+${items.length - PAGE} weitere`;
                btn.onclick = () => renderArchive(true);
                listEl.appendChild(btn);
            }
        }

        // ─── Verbindungssuche ────────────────────────────────────────────────────────
        function extractTripIdFromJourney(journey) {
            // DB journeys liefern je nach Produkt/Quelle teils tripId an verschiedenen Stellen.
            if (!journey) return null;
            const legs = journey.legs || [];
            return (
                journey.tripId ||
                journey.trip?.tripId ||
                journey.trip?.id ||
                legs.find(l => l?.tripId || l?.prognosis?.tripId)?.tripId ||
                legs.find(l => l?.tripId || l?.prognosis?.tripId)?.prognosis?.tripId ||
                legs[0]?.tripId ||
                null
            );
        }

        function extractLineForJourney(journey) {
            const legs = journey?.legs || [];
            const firstLineLeg = legs.find(l => l?.line);
            return firstLineLeg || null;
        }

        function showJourneyTripDetailsFromEncodedPayload(encodedPayload) {
            if (!encodedPayload) return;
            let payload = null;
            try { payload = JSON.parse(decodeURIComponent(encodedPayload)); } catch { payload = null; }
            if (!payload?.tripId) return;
            const dep = {
                tripId:    payload.tripId,
                dbTripId:  payload.dbTripId || payload.tripId,
                prognosis: { tripId: payload.tripId },
                line:      payload.line || null,
                // direction = Endziel der Linie (nicht des Users)
                direction: payload.direction || ''
            };
            return showTripDetails(dep);
        }

        async function resolveStationId(query) {
            if (!query?.trim()) return null;
            const res = await fetch(`https://v6.db.transport.rest/locations?query=${encodeURIComponent(query)}&results=6`);
            if (!res.ok) throw new Error(`Stationen nicht gefunden: ${query}`);
            const data  = await res.json();
            const items = Array.isArray(data) ? data : (data.locations || data.results || Object.values(data).find(v => Array.isArray(v)) || []);
            if (!items?.length) throw new Error(`Stationen nicht gefunden: ${query}`);
            const preferred = items.find(i => i.type === 'stop' || i.type === 'station') || items[0];
            return { id: preferred.id || preferred.extId || preferred.stop?.id, name: preferred.name || preferred.stop?.name || query };
        }

        function formatDuration(isoOrMs) {
            // Accepts ISO 8601 duration (PT1H23M) or milliseconds
            if (typeof isoOrMs === 'string') {
                const h = isoOrMs.match(/(\d+)H/)?.[1] || 0;
                const m = isoOrMs.match(/(\d+)M/)?.[1] || 0;
                return h > 0 ? `${h}h ${m}min` : `${m} min`;
            }
            const totalMin = Math.round(isoOrMs / 60000);
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            return h > 0 ? `${h}h ${m}min` : `${m} min`;
        }

        function queryJourneys(from, to, via, when) {
            const params = new URLSearchParams({ from, to, results: '6', stopovers: 'true', remarks: 'true' });
            if (via)  params.set('via', via);
            // FIX: 'when' korrekt als ISO-String übergeben, nicht als lokale Zeit
            if (when) params.set('departure', when);
            return fetch(`https://v6.db.transport.rest/journeys?${params}`, {
                signal: AbortSignal.timeout ? AbortSignal.timeout(12000) : undefined
            }).then(r => r.ok ? r.json() : Promise.reject(new Error('Journeys failed ' + r.status)));
        }

        // Aufgeklappte Journey-Karte: zeigt alle Legs mit Stopover-Details
        function renderJourneyCard(journey, index) {
            const legs     = journey.legs || [];
            const firstLeg = legs[0];
            const lastLeg  = legs[legs.length - 1];
            const tripId   = extractTripIdFromJourney(journey);
            const firstLine = extractLineForJourney(journey);
            const directionGuess =
                firstLine?.destination?.name ||
                firstLine?.plannedArrival?.name ||
                lastLeg?.destination?.name ||
                lastLeg?.plannedArrival?.name ||
                'Verbindung';

            // Für die Modal-Quelle und die Header-Ausgabe brauchen wir eine dep-ähnliche "line"-Struktur.
            // Bei /journeys sind die Felder je nach Provider teils anders als bei /departures,
            // daher leiten wir "product" aus leg.mode/line.product ab.
            const minimalLine = firstLine?.line
                ? {
                    name: firstLine.line?.name || firstLine.line?.id || firstLine.mode || 'Unbekannt',
                    id: firstLine.line?.id,
                    product: (firstLine.line?.product || firstLine.product || firstLine.mode || '').toString(),
                    operator: firstLine.line?.operator?.name ? { name: firstLine.line.operator.name } : undefined
                }
                : null;
            // Per-Leg payloads — jede Fahrt bekommt ihren eigenen Details-Button
            // direction = Endziel der Linie (leg.direction), nicht Ziel des Users
            const legPayloads = legs
                .filter(l => l.tripId && l.line)
                .map(l => ({
                    tripId:    l.tripId,
                    dbTripId:  l.tripId,
                    line: {
                        name:    l.line?.name || l.line?.id || '?',
                        id:      l.line?.id,
                        product: (l.line?.product || l.mode || '').toString(),
                        operator: l.line?.operator?.name ? { name: l.line.operator.name } : undefined
                    },
                    direction: l.direction || ''  // Endziel der Linie, nicht Reiseziel
                }));
            // Für Rückwärtskompatibilität: journeyDetailsPayload = erster Leg
            const journeyDetailsPayload = legPayloads[0]
                ? encodeURIComponent(JSON.stringify(legPayloads[0]))
                : '';

            const depTime  = new Date(firstLeg?.plannedDeparture || firstLeg?.departure || journey.departure);
            const arrTime  = new Date(lastLeg?.plannedArrival    || lastLeg?.arrival    || journey.arrival);
            const depActual = firstLeg?.departure ? new Date(firstLeg.departure) : null;
            const arrActual = lastLeg?.arrival    ? new Date(lastLeg.arrival)    : null;

            const depDelaySec = depActual ? Math.round((depActual - depTime) / 1000) : null;
            const arrDelaySec = arrActual ? Math.round((arrActual - arrTime) / 1000) : null;

            const durationMs = arrTime - depTime;
            const changes    = legs.filter(l => l.line).length - 1;

            const timeStr = (t, delaySec) => {
                const base = t.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                if (delaySec === null || delaySec === undefined) return `<span class="font-mono font-semibold">${base}</span>`;
                
                const abs = Math.abs(delaySec);
                const color = delaySec >= 60  ? 'text-red-400'
                            : delaySec > 0    ? 'text-orange-400'
                            : delaySec < 0    ? 'text-blue-400'
                            :                  'text-green-400';
                
                const actual = new Date(t.getTime() + delaySec * 1000);
                const actStr = actual.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                let label = '';
                if (delaySec === 0) label = '+0';
                else if (delaySec < 0) label = abs >= 60 ? `-${Math.floor(abs/60)}'` : `-${abs}s`;
                else if (delaySec >= 60) label = `+${Math.floor(delaySec/60)}'`;

                return `<div class="flex flex-col items-center leading-tight">
                    <span class="font-mono font-semibold text-gray-400 text-[10px] line-through">${base}</span>
                    <span class="font-mono font-bold ${color}">${actStr}</span>
                    ${label ? `<span class="text-[9px] font-black ${color}">${label}</span>` : ''}
                </div>`;
            };

            const legBadges = legs.map(l => {
                const n = l.line?.name || l.mode || '?';
                return `<span class="px-1.5 py-0.5 rounded text-[10px] font-black bg-red-600/80 text-white italic">${n}</span>`;
            }).join('<span class="text-gray-600 text-[10px] mx-0.5">→</span>');

            const cardId = `journey-${index}`;
            const detailId = `journey-detail-${index}`;

            // Legs rendern mit Umsteigeampel zwischen den Verbindungen
            const legsHtml = legs.map((leg, li) => {
                const isWalk = !leg.line;
                const legDep = leg.plannedDeparture ? new Date(leg.plannedDeparture) : null;
                const legArr = leg.plannedArrival   ? new Date(leg.plannedArrival)   : null;
                const legDepAct = leg.departure ? new Date(leg.departure) : null;
                const legArrAct = leg.arrival   ? new Date(leg.arrival)   : null;

                const fmtT = (sched, actual) => {
                    if (!sched) return '–';
                    const base = sched.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                    if (!actual) return `<span class="font-mono">${base}</span>`;
                    
                    const dSec = Math.round((actual - sched) / 1000);
                    const abs = Math.abs(dSec);
                    
                    const col  = dSec >= 60 ? 'text-red-400' : dSec > 0 ? 'text-orange-400' : dSec < 0 ? 'text-blue-400' : 'text-green-400';
                    const label = dSec < 0 ? (abs >= 60 ? `-${Math.floor(abs/60)}'` : `-${abs}s`)
                                           : (dSec >= 60 ? `+${Math.floor(dSec/60)}'` : (dSec === 0 ? '+0' : ''));
                    
                    return `<span class="font-mono text-gray-400 line-through mr-1 text-[10px]">${base}</span><span class="font-mono ${col}">${actual.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} ${label ? `<span class="text-[9px] font-bold">${label}</span>` : ''}</span>`;
                };

                // Umsteigeampel zwischen diesem und dem nächsten Leg
                let transferHtml = '';
                if (li < legs.length - 1 && !isWalk && leg.line) {
                    const nextLeg = legs[li + 1];
                    if (nextLeg && !(!nextLeg.line)) {
                        const arrTime  = legArrAct || legArr;
                        const depNext  = nextLeg.departure ? new Date(nextLeg.departure) : (nextLeg.plannedDeparture ? new Date(nextLeg.plannedDeparture) : null);
                        if (arrTime && depNext) {
                            const transferMin = Math.round((depNext - arrTime) / 60000);
                            // Ampel: ≥10min = grün, 5-9min = gelb, <5min = rot
                            const cls  = transferMin >= 10 ? 'transfer-ok' : transferMin >= 5 ? 'transfer-tight' : 'transfer-risky';
                            const icon = transferMin >= 10 ? 'fa-circle-check' : transferMin >= 5 ? 'fa-circle-exclamation' : 'fa-circle-xmark';
                            const label = transferMin < 5 ? 'Umstieg knapp!' : transferMin < 10 ? 'Umstieg eng' : 'Umstieg komfortabel';
                            transferHtml = `<div class="flex items-center gap-2 py-1.5 px-3 text-[11px] ${cls}">
                                <i class="fas ${icon}"></i>
                                <span class="font-semibold">${transferMin} Min Umstieg</span>
                                <span class="text-gray-500 text-[10px]">– ${label}</span>
                            </div>`;
                        }
                    }
                }

                if (isWalk) {
                    const walkMin = leg.duration ? Math.round(leg.duration / 60) : '?';
                    return `<div class="flex items-center gap-2 py-2 px-3 text-[11px] text-gray-500">
                        <i class="fas fa-walking w-4 text-center"></i>
                        <span>Fußweg ~${walkMin} min</span>
                    </div>`;
                }

                // Zwischenhalte
                const stopovers = leg.stopovers || [];
                const midStops  = stopovers.slice(1, -1);
                const midHtml   = midStops.map(s => {
                    const st = s.plannedDeparture || s.plannedArrival;
                    const timeDisp = st ? new Date(st).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
                    return `<div class="flex items-center gap-2 py-0.5 pl-6 text-[10px] text-gray-600 dark:text-gray-400">
                        <span class="w-1 h-1 rounded-full bg-gray-500 shrink-0"></span>
                        <span class="flex-1 truncate">${s.stop?.name || ''}</span>
                        <span class="font-mono">${timeDisp}</span>
                    </div>`;
                }).join('');

                const cancelled = leg.cancelled ? 'opacity-40' : '';
                const legPayload = leg.tripId ? encodeURIComponent(JSON.stringify({
                    tripId:   leg.tripId,
                    dbTripId: leg.tripId,
                    line: {
                        name:    leg.line?.name || '?',
                        id:      leg.line?.id,
                        product: (leg.line?.product || leg.mode || '').toString(),
                    },
                    direction: leg.direction || ''  // echtes Linien-Endziel
                })) : '';
                return `<div class="rounded-xl border border-gray-200 dark:border-zinc-700 overflow-hidden mb-2 ${cancelled}">
                    <div class="flex items-center gap-2 px-3 py-2 bg-gray-50 dark:bg-zinc-800">
                        <span class="px-2 py-0.5 rounded text-[10px] font-black bg-red-600 text-white italic shrink-0">${leg.line?.name || '?'}</span>
                        <span class="text-xs font-semibold truncate flex-1">${leg.direction || ''}</span>
                        ${leg.cancelled ? '<span class="text-red-500 text-[10px] font-bold shrink-0">[Fällt aus]</span>' : ''}
                        ${legPayload ? `<button class="px-2 py-1 rounded-lg text-[10px] font-semibold bg-blue-600 text-white hover:bg-blue-500 shrink-0" onclick="event.stopPropagation(); showJourneyTripDetailsFromEncodedPayload('${legPayload}')" type="button">Verlauf</button>` : ''}
                    </div>
                    <div class="px-3 py-2 text-[11px] space-y-1">
                        <div class="flex justify-between">
                            <span class="text-gray-500">Ab: <span class="font-semibold text-gray-200">${leg.origin?.name || ''}</span></span>
                            <span>${fmtT(legDep, legDepAct)}</span>
                        </div>
                        ${midHtml}
                        <div class="flex justify-between">
                            <span class="text-gray-500">An: <span class="font-semibold text-gray-200">${leg.destination?.name || ''}</span></span>
                            <span>${fmtT(legArr, legArrAct)}</span>
                        </div>
                    </div>
                </div>${transferHtml}`;
            }).join('');

            return `
            <div class="rounded-2xl border border-gray-200 dark:border-zinc-700 overflow-hidden">
                <div id="${cardId}" class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors select-none"
                     onclick="toggleJourney('${detailId}', '${cardId}')">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            ${timeStr(depTime, depDelaySec)}
                            <span class="text-gray-500">→</span>
                            ${timeStr(arrTime, arrDelaySec)}
                            <span class="text-gray-500 text-[11px] ml-2">(${formatDuration(durationMs)})</span>
                            ${changes > 0 ? `<span class="text-gray-600 text-[10px] ml-auto">${changes}× Umstieg</span>` : '<span class="text-green-600 text-[10px] ml-auto">Direkt</span>'}
                        </div>
                        <div class="flex items-center gap-1 mt-1 flex-wrap">${legBadges}</div>
                    </div>
                    <button
                        class="px-3 py-1.5 rounded-xl text-[10px] font-semibold transition-colors ${tripId ? 'bg-blue-600 text-white hover:bg-blue-500' : 'bg-gray-500/30 text-gray-200 cursor-not-allowed opacity-60'}"
                        ${tripId ? '' : 'disabled'}
                        data-journey-payload="${journeyDetailsPayload}"
                        onclick="event.stopPropagation(); showJourneyTripDetailsFromEncodedPayload(this.dataset.journeyPayload)"
                        type="button"
                        title="${tripId ? 'Details ansehen' : 'Keine Trip-ID in der Journey gefunden.'}"
                    >
                        Details ansehen
                    </button>
                    <i id="${cardId}-icon" class="fas fa-chevron-down text-gray-400 text-xs transition-transform duration-200 shrink-0"></i>
                </div>
                <div id="${detailId}" class="hidden px-4 pb-4 pt-1 border-t border-gray-100 dark:border-zinc-800">
                    ${legsHtml}
                </div>
            </div>`;
        }

        function toggleJourney(detailId, cardId) {
            const detail = $(detailId);
            const icon   = $(`${cardId}-icon`);
            if (!detail) return;
            const isOpen = !detail.classList.contains('hidden');
            detail.classList.toggle('hidden', isOpen);
            if (icon) icon.style.transform = isOpen ? '' : 'rotate(180deg)';
        }

        async function performRouteSearch() {
            const start = routeStations.start || $('route-start').value.trim();
            const via   = routeStations.via   || $('route-via').value.trim();
            const dest  = routeStations.dest  || $('route-dest').value.trim();
