<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit - ÖPNV Echtzeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #ef4444;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        .dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .search-container {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-primary);
            padding: 1rem 0;
        }

        .trip-item {
            border-bottom: 1px solid rgba(156, 163, 175, 0.1);
        }

        #trip-itinerary {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .itinerary-item {
            padding: 0.25rem 0;
        }

        .cancelled {
            color: #9ca3af !important;
            text-decoration: line-through;
        }

        .realtime-on-time { color: var(--success); }
        .realtime-delay { color: var(--error); }

        .platform-changed {
            color: #f97316;
            font-weight: bold;
        }

        .detail-view {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-primary);
            z-index: 100;
            overflow-y: auto;
        }

        .detail-view.active { display: block; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

        .search-as-you-type-results { max-height: 300px; overflow-y: auto; }

        .thin-prognosis { font-weight: 300; }
        .precision-time { font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .itinerary-line {
            position: absolute;
            left: 14px; top: 0; bottom: 0;
            width: 2px;
            background-color: #374151;
            z-index: 0;
        }

        .itinerary-item {
            padding-left: 32px;
            margin-bottom: 0.45rem;
            min-height: 48px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .itinerary-item-content { margin-left: 12px; }

        #trip-itinerary { max-height: 62vh; overflow-y: auto; }
        #detail-trip-id { font-size: 0.76rem; font-weight: 700; }
        .itinerary-info { font-size: 0.73rem; }
        /* Spezielle Farben für Zuggattungen */
.bg-ice { background-color: #ffffff !important; color: #ff0000 !important; border: 1px solid #ff0000; font-style: italic; }
.bg-re { background-color: #ff0000 !important; color: #ffffff !important; }
.bg-s-bahn { background-color: #008d4f !important; color: #ffffff !important; }
.bg-u-bahn { background-color: #003399 !important; color: #ffffff !important; }
.bg-bus { background-color: #6b7280 !important; color: #ffffff !important; } /* Grau für Busse */
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { zinc: { 950: '#09090b' } } } }
        }
    </script>
</head>
<body class="dark transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter italic">dilaeit</h1>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end text-xs mono text-gray-500">
                    <span id="current-date">--.--.----</span>
                    <span id="current-time" class="text-sm font-bold text-gray-300">--:--:--</span>
                </div>
                <button id="api-base-btn" class="hidden px-3 py-2 rounded-xl bg-gray-100 dark:bg-zinc-900 text-xs font-semibold hover:text-red-500 transition-colors">
                    Backend-URL
                </button>
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-zinc-900 hover:scale-110 transition-transform">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>
            </div>
        </header>

        <div class="search-container space-y-4">
            <div class="relative group">
                <input 
                    type="text" 
                    id="station-search" 
                    placeholder="Haltestelle suchen..." 
                    autocomplete="off"
                    class="w-full bg-gray-100 dark:bg-zinc-900 border-none rounded-2xl py-5 pl-14 pr-4 text-lg focus:ring-2 focus:ring-red-500/50 transition-all outline-none shadow-sm"
                >
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 text-xl"></i>
                <div id="search-results" class="absolute top-full left-0 w-full mt-3 bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl overflow-hidden hidden z-50 border border-gray-100 dark:border-zinc-800 search-as-you-type-results"></div>
            </div>

            <div class="flex gap-3 items-center overflow-x-auto pb-2 no-scrollbar">
                <div class="flex items-center bg-gray-100 dark:bg-zinc-900 rounded-xl px-3 py-2 gap-2">
                    <i class="far fa-calendar text-gray-400 text-xs"></i>
                    <input type="date" id="query-date" class="bg-transparent border-none text-xs outline-none focus:ring-0 w-28">
                </div>
                <div class="flex items-center bg-gray-100 dark:bg-zinc-900 rounded-xl px-3 py-2 gap-2">
                    <i class="far fa-clock text-gray-400 text-xs"></i>
                    <input type="time" id="query-time" class="bg-transparent border-none text-xs outline-none focus:ring-0 w-20">
                </div>
                <button id="reset-query" class="px-4 py-2 bg-gray-100 dark:bg-zinc-900 rounded-xl text-xs font-medium hover:text-red-500 transition-colors">Jetzt</button>
            </div>
        </div>

        <div id="board-container" class="mt-8 space-y-6">
            <div id="board-header" class="hidden flex justify-between items-end border-b border-gray-100 dark:border-zinc-800 pb-4">
                <div>
                    <h2 id="station-display-name" class="text-2xl font-bold tracking-tight"></h2>
                    <p id="board-type" class="text-xs text-gray-500 uppercase tracking-widest mt-1">Abfahrtstafel</p>
                </div>
                <div id="refresh-indicator" class="text-[10px] text-gray-500 mono flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    LIVE REFRESH
                </div>
            </div>
            <div id="line-filter-bar" class="hidden flex flex-wrap gap-2 pb-2"></div>
            <div id="departures-list" class="divide-y divide-gray-100 dark:divide-zinc-900">
                <div class="flex flex-col items-center justify-center py-32 text-gray-500 space-y-6 opacity-40">
                    <div class="relative">
                        <i class="fas fa-train text-7xl"></i>
                        <i class="fas fa-search absolute -bottom-2 -right-2 text-2xl"></i>
                    </div>
                    <p class="text-sm font-medium">Suche nach einer Station, um Live-Abfahrten zu sehen.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="detail-view" class="detail-view">
        <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen flex flex-col">
            <header class="flex items-center gap-3 mb-10">
                <button id="close-detail" class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-zinc-900 flex items-center justify-center hover:scale-105 transition-transform">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button id="reload-trip" class="px-3 py-2 rounded-xl bg-blue-600 text-white text-xs font-semibold hover:bg-blue-500 transition">Neu laden</button>
                <div class="flex-1">
                    <div class="flex items-center gap-3">
                        <span id="detail-line-badge" class="px-3 py-1 rounded-lg text-xs font-black bg-red-600 text-white italic">--</span>
                        <h2 id="detail-train-direction" class="text-xl font-bold truncate">--</h2>
                    </div>
                </div>
            </header>
            <div class="flex-1 relative">
                <div class="itinerary-line"></div>
                <div id="trip-itinerary" class="space-y-10 relative z-10"></div>
            </div>
        </div>
    </div>

    <script>
        // API Konfiguration
        const API_BASE = ''; 
        const REFRESH_INTERVAL = 60000;
        let state = { currentStation: null, departures: [], refreshTimer: null };
        const $ = id => document.getElementById(id);

        // --- ZEIT-LOGIK (DIE KERNAUFGABE) ---
        function formatTime(planned, actual, hasLive) {
            if (!planned) return '';
            const pDate = new Date(planned);
            const timeStr = pDate.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            if (!hasLive || !actual) return `<span class="font-bold">${timeStr}</span>`;

            const aDate = new Date(actual);
            const diffSeconds = Math.floor((aDate - pDate) / 1000);

            if (diffSeconds >= 60) {
                const mins = Math.floor(diffSeconds / 60);
                return `<span class="font-bold">${timeStr}</span> <span class="text-red-500 ml-1 font-bold">+${mins}</span>`;
            } else if (diffSeconds <= -60) {
                const mins = Math.abs(Math.ceil(diffSeconds / 60));
                return `<span class="font-bold text-green-500">${timeStr}</span> <span class="text-green-500 ml-1 font-bold">-${mins}</span>`;
            } else {
                return `<span class="font-bold text-green-500">${timeStr}</span>`;
            }
        }

function renderDepartures() {
    const list = $('departures-list');
    list.innerHTML = '';
    
    state.departures.forEach(dep => {
        const item = document.createElement('div');
        item.className = 'trip-item py-4 hover:bg-gray-50 dark:hover:bg-zinc-900/50 cursor-pointer px-1 group';
        
        // --- NEU: Zuggattung Logik ---
        const lineName = dep.line?.name || '???';
        let badgeClass = "bg-bus"; // Standard

        if (lineName.startsWith('ICE') || lineName.startsWith('IC')) badgeClass = "bg-ice";
        else if (lineName.startsWith('RE') || lineName.startsWith('RB')) badgeClass = "bg-re";
        else if (lineName.startsWith('S')) badgeClass = "bg-s-bahn";
        else if (lineName.startsWith('U')) badgeClass = "bg-u-bahn";

        const schedTime = new Date(dep.plannedWhen || dep.when);
        const diffSec = dep.delay || 0;
        
        // Präzise Verspätungsanzeige
        let delayDisplay = '';
        if (diffSec >= 60) {
            delayDisplay = `<span class="text-[10px] font-bold text-red-500">+${Math.floor(diffSec / 60)}'</span>`;
        } else if (diffSec <= -60) {
            delayDisplay = `<span class="text-[10px] font-bold text-green-500">-${Math.abs(Math.ceil(diffSec / 60))}'</span>`;
        } else if (dep.delay !== null) {
            delayDisplay = `<span class="text-[10px] font-bold text-green-500">pünktlich</span>`;
        }

        const timeColor = (diffSec < 60 && diffSec > -60 && dep.delay !== null) ? 'text-green-500' : '';

        item.innerHTML = `
            <div class="flex items-center gap-4">
                <div class="w-16 flex flex-col items-center">
                    <span class="text-xs font-bold ${timeColor}">${schedTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>
                    ${delayDisplay}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5">
                        <span class="px-2 py-0.5 rounded text-[10px] font-black ${badgeClass}">${lineName}</span>
                        <span class="text-sm font-bold truncate">${dep.direction}</span>
                    </div>
                    <div class="text-[10px] text-gray-500 mono">Gleis ${dep.platform || '---'}</div>
                </div>
                <i class="fas fa-chevron-right text-gray-300 group-hover:text-red-500 transition-colors text-xs pr-2"></i>
            </div>`;
        
        item.onclick = () => showTripDetails(dep);
        list.appendChild(item);
    });
}

        // --- RESTLICHE FUNKTIONEN (Vereinfacht für die Übersicht) ---
        async function handleSearchInput(val) {
            const query = val.trim();
            if (query.length < 2) return;
            const res = await fetch(`${API_BASE}/api/locations?query=${encodeURIComponent(query)}`);
            const data = await res.json();
            renderSearchResults(data.locations || []);
        }

        function renderSearchResults(results) {
            const container = $('search-results');
            container.innerHTML = '';
            container.classList.remove('hidden');
            results.slice(0, 10).forEach(res => {
                const item = document.createElement('div');
                item.className = 'px-5 py-3 hover:bg-gray-50 dark:hover:bg-zinc-800 cursor-pointer text-sm font-semibold border-b border-gray-100 dark:border-zinc-800';
                item.textContent = res.name;
                item.onclick = () => {
                    state.currentStation = res;
                    $('station-search').value = res.name;
                    container.classList.add('hidden');
                    $('board-header').classList.remove('hidden');
                    $('station-display-name').textContent = res.name;
                    refreshDepartures();
                };
                container.appendChild(item);
            });
        }

      async function refreshDepartures() {
    if (!state.currentStation) return;
    
    // Wir nutzen jetzt unsere neue "Smart"-Route im Backend
    const url = `${API_BASE}/api/stops/${encodeURIComponent(state.currentStation.id)}/departures`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        
        // Hier sortieren wir die Daten vielleicht noch oder filtern sie
        state.departures = data.departures || [];
        
        renderDepartures(); // Das zeichnet die Liste neu
        $('board-header').classList.remove('hidden');
    } catch (e) {
        console.error("Fehler beim Laden:", e);
    }
}

async function showTripDetails(dep) {
    // 1. Detail-Ansicht öffnen und Platzhalter anzeigen
    $('detail-view').classList.add('active');
    $('detail-line-badge').textContent = dep.line?.name || '??';
    $('detail-train-direction').textContent = dep.direction;
    $('trip-itinerary').innerHTML = '<div class="py-10 text-center mono text-xs opacity-50"><i class="fas fa-circle-notch animate-spin mr-2"></i>Lade Verlauf...</div>';
    
    try {
        // 2. Daten für den VRR-Payload vorbereiten (wichtig für dein Backend)
        // Wir nehmen die geplante Zeit, da diese der "Anker" für den Fahrplan ist
        const plannedDate = new Date(dep.plannedWhen || dep.when);
        
        // Formatierung für das Backend (YYYYMMDD und HHMM)
        const dateStr = plannedDate.getFullYear() + 
                        String(plannedDate.getMonth() + 1).padStart(2, '0') + 
                        String(plannedDate.getDate()).padStart(2, '0');
        const timeStr = String(plannedDate.getHours()).padStart(2, '0') + 
                        String(plannedDate.getMinutes()).padStart(2, '0');
        // Wir erstellen ein Objekt, das genau so aussieht, wie es dein Backend in index.js (Zeile 300) erwartet
        const payload = {
            line: dep.line?.id,
            stopID: state.currentStation.id,
            tripCode: dep.tripCode || "0", // Der VRR braucht oft einen TripCode (0 ist Fallback)
            date: dateStr,
            time: timeStr
        };
        // 3. Den Request an das Backend senden Wir kodieren das Objekt als Base64 oder übergeben es als Parameter, da dein Backend 'req.params.id' als 'payload' parst.
        const encodedPayload = btoa(JSON.stringify(payload));
        const res = await fetch(`${API_BASE}/api/trips/${encodeURIComponent(encodedPayload)}`);
        
        if (!res.ok) throw new Error('Details nicht gefunden');
        
        const data = await res.json();
        
        // 4. Den Verlauf zeichnen
        renderTripItinerary(data.stopovers || []);
        
    } catch (e) {
        console.error("Trip-Fehler:", e);
        $('trip-itinerary').innerHTML = `
            <div class="py-10 text-center text-red-500">
                <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i><br>
                <span class="text-xs font-bold">Verlauf derzeit nicht verfügbar.</span>
            </div>`;
    }
}

        function renderTripItinerary(stops) {
            const container = $('trip-itinerary');
            container.innerHTML = '';
            stops.forEach(s => {
                const item = document.createElement('div');
                item.className = 'itinerary-item relative z-10';
                const hasLive = s.arrival !== null || s.departure !== null;
                item.innerHTML = `
                    <div class="absolute left-[-22px] top-1 w-3 h-3 rounded-full bg-gray-400 border-2 border-white dark:border-zinc-900"></div>
                    <div class="itinerary-item-content">
                        <div class="flex justify-between items-start">
                            <div class="text-xs font-bold">${s.stop.name}</div>
                            <div class="text-right mono text-[10px]">
                                ${s.plannedDeparture ? `<div>${formatTime(s.plannedDeparture, s.departure, hasLive)}</div>` : ''}
                            </div>
                        </div>
                    </div>`;
                container.appendChild(item);
            });
        }

        function setupClock() {
            setInterval(() => {
                const now = new Date();
                $('current-date').textContent = now.toLocaleDateString('de-DE');
                $('current-time').textContent = now.toLocaleTimeString('de-DE');
            }, 1000);
        }

        $('station-search').addEventListener('input', e => handleSearchInput(e.target.value));
        $('close-detail').addEventListener('click', () => $('detail-view').classList.remove('active'));
        $('theme-toggle').addEventListener('click', () => document.body.classList.toggle('dark'));
        
        setupClock();
    </script>
</body>
</html>
