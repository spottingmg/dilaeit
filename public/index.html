            const date  = $('route-date').value;
            const time  = $('route-time').value;
            const resultsContainer = $('route-results');
            if (!start || !dest) { resultsContainer.innerHTML = '<span class="text-red-500">Start und Ziel sind erforderlich.</span>'; return; }

            // FIX: Datum+Uhrzeit korrekt als lokale Zeit → ISO-String
            let when;
            if (date && time) {
                const [y,mo,d] = date.split('-').map(Number);
                const [h,mi]   = time.split(':').map(Number);
                when = new Date(y, mo-1, d, h, mi).toISOString();
            }

            resultsContainer.innerHTML = '<span class="text-gray-500"><i class="fas fa-spinner fa-spin mr-1"></i>Verbindung wird geladen...</span>';
            try {
                const startStation = routeStations.start || await resolveStationId(start);
                const destStation  = routeStations.dest  || await resolveStationId(dest);
                const viaStation   = routeStations.via   ? routeStations.via : (via ? await resolveStationId(via) : null);
                if (!startStation || !destStation) throw new Error('Start oder Ziel nicht gefunden.');

                const journeys = await queryJourneys(
                    startStation.id || start,
                    destStation.id  || dest,
                    viaStation?.id,
                    when
                );
                if (!journeys?.journeys?.length) {
                    resultsContainer.innerHTML = '<span class="text-gray-500">Keine Verbindungen gefunden.</span>';
                    return;
                }

                resultsContainer.innerHTML = `<div class="space-y-2 mt-2">${
                    journeys.journeys.map((j, i) => renderJourneyCard(j, i)).join('')
                }</div>`;
            } catch (e) {
                console.error('Route search error:', e);
                resultsContainer.innerHTML = '<span class="text-red-500">Fehler bei der Verbindungssuche.</span>';
            }
        }

        // Gibt true zurück wenn die Linie ein Fernzug/Regionalzug ist (nicht ÖPNV)
        function isTrain(line) {
            if (!line) return false;
            const name    = (line.name || '').toUpperCase();
            const product = (line.product || '').toLowerCase();
            // Explizit kein Zug
            const nonTrain = ['bus','tram','tramway','subway','metro','light_rail','urban_rail','watercraft','taxi'];
            if (nonTrain.some(p => product.includes(p))) return false;
            // Explizit Zug
            if (['national','nationalexpress','regional','regionalexpress','ferry'].includes(product)) return true;
            const trainPrefixes = ['ICE','IC','ICD','RE','RB','IRE','EC','EN','TGV','NJ','RJ','RS'];
            const prefixMatches = (p) => {
                if (name === p) return true;
                if (name.startsWith(p + ' ') || name.startsWith(p + '-')) return true;
                // Handles patterns like "RS1" / "RE4" where there is no delimiter.
                if (name.startsWith(p) && name.length > p.length && /\d/.test(name.slice(p.length, p.length + 1))) return true;
                return false;
            };
            if (trainPrefixes.some(prefixMatches)) return true;
            // S-Bahn in den NRW-APIs kommt oft als "S 8" oder "S8"
            // "SB1" (Bus) wird NICHT getroffen, weil danach kein Digit folgt.
            if (/^S\s*\d+/.test(name)) return true;
            if (!product && /^\d+$/.test(name.trim())) return false;
            return product !== '' && !nonTrain.some(p => product.includes(p));
        }

        // NRW-Lokal: alles was kein Fernzug ist → VRR zuständig
        function isNrwLocalTransit(line) {
            if (!line) return false;
            // NRW-local bedeutet: lokale ÖPNV-Teile (Bus/Tram/Stadtbahn etc.), aber NICHT Züge.
            // Züge (S-Bahn/RE/RB/ICE/IC/EC/IRE/RS) sollen NICHT als "local" gelten.
            if (isTrain(line)) return false;

            const product = (line.product || '').toLowerCase();
            const name    = (line.name || '').toUpperCase();
            const localProducts = ['bus','tram','tramway','subway','metro','light_rail','urban_rail','watercraft'];
            if (localProducts.some(p => product.includes(p))) return true;
            // Numerische Linienbezeichnungen → Bus/Stadtbahn
            if (/^\d+$/.test(name.trim())) return true;
            return false;
        }

        // ─── Trip-Details ────────────────────────────────────────────────────────────
        async function showTripDetails(dep) {
            // tripId ist die VRR-ID, dbTripId ist die DB-Hafas-ID
            const vrrTripId = dep.tripId || dep.prognosis?.tripId;
            const dbTripId = dep.dbTripId;
            
            if (!vrrTripId && !dbTripId) return;

            const lineName = dep.line?.name || dep.line?.id || '???';
            const modal    = $('detail-view');
            const itinerary = $('trip-itinerary');
            modal.classList.add('active');
            switchDetailTab('itinerary'); // immer auf Fahrtverlauf zurücksetzen
            
            // Auto-Erkennung: Zug → DB-Hafas, sonst VRR
            const isTrainLine = isTrain(dep.line);
            const loaderText = isTrainLine ? 'Lade DB-Echtzeitdaten...' : 'Lade Verlauf...';
            itinerary.innerHTML = `<div class="py-20 text-center"><i class="fas fa-circle-notch fa-spin text-red-600 text-2xl"></i><div class="text-xs mono opacity-50 mt-3">${loaderText}</div></div>`;
            $('detail-line-badge').textContent = lineName;
            $('detail-train-direction').textContent = dep.direction || 'Unbekanntes Ziel';

            currentTripDetail = dep;
            try {
                let url;
                let sourceName = 'VRR OpenService';
                
                // PRIORITÄT: Wenn wir eine DB-TripId haben, nutzen wir diese IMMER für Züge
                // Strategie:
                // 1. Direkte DB-TripId → /api/train-details/:id  (schnellster Weg, 1 Call)
                // 2. Zug ohne DB-TripId → /api/db/trip-details?number= liefert stopovers direkt (1 Call)
                // 3. Kein Zug / Fallback → /api/trips/:vrrId (VRR OpenService)
                let data;
                if (dbTripId) {
                    url = `${API_BASE}/api/train-details/${encodeURIComponent(dbTripId)}`;
                    sourceName = 'Deutsche Bahn';
                    const res = await fetch(url, { signal: AbortSignal.timeout(9000) });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    data = await res.json();
                } else if (isTrainLine) {
                    // /api/db/trip-details liefert stopovers direkt — kein zweiter Call nötig
                    const number = dep.line?.name || dep.line?.id || '';
                    const date   = $('query-date').value || new Date().toISOString().slice(0, 10);
                    sourceName   = 'Deutsche Bahn';
                    try {
                        const res = await fetch(
                            `${API_BASE}/api/db/trip-details?number=${encodeURIComponent(number)}&date=${encodeURIComponent(date)}`,
                            { signal: AbortSignal.timeout(8000) }
                        );
                        if (res.ok) data = await res.json();
                    } catch (e) { console.warn('DB-Suche fehlgeschlagen, Fallback zu VRR'); }
                    // Fallback zu VRR wenn DB nicht antwortet
                    if (!data?.stopovers?.length && vrrTripId) {
                        url = `${API_BASE}/api/trips/${encodeURIComponent(vrrTripId)}`;
                        sourceName = 'VRR OpenService';
                        const res = await fetch(url, { signal: AbortSignal.timeout(9000) });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        data = await res.json();
                    }
                } else {
                    // Bus / Tram / lokaler ÖPNV → VRR
                    if (!vrrTripId) throw new Error('Keine Trip-ID verfügbar');
                    url = `${API_BASE}/api/trips/${encodeURIComponent(vrrTripId)}`;
                    sourceName = 'VRR OpenService';
                    const res = await fetch(url, { signal: AbortSignal.timeout(9000) });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    data = await res.json();
                }

                if (!data) throw new Error('Keine Daten empfangen');
                const stops    = data?.stopovers || [];
                const remarks  = data?.remarks   || [];
                currentDetailStopovers = stops; // Für Karte cachen
                addTripToArchive(dep, { stopovers: stops, remarks }, sourceName);
                renderItinerary(stops, remarks, sourceName);
                // Neue Features
                updateTripPosition(stops);
                loadWagonFormation(dep);
                updatePushButton(dep);
            } catch (e) {
                console.error('Trip details failed', e);
                itinerary.innerHTML = `<div class="py-20 text-center text-red-500">Fahrtverlauf konnte nicht geladen werden.</div>`;
            }
        }

                "WC accessible for wheelchair users":"rollstuhlgerechtes WC vorhanden",

                "Bicycles conveyed - not possible":"Fahrradmitnahme nicht möglich",
                "Bicycles conveyed - subject to reservation":"Fahrradmitnahme nur mit Reservierung",
                "Bicycles conveyed - subject to availability":"Fahrradmitnahme nach Verfügbarkeit",
                "Number of bicycles conveyed limited":"Fahrradmitnahme eingeschränkt",
                "one coach missing":"ein Wagen fehlt",
                "several coaches missing":"mehrere Wagen fehlen",
                "different coach order":"geänderte Wagenreihung",
                "no 1st class":"1. Klasse fehlt",
                "no multi-purpose compartment":"Mehrzweckabteil fehlt",
                "today: multi-purpose compartment at the front":"heute: Mehrzweckabteil vorne",
                "today: multi-purpose compartment at the rear":"heute: Mehrzweckabteil hinten",
                "today: 1st class at the front":"heute: 1. Klasse vorne",
                "today: 1st class at the rear":"heute: 1. Klasse hinten",
                "entire train without reservation":"kein Zug ohne Reservierung",
                "individual coaches without reservation":"einzelne Wagen ohne Reservierung",
                "overcrowded with compensation":"Überfüllung mit Kulanz",
                "overcrowded without compensation":"Überfüllung ohne Kulanz",
                "other quality defects":"sonstige Qualitätsmängel",
                "no quality defects":"keine Qualitätsmängel",
                "reservations available again":"Reservierungen wieder möglich",
                "train running in correct formation":"Zug wieder korrekt gereiht",
            };
            const regexTranslations = [
                { pattern: /^(.+?)\s+heading towards\s+(.+?)\s+from here\.?$/i, replace: (_, l, d) => `Durchbindung: Kommt als Linie ${l.trim()} aus Richtung ${d.trim()}.` },
                { pattern: /^(.+?)\s+heading towards\s+(.+?)\.?$/i,             replace: (_, l, d) => `Durchbindung: Fährt weiter als Linie ${l.trim()} Richtung ${d.trim()}.` },
                { pattern: /^throughbinding\s+from\s+(?:line\s+)?(.+)$/i,       replace: (_, l) => `Durchbindung von Linie ${l.trim()}.` },
                { pattern: /^throughbinding\s+(?:on|as|to)\s+(?:line\s+)?(.+)$/i, replace: (_, l) => `Durchbindung auf Linie ${l.trim()}.` },
                { pattern: /^continues?\s+as\s+(?:line\s+)?(.+)$/i,             replace: (_, l) => `Fährt weiter als Linie ${l.trim()}.` },
                { pattern: /^coming\s+from\s+(?:line\s+)?(.+)$/i,               replace: (_, l) => `Kommt als Linie ${l.trim()}.` },
                { pattern: /^delay\s+of\s+approx\.?\s+(\d+)\s+minutes?\.?$/i, replace: (_, m) => `Verspätung von ca. ${m} Minuten.` },
                { pattern: /^cancelled\s+due\s+to\s+(.+)$/i,                    replace: (_, r) => `Fällt aus wegen: ${r.trim()}.` },
                { pattern: /^stop\s+(.+?)\s+is\s+not\s+served\.?$/i,          replace: (_, s) => `Halt ${s.trim()} entfällt.` },
            ];
            const translate = (text) => {
                if (!text) return '';
                if (translationMap[text]) return translationMap[text];
                for (const { pattern, replace } of regexTranslations) {
                    if (text.match(pattern)) return text.replace(pattern, replace);
                }
                return text;
            };

            const sorted = [...stopovers].sort((a, b) =>
                new Date(a.plannedDeparture || a.plannedArrival) - new Date(b.plannedDeparture || b.plannedArrival)
            );
            const now = Date.now();

            sorted.forEach((stop, idx) => {
                const isFirst    = idx === 0;
                const isLast     = idx === sorted.length - 1;
                const isTerminus = isFirst || isLast;

                const pArr = stop.plannedArrival   ? new Date(stop.plannedArrival)   : null;
                const aArr = stop.arrival          ? new Date(stop.arrival)          : null;
                const pDep = stop.plannedDeparture ? new Date(stop.plannedDeparture) : null;
                const aDep = stop.departure        ? new Date(stop.departure)        : null;

                // Welche Zeit in der Zeiten-Spalte: Start→nur Abfahrt, Ende→nur Ankunft, Mitte→Ankunft bevorzugt
                const schedTime  = isFirst ? pDep : (pArr || pDep);
                const actualTime = isFirst ? aDep : (aArr || aDep);
                let   delaySec   = isFirst
                    ? (stop.departureDelaySec ?? (aDep && pDep ? Math.round((aDep - pDep) / 1000) : null))
                    : (stop.arrivalDelaySec   ?? (aArr && pArr ? Math.round((aArr - pArr) / 1000) : null));
                if (delaySec === undefined) delaySec = null;

                const passed = (aDep && aDep < now) || (aArr && aArr < now) || (!aDep && !aArr && pDep && pDep < now);

                const fmt2 = d => d ? d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : null;
                const fmt3 = d => d ? d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : null;

                // Delay-Badge:
                // - Verfrühung (negativ): immer anzeigen, auch <60s (in Sekunden)
                // - Verspätung (positiv): erst ab 60s (in Minuten)
                // - Pünktlich (0): grünes +0
                const makeDelayBadge = (sec, actualTime) => {
                    if (sec === null || sec === undefined) return { badge: '', timeCls: '' };
                    const abs = Math.abs(sec);
                    // Farbklasse
                    const timeCls = sec >= 60  ? 'text-red-400'
                                  : sec > 0    ? 'text-orange-400'   // 1-59s Verspätung: orange
                                  : sec < 0    ? 'text-blue-400'     // Verfrühung: blau
                                  :              'text-green-400';   // pünktlich: grün
                    
                    // Sekunden-Anzeige für die Ist-Zeit (immer wenn vorhanden)
                    const actualStr = actualTime ? actualTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
                    const actualHtml = actualStr ? `<span class="text-[9px] font-mono font-bold leading-none ${timeCls}">${actualStr}</span>` : '';

                    // Badge-Label (+1', -15s, etc.)
                    let label, cls;
                    if (sec === 0) {
                        label = '+0'; cls = 'delay-zero';
                    } else if (sec < 0) {
                        label = abs >= 60 ? `-${Math.floor(abs/60)}'` : `-${abs}s`;
                        cls   = 'delay-neg';
                    } else if (sec >= 60) {
                        label = `+${Math.floor(sec/60)}'`;
                        cls   = 'delay-pos';
                    } else {
                        // 1-59s Verspätung: kein Label, nur Ist-Zeit
                        return { badge: actualHtml, timeCls };
                    }
                    const badgeHtml = `<span class="itin-delay ${cls}">${label}</span>`;
                    return { badge: `${actualHtml}${badgeHtml}`, timeCls };
                };

                // Ankunft (nicht am Starthalt)
                const pArrD   = !isFirst ? pArr : null;
                const aArrD   = !isFirst ? aArr : null;
                const arrDSec = !isFirst
                    ? (stop.arrivalDelaySec   ?? (aArrD && pArrD ? Math.round((aArrD - pArrD) / 1000) : delaySec))
                    : null;
                const arrEff  = aArrD || (pArrD && arrDSec !== null ? new Date(pArrD.getTime() + arrDSec * 1000) : null);
                const { badge: arrBadge, timeCls: arrCls } = makeDelayBadge(arrDSec, arrEff);

                // Abfahrt (nicht am Endhalt)
                const pDepD   = !isLast ? pDep : null;
                const aDepD   = !isLast ? aDep : null;
                const depDSec = !isLast
                    ? (stop.departureDelaySec ?? (aDepD && pDepD ? Math.round((aDepD - pDepD) / 1000) : delaySec))
                    : null;
                const depEff  = aDepD || (pDepD && depDSec !== null ? new Date(pDepD.getTime() + depDSec * 1000) : null);
                const { badge: depBadge, timeCls: depCls } = makeDelayBadge(depDSec, depEff);

                // Zeitzeile: Soll | Ist (dünn+kursiv wenn Zukunft) | Badge
                const makeTimeRow = (label, schedD, effActD, badge, timeCls) => {
                    if (!schedD) return '';
                    // Ist-Zeit (effActD) wird bereits im Badge/Label mit Sekunden angezeigt
                    return `<div class="itin-time-row"><span class="itin-label">${label}</span><span class="itin-sched${passed ? ' opacity-40' : ''}">${fmt2(schedD)}</span>${badge}</div>`;
                };

                const arrRow = makeTimeRow('an', pArrD, arrEff, arrBadge, arrCls);
                const depRow = makeTimeRow('ab', pDepD, depEff, depBadge, depCls);

                const row = document.createElement('div');
                row.className = [
                    'itinerary-item',
                    stop.cancelled  ? 'is-cancelled'  : '',
                    stop.additional ? 'is-additional' : '',
                ].join(' ').trim();

                // Gleis-Daten (finale HTML-Ausgabe passiert weiter unten nach Produkt-Erkennung)
                const platPlanned = stop.plannedPlatform || null;
                const platActual  = stop.platform || null;
                const platChanged = platPlanned && platActual && platPlanned !== platActual;
                const platDisplay = platActual || platPlanned;

                // Hinweis
                const remarkText = stop.remarks?.[0]?.text;
                const remarkHtml = remarkText
                    ? `<span class="itin-remark"><i class="fas fa-exclamation-triangle mr-1"></i>${translate(remarkText)}</span>`
                    : '';

                // Besondere Halt-Zustände bestimmen
                const isCancelledStop  = stop.cancelled;
                const isAdditionalStop = stop.additional;
                // Produkt aus Liniendaten (wird im Fahrtverlauf nicht immer geliefert)
                // Wir nutzen den übergeordneten currentTripDetail
                const isBusTrip = currentTripDetail?.line?.product === 'bus' ||
                                  currentTripDetail?.line?.product === 'tram' ||
                                  currentTripDetail?.line?.product === 'subway';
                const platLabel = isBusTrip ? 'Bussteig' : 'Gleis';

                // Dot-Farbe nach Status
                const dotColor = isCancelledStop  ? 'bg-gray-600'
                               : isAdditionalStop ? 'bg-blue-500'
                               : passed           ? 'bg-gray-600'
                               :                    'bg-red-600';

                // Namens-Style
                const nameStyle = isCancelledStop
                    ? 'line-through text-gray-500'
                    : isAdditionalStop
                        ? 'text-blue-400'
                        : '';

                // Statusbadge
                const statusBadge = isCancelledStop
                    ? '<span class="ml-1.5 text-[9px] font-bold text-red-500 uppercase bg-red-500/10 px-1 rounded">entfällt</span>'
                    : isAdditionalStop
                        ? '<span class="ml-1.5 text-[9px] font-bold text-blue-400 uppercase bg-blue-500/10 px-1 rounded">Zusatz</span>'
                        : '';

                // Gleis/Bussteig mit Änderungsmarkierung
                const platHtmlFinal = platDisplay
                    ? platChanged
                        ? `<span class="itin-platform changed" title="Gleis geändert">⚠ ${platLabel} ${platActual} <span class="line-through opacity-50">${platPlanned}</span></span>`
                        : `<span class="itin-platform">${platLabel} ${platDisplay}</span>`
                    : '';

                row.innerHTML = `
                    <div class="itin-times">
                        ${isFirst ? depRow : arrRow}
                        ${!isFirst && !isLast ? depRow : ''}
                        ${isLast  ? makeTimeRow('an', pArr, arrEff, arrBadge, arrCls) : ''}
                    </div>
                    <div class="itin-dot-col">
                        <div class="itin-seg${isFirst ? ' opacity-0' : ''}"></div>
                        <div class="itin-dot ${dotColor}${isTerminus ? ' terminus' : ''}"></div>
                        <div class="itin-seg${isLast ? ' opacity-0' : ''}"></div>
                    </div>
                    <div>
                        <span class="itin-name${isTerminus ? ' terminus' : ''}${passed && !isCancelledStop ? ' passed' : ''} ${nameStyle}">${stop.stop.name}</span>${statusBadge}${platHtmlFinal}${remarkHtml}
                    </div>
                `;
                container.appendChild(row);
            });

            // Gesamthinweise am Ende
            if (tripRemarks.length > 0) {
                const rem = document.createElement('div');
                rem.className = 'mt-3 pt-3 border-t border-zinc-900 space-y-1';
                tripRemarks.forEach(r => {
                    const d = document.createElement('div');
                    d.className = 'text-[10px] text-red-500 flex items-start gap-1.5';
                    d.innerHTML = `<i class="fas fa-info-circle mt-0.5 shrink-0"></i><span>${translate(r.text)}</span>`;
                    rem.appendChild(d);
                });
                container.appendChild(rem);
            }
        }

        // ─── Wagenreihung ────────────────────────────────────────────────────────────
        async function loadWagonFormation(dep) {
            const lineName = dep.line?.name || '';
            if (!isTrain(dep.line)) return;

            const section  = $('wagon-section');
            const display  = $('wagon-display');
            const srcLabel = $('wagon-source');
            section.classList.remove('hidden');
            display.innerHTML = '<span class="text-[10px] text-gray-500 italic"><i class="fas fa-spinner fa-spin mr-1"></i>Lade Wagenreihung...</span>';

            // Zugnummer extrahieren (z.B. "RE 10618" → "10618", "ICE 104" → "104")
            const numMatch = lineName.match(/\d+/);
            const trainNum = numMatch ? numMatch[0] : null;
            if (!trainNum) { section.classList.add('hidden'); return; }

            const date = $('query-date').value || new Date().toISOString().slice(0,10);
            const year = date.slice(0,4);

            // Versuch 1: DB Wagenstand-API (inoffiziell, aber öffentlich)
            try {
                const dbUrl = `https://www.bahn.de/web/api/reiseloesung/auslastung?zugnummer=${trainNum}&datum=${date}`;
                // DB-API ist CORS-gesperrt vom Browser → direkt nur serverseitig möglich
                // Stattdessen: vagonweb.cz scraper (öffentlich, CORS-offen)
            } catch {}

            // Versuch 2: vagonweb.cz
            try {
                const vagonUrl = `https://www.vagonweb.cz/razeni/razeni.php?zeme=DB&rok=${year}&cislo=${trainNum}&lang=de`;
                // vagonweb.cz hat CORS → wir holen es über unseren Backend-Proxy
                const res = await fetch(`${API_BASE}/api/wagon-formation?train=${encodeURIComponent(trainNum)}&year=${year}`, {
                    signal: AbortSignal.timeout(6000)
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data?.wagons?.length) {
                        renderWagonFormation(data.wagons, data.source || 'vagonweb.cz');

                    }

        function renderWagonFormation(wagons, source) {

                else if (/bistro|speise|restaurant/i.test(w.type || '')) { cls = 'wagon-bistro'; legendItems.set('Bistro/Speise','wagon-bistro'); label = '🍽'; }
                else if (/behin|roll|wheelchair|disable/i.test(w.type || '')) { cls = 'wagon-disabled'; legendItems.set('Barrierefrei','wagon-disabled'); label = '♿'; }

                el.title = [w.type, w.class ? w.class+'. Klasse' : '', w.number ? 'Wagen '+w.number : ''].filter(Boolean).join(' · ');
                display.appendChild(el);

                legend.appendChild(span);

        // ─── Aktuelle Zugposition ────────────────────────────────────────────────────
        function updateTripPosition(stopovers) {
            const bar = $('trip-position-bar');
            if (!stopovers?.length) { bar.classList.add('hidden'); return; }

            const now = Date.now();

            // Jeden Halt in ein einheitliches Objekt mappen.
            // Für die Positionsberechnung brauchen wir:
            //   planned  = Soll-Zeit (immer vorhanden)
            //   actual   = Ist-Zeit (nur wenn Echtzeitsignal)
            //   hasRT    = ob Echtzeitsignal bekannt
            const all = stopovers.map(s => {
                const pTime = new Date(s.plannedDeparture || s.plannedArrival || 0).getTime();
                // Ist-Zeit: nur setzen wenn wirklich vorhanden, NICHT mit planned defaulten
                const rtRaw = s.departure || s.arrival || null;
                const aTime = rtRaw ? new Date(rtRaw).getTime() : null;
                const hasRT = aTime !== null && aTime !== pTime;
                return {
                    name:    s.stop?.name || '',
                    planned: pTime,
                    actual:  aTime,          // null = kein Signal
                    hasRT,
                };
            }).filter(s => s.planned > 0);

            if (!all.length) { bar.classList.add('hidden'); return; }

            const first = all[0];
            const last  = all[all.length - 1];

            // Abgefahrene Halte = actual vorhanden UND liegt in der Vergangenheit
            // ODER planned liegt in der Vergangenheit (wenn kein RT)
            const effectiveTime = s => s.actual ?? s.planned;
            const past   = all.filter(s => effectiveTime(s) <= now);
            const future = all.filter(s => effectiveTime(s) > now);

            const lastPast = past[past.length - 1] || null;
            const nextStop = future[0] || null;

            // ── Fortschrittsberechnung mit Echtzeit-Interpolation ──────────────────
            // Wenn wir zwischen zwei Halten sind:
            //   - letzter bestätigter Halt (lastPast) mit seiner Ist-Abfahrtszeit
            //   - nächster Halt (nextStop) mit seiner Ist-Ankunftszeit
            // → Fortschritt = linear interpoliert zwischen diesen beiden Zeitpunkten
            let pct = 0;
            let hasAnyRT = all.some(s => s.hasRT);

            if (!lastPast) {
                // Noch vor dem ersten Halt
                pct = 0;
            } else if (!nextStop) {
                // Nach dem letzten Halt
                pct = 100;
            } else {
                // Zwischen lastPast und nextStop interpolieren
                const segStart = effectiveTime(lastPast);
                const segEnd   = effectiveTime(nextStop);
                const segLen   = segEnd - segStart;
                if (segLen > 0) {
                    pct = ((now - segStart) / segLen) * 100;
                    pct = Math.min(100, Math.max(0, pct));
                }

                // Gesamtfortschritt: Anteil der zurückgelegten Halte + aktuelles Segment
                // Basis: Haltindex statt reiner Zeit (robuster bei Verspätungen)
                const totalHalts = all.length - 1;
                const pastHalts  = past.length - 1; // Halte die wir verlassen haben
                const segProgress = pct / 100;
                pct = totalHalts > 0
                    ? ((pastHalts + segProgress) / totalHalts) * 100
                    : pct;
                pct = Math.min(100, Math.max(0, pct));
            }

            bar.classList.remove('hidden');
            $('pos-origin').textContent = first.name;
            $('pos-dest').textContent   = last.name;
            $('pos-fill').style.width   = pct.toFixed(1) + '%';

            // Status-Text
            if (pct <= 0) {
                $('pos-status').innerHTML = '<span class="text-gray-400">Noch nicht gestartet</span>';
            } else if (pct >= 100) {
                $('pos-status').innerHTML = '<span class="text-green-400">Ziel erreicht</span>';
            } else {
                const rtBadge = hasAnyRT
                    ? '<span class="text-[9px] text-green-400 ml-1"><i class="fas fa-satellite-dish"></i> RT</span>'
                    : '<span class="text-[9px] text-gray-600 ml-1">Soll</span>';
                $('pos-status').innerHTML = `<span>${Math.round(pct)}% gefahren</span>${rtBadge}`;
            }

            // Nächster Halt mit Echtzeit-Minutenangabe
            if (nextStop) {
                const eta = effectiveTime(nextStop);
                const minLeft = Math.round((eta - now) / 60000);
                const rtIcon  = nextStop.hasRT
                    ? '<i class="fas fa-bolt text-yellow-400 mr-0.5" title="Echtzeitdaten"></i>'
                    : '';
                const minStr  = minLeft <= 0
                    ? '<span class="text-yellow-400">jetzt</span>'
                    : `in <b class="text-white">~${minLeft} Min</b>`;
                $('pos-next').innerHTML =
                    `<i class="fas fa-map-marker-alt mr-1 text-red-500"></i>${rtIcon}Nächster Halt: <b class="text-white">${nextStop.name}</b> ${minStr}`;
            } else if (lastPast) {
                const rtIcon = lastPast.hasRT
                    ? '<i class="fas fa-bolt text-yellow-400 mr-0.5"></i>'
                    : '';
                $('pos-next').innerHTML =
                    `<i class="fas fa-flag-checkered mr-1 text-green-500"></i>${rtIcon}Letzter Halt: <b class="text-white">${lastPast.name}</b>`;
            }
        }

        // ─── Push-Benachrichtigungen ─────────────────────────────────────────────────
        const PUSH_KEY = 'dilaeit_watched_trips';

        function getWatchedTrips() {
            try { return JSON.parse(localStorage.getItem(PUSH_KEY) || '[]'); } catch { return []; }
        }

        function isWatched(tripKey) {
            return getWatchedTrips().some(t => t.key === tripKey);
        }

        function makeTripKey(dep) {
            return `${dep.line?.name}|${dep.plannedWhen?.slice(0,16)}|${dep.direction}`;
        }

        function toggleWatch(dep) {
            const key  = makeTripKey(dep);
            let trips  = getWatchedTrips();
            const idx  = trips.findIndex(t => t.key === key);
            if (idx >= 0) {
                trips.splice(idx, 1);
            } else {
                trips.push({
                    key,
                    line:      dep.line?.name,
                    direction: dep.direction,
                    when:      dep.plannedWhen,
                    tripId:    dep.tripId || dep.dbTripId,
                    saved:     Date.now()
                });
            }
            localStorage.setItem(PUSH_KEY, JSON.stringify(trips.filter(t => Date.now() - t.saved < 86400000 * 2)));
            updatePushButton(dep);
        }

        function updatePushButton(dep) {
            const btn = $('push-subscribe-btn');
            if (!btn || !dep) return;
            const watching = isWatched(makeTripKey(dep));
            if (watching) {
                btn.innerHTML = '<i class="fas fa-bell text-yellow-400"></i>';
                btn.title = 'Fahrt wird beobachtet – klicken zum Entfernen';
                btn.classList.add('border-yellow-400');
            } else {
                btn.innerHTML = '<i class="far fa-bell"></i>';
                btn.title = 'Fahrt beobachten (Benachrichtigung bei Verspätung)';
                btn.classList.remove('border-yellow-400');
            }
        }

        // Watched-Trips im Hintergrund auf Verspätung prüfen
        async function checkWatchedTrips() {
            const trips = getWatchedTrips().filter(t => {
                const when = new Date(t.when);
                const diff = when - Date.now();
                return diff > -3600000 && diff < 7200000; // 1h vergangen bis 2h in Zukunft
            });
            for (const trip of trips) {
                if (!trip.tripId) continue;
                try {
                    // Versuche DB-Endpoint, dann VRR-Fallback
                    let res = await fetch(`${API_BASE}/api/train-details/${encodeURIComponent(trip.tripId)}`);
                    if (!res.ok) res = await fetch(`${API_BASE}/api/trips/${encodeURIComponent(trip.tripId)}`);
                    if (!res.ok) continue;
                    const data = await res.json();
                    const dep  = data.stopovers?.find(s => s.departureDelaySec !== null);
                    // Benachrichtigung ab +3 Minuten (180s) Verspätung
                    const notifKey = `notif_${trip.key}_${Math.floor(Date.now()/300000)}`; // max 1x alle 5min
                    const worstStop = data.stopovers?.reduce((best, s) => {
                        const d = s.departureDelaySec ?? s.arrivalDelaySec;
                        return (d !== null && (best === null || d > (best.departureDelaySec ?? best.arrivalDelaySec ?? 0))) ? s : best;
                    }, null);
                    const worstDelay = worstStop ? (worstStop.departureDelaySec ?? worstStop.arrivalDelaySec ?? 0) : 0;
                    if (worstDelay >= 180 && !sessionStorage.getItem(notifKey)) {
                        sessionStorage.setItem(notifKey, '1');
                        const mins = Math.round(worstDelay / 60);
                        showLocalNotification(
                            `${trip.line} → ${trip.direction}`,
                            `+${mins} Min Verspätung bei ${worstStop?.stop?.name || 'einem Halt'}`
                        );
                    }
                } catch {}
            }
        }

        function showLocalNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico', tag: title });
            } else {
                // Fallback: visuelles Toast-Banner
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-4 right-4 z-[200] bg-zinc-900 border border-yellow-400 text-white rounded-2xl px-4 py-3 shadow-2xl max-w-xs text-sm';
                toast.innerHTML = `<div class="font-bold text-yellow-400 mb-1">${title}</div><div class="text-gray-300 text-xs">${body}</div>`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 6000);
            }
        }

        // Notification-Berechtigung anfragen
        async function requestNotificationPermission() {
            if (!('Notification' in window)) return false;
            if (Notification.permission === 'granted') return true;
            if (Notification.permission === 'denied') return false;
            const result = await Notification.requestPermission();
            return result === 'granted';
        }

        // ─── Detail-Tabs ─────────────────────────────────────────────────────────────
        let trainMap = null;
        let trainMarker = null;
        let trainPolyline = null;
        let trainStopMarkers = [];
        let mapRefreshTimer = null;

        function switchDetailTab(tab) {

        // ─── Zugverfolgung auf Karte ─────────────────────────────────────────────────
        async function initTrainMap(dep) {
            const mapEl    = $('train-map');
            const statusEl = $('map-status');
            if (!mapEl) return;

            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Lade Kartendaten...';

            // Karte immer neu aufbauen (DOM-Element kann nach Reopen neu sein)
            if (trainMap) {
                try { trainMap.remove(); } catch(e) {}
                trainMap = null;
                trainMarker = null;
                trainPolyline = null;
            }
            // Sicherstellen dass das Element leer ist

            trainMap = L.map(mapEl, { zoomControl: true, attributionControl: false });

            // Dark-Mode Basiskarte (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19, subdomains: 'abcd'
            }).addTo(trainMap);

            // OpenRailwayMap Overlay (Retina tiles 512px)
            L.tileLayer('https://tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {

            }).addTo(trainMap);

            L.control.attribution({ prefix: '© OSM · CartoDB · OpenRailwayMap' }).addTo(trainMap);

            // Kurz warten bis das Element gerendert ist, dann Daten laden

                // Alle 20s aktualisieren solange Karte sichtbar
                if (mapRefreshTimer) clearInterval(mapRefreshTimer);

        async function updateTrainMapPosition(dep) {
            const statusEl = $('map-status');
            const dbTripId = dep.dbTripId || dep.tripId;

            // Stopovers mit Koordinaten beschaffen
            // Priorität: gecachte Stopovers → falls keine Koordinaten → direkt DB-REST
            let stopovers = currentDetailStopovers;

            // Prüfe ob Koordinaten vorhanden sind
            const hasCoords = stopovers?.some(s => s.stop?.location?.latitude);

            if (!hasCoords && dbTripId) {
                try {
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Lade Streckendaten...';
                    const url = `https://v6.db.transport.rest/trips/${encodeURIComponent(dbTripId)}?stopovers=true&remarks=false`;
                    const r   = await fetch(url, { signal: AbortSignal.timeout(10000) });
                    if (r.ok) {
                        const d = await r.json();
                        stopovers = (d.trip ?? d).stopovers || [];
                    }
                } catch (e) {
                    statusEl.textContent = 'Fehler beim Laden der Streckendaten.';
                    return;
                }
            }

            if (!stopovers?.length) {
                statusEl.textContent = 'Keine Positionsdaten verfügbar.';
                return;
            }

            // Koordinaten extrahieren
            const points = stopovers
                .filter(s => s.stop?.location?.latitude)
                .map(s => ({
                    lat:     s.stop.location.latitude,
                    lng:     s.stop.location.longitude,
                    name:    s.stop.name,
                    planned: new Date(s.plannedDeparture || s.plannedArrival || 0).getTime(),
                    actual:  (s.departure || s.arrival)
                        ? new Date(s.departure || s.arrival).getTime()
                        : null
                }));

            if (!points.length) {
                statusEl.innerHTML = '<span class="text-yellow-400">Keine Koordinaten – nur für DB-Züge verfügbar.</span>';
                return;
            }

            // Zugposition interpolieren
            const now  = Date.now();
            const pos  = interpolateTrainPosition(points, now);

            // Alte Stop-Marker entfernen
            trainStopMarkers.forEach(m => { try { trainMap.removeLayer(m); } catch(e){} });
            trainStopMarkers = [];

            // Strecke zeichnen
            if (trainPolyline) { try { trainMap.removeLayer(trainPolyline); } catch(e){} }
            const latLngs = points.map(p => [p.lat, p.lng]);
            trainPolyline = L.polyline(latLngs, {
                color: '#ef4444', weight: 3, opacity: 0.7, dashArray: '6,4'
            }).addTo(trainMap);

            // Halte als kleine Kreise zeichnen
            points.forEach((p, i) => {
                const isPast    = (p.actual || p.planned) < now;
                const isNext    = !isPast && (i === 0 || (points[i-1].actual || points[i-1].planned) < now);
                const color     = isPast ? '#374151' : isNext ? '#f97316' : '#6b7280';
                const radius    = isNext ? 7 : 5;
                const sm = L.circleMarker([p.lat, p.lng], {
                    radius, color, fillColor: color, fillOpacity: 1, weight: isNext ? 2 : 1,
                    bubblingMouseEvents: false
                }).bindTooltip(p.name, { direction: 'top', offset: [0, -8] }).addTo(trainMap);
                trainStopMarkers.push(sm);
            });

            // Zugmarker setzen / updaten
            if (trainMarker) trainMap.removeLayer(trainMarker);
            const trainIcon = L.divIcon({
                html: '<div class="train-marker-icon"><i class="fas fa-train" style="font-size:12px"></i></div>',
                className: '', iconSize: [28, 28], iconAnchor: [14, 14]
            });
            trainMarker = L.marker([pos.lat, pos.lng], { icon: trainIcon, zIndexOffset: 1000 })
                .bindPopup(`<b>${dep.line?.name || ''}</b><br>${dep.direction || ''}<br><span style="font-size:11px;color:#9ca3af">${pos.label}</span>`)
                .addTo(trainMap);

            // Karte auf Zug zentrieren
            trainMap.setView([pos.lat, pos.lng], trainMap.getZoom() < 8 ? 11 : trainMap.getZoom());
            // Invalidate size (wichtig wenn Tab vorher hidden war)
            setTimeout(() => trainMap.invalidateSize(), 100);

            statusEl.innerHTML = `<i class="fas fa-circle text-green-500 text-[8px] mr-1"></i>${pos.label} · zuletzt aktualisiert ${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
        }

        // Interpoliert die aktuelle Zugposition zwischen zwei bekannten Halten
        function interpolateTrainPosition(points, now) {
            if (!points.length) return { lat: 0, lng: 0, label: '?' };

            // Alle bereits abgefahrenen Punkte
            const past   = points.filter(p => (p.actual || p.planned) <= now);
            const future = points.filter(p => (p.actual || p.planned) >  now);

            if (!past.length)   return { ...points[0],    label: `Vor ${points[0].name}` };
            if (!future.length) return { ...points[points.length-1], label: `Nach ${points[points.length-1].name}` };

            const from = past[past.length - 1];
            const to   = future[0];

            const segStart = from.actual || from.planned;
            const segEnd   = to.actual   || to.planned;
            const segLen   = segEnd - segStart;
            const t        = segLen > 0 ? Math.min(1, Math.max(0, (now - segStart) / segLen)) : 0;

            // Lineare Interpolation der Koordinaten
            const lat = from.lat + (to.lat - from.lat) * t;
            const lng = from.lng + (to.lng - from.lng) * t;

            const minLeft = Math.round((segEnd - now) / 60000);
            const label   = minLeft <= 0
                ? `Ankunft in ${to.name}`
                : `→ ${to.name} in ~${minLeft} Min`;

            return { lat, lng, label };
        }

        // Stopovers der aktuellen Fahrt cachen für Karten-Wiederverwendung
        let currentDetailStopovers = null;

        // ─── Historische Pünktlichkeit (IndexedDB) ───────────────────────────────────
        const IDB_NAME    = 'dilaeit_rt';
        const IDB_VERSION = 1;
        const IDB_STORE   = 'departures';

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(IDB_NAME, IDB_VERSION);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(IDB_STORE)) {
                        const store = db.createObjectStore(IDB_STORE, { keyPath: 'key' });
                        store.createIndex('lineDate', ['lineName','dateStr'], { unique: false });
                        store.createIndex('ts', 'ts', { unique: false });
                    }
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }

        // Echtzeit-Abfahrt in IndexedDB speichern
        async function saveRtDeparture(dep) {
            if (dep.delay === null || dep.delay === undefined) return; // kein Signal → nicht speichern
            try {
                const db    = await openDB();
                const now   = new Date();
                const dateStr = now.toISOString().slice(0,10);
                const key   = `${dep.line?.name}|${dep.plannedWhen}|${dep.direction}`;
                const record = {
                    key,
                    lineName:  dep.line?.name || '?',
                    direction: dep.direction  || '',
                    dateStr,
                    plannedWhen: dep.plannedWhen,
                    delaySec: dep.delay,
                    cancelled: dep.cancelled || false,
                    ts: Date.now()
                };
                const tx    = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).put(record);
                // Einträge älter als 60 Tage löschen
                const cutoff = Date.now() - 60 * 86400000;
                const idx    = tx.objectStore(IDB_STORE).index('ts');
                const range  = IDBKeyRange.upperBound(cutoff);
                idx.openCursor(range).onsuccess = e => {
                    const cursor = e.target.result;
                    if (cursor) { cursor.delete(); cursor.continue(); }
                };
            } catch (e) { console.warn('IDB save error:', e); }
        }

        // Pünktlichkeits-Statistik für eine Linie aus IndexedDB laden und anzeigen
        async function renderPunctualityHistory(dep) {
            const el = $('punctuality-content');
            if (!el) return;
            el.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Lade Statistiken...';

            try {
                const db       = await openDB();
                const lineName = dep.line?.name || '?';
                const tx       = db.transaction(IDB_STORE, 'readonly');
                const store    = tx.objectStore(IDB_STORE);
                const index    = store.index('lineDate');

                // Alle Einträge für diese Linie holen (alle Daten)
                const records = await new Promise((resolve, reject) => {
                    const results = [];
                    // Wir iterieren über alle Einträge und filtern nach Linienname
                    store.openCursor().onsuccess = e => {
                        const cursor = e.target.result;
                        if (cursor) {
                            if (cursor.value.lineName === lineName) results.push(cursor.value);
                            cursor.continue();
                        } else {
                            resolve(results);
                        }
                    };
                    store.openCursor().onerror = reject;
                });

                if (records.length === 0) {
                    el.innerHTML = `
                        <div class="text-center py-6 text-gray-500">
                            <i class="fas fa-chart-bar text-2xl mb-2 block opacity-30"></i>
                            Noch keine Daten für <b class="text-white">${lineName}</b> gespeichert.<br>
                            <span class="text-[10px] mt-1 block">Daten werden automatisch gesammelt sobald du Abfahrten dieser Linie siehst.</span>
                        </div>`;
                    return;
                }

                // Statistiken berechnen
                const total     = records.length;
                const cancelled = records.filter(r => r.cancelled).length;
                const withDelay = records.filter(r => !r.cancelled && r.delaySec !== null);
                // DB offiziell ab +6min, ÖPNV ab +3min
                const punctThreshSec = isTrain({ name: lineName }) ? 360 : 180;
                const onTime    = withDelay.filter(r => r.delaySec < punctThreshSec).length;
                const delayed   = withDelay.filter(r => r.delaySec >= punctThreshSec).length;
                const avgDelay  = withDelay.length
                    ? Math.round(withDelay.reduce((s, r) => s + Math.max(0, r.delaySec), 0) / withDelay.length)
                    : 0;
                const maxDelay  = withDelay.length
                    ? Math.max(...withDelay.map(r => r.delaySec))
                    : 0;

                const pctOnTime = total > 0 ? Math.round((onTime / total) * 100) : 0;
                const pctColor  = pctOnTime >= 80 ? 'text-green-400' : pctOnTime >= 60 ? 'text-yellow-400' : 'text-red-400';

                // Nach Wochentag gruppieren
                const byDay = {};
                withDelay.forEach(r => {
                    const day = new Date(r.ts).getDay(); // 0=So, 1=Mo, ...
                    if (!byDay[day]) byDay[day] = [];
                    byDay[day].push(r.delaySec);
                });
                const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
                const dayBars  = [1,2,3,4,5,6,0].map(d => {
                    const vals = byDay[d] || [];
                    const avg  = vals.length ? Math.round(vals.reduce((s,v) => s+Math.max(0,v),0) / vals.length / 60) : 0;
                    return { name: dayNames[d], avg, count: vals.length };
                });
                const maxBar = Math.max(...dayBars.map(b => b.avg), 1);

                el.innerHTML = `
                    <div class="space-y-4">
                        <!-- Hauptzahl -->
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="text-3xl font-black ${pctColor}">${pctOnTime}%</div>
                                <div class="text-[10px] text-gray-500">pünktlich (< ${isTrain({name:lineName})?'6':'3'} Min)</div>
                            </div>
                            <div class="text-right text-[10px] text-gray-400 space-y-0.5">
                                <div><span class="text-white font-bold">${total}</span> Fahrten gespeichert</div>
                                <div><span class="text-red-400 font-bold">${cancelled}</span> ausgefallen</div>
                                <div>Ø Verspätung <span class="text-red-400 font-bold">${Math.round(avgDelay/60)}'</span></div>
                                <div>Max <span class="text-red-500 font-bold">+${Math.round(maxDelay/60)}'</span></div>
                            </div>
                        </div>

                        <!-- Fortschrittsbalken Pünktlichkeit -->
                        <div>
                            <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                                <span>Pünktlich</span><span>Mit Verspätung</span>
                            </div>
                            <div class="h-2 rounded-full bg-zinc-800 overflow-hidden">
                                <div class="h-full rounded-full bg-green-500 transition-all" style="width:${pctOnTime}%"></div>
                            </div>
                        </div>

                        <!-- Balkendiagramm nach Wochentag -->
                        <div>
                            <div class="text-[10px] text-gray-500 mb-2 uppercase tracking-wider">Ø Verspätung nach Wochentag</div>
                            <div class="flex items-end gap-1 h-16">
                                ${dayBars.map(b => {
                                    const h   = maxBar > 0 ? Math.round((b.avg / maxBar) * 100) : 0;
                                    const col = b.avg === 0 ? 'bg-green-600' : b.avg <= 2 ? 'bg-yellow-500' : 'bg-red-500';
                                    return `<div class="flex-1 flex flex-col items-center gap-0.5">
                                        <div class="text-[8px] text-gray-500">${b.avg > 0 ? '+'+b.avg+"'" : ''}</div>
                                        <div class="w-full ${col} rounded-t transition-all" style="height:${Math.max(4,h)}%"></div>
                                        <div class="text-[9px] text-gray-500">${b.name}</div>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>`;
            } catch (e) {
                el.innerHTML = `<span class="text-red-500">Fehler: ${e.message}</span>`;
            }
        }

        // Abfahrten automatisch in IndexedDB speichern wenn Echtzeit vorhanden
        // (wird nach jedem refreshDepartures() aufgerufen)
        async function autoSaveDepartures(departures) {
            for (const dep of departures) {
                if (dep.delay !== null && dep.delay !== undefined) {
                    await saveRtDeparture(dep);
                }
            }
        }

        // ─── Zuglauf-Übersicht ────────────────────────────────────────────────────────
        async function renderZuglauf(dep) {
            const el = $('zuglauf-content');
            if (!el) return;
            el.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Lade Zuglauf...';

            const lineName = dep.line?.name || '';
            const dbTripId = dep.dbTripId || dep.tripId;

            if (!dbTripId || !isTrain(dep.line)) {
                el.innerHTML = `<div class="text-center py-4 text-gray-500 text-xs">
                    Zuglauf nur für DB-Züge verfügbar.
                </div>`;
                return;
            }

            try {
                // DB REST liefert bei /trips/:id die gesamte Fahrt inkl. Origin/Destination
                const url = `https://v6.db.transport.rest/trips/${encodeURIComponent(dbTripId)}?stopovers=true&remarks=false`;
                const r   = await fetch(url, { signal: AbortSignal.timeout(10000) });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const trip = data.trip ?? data;

                const stops    = trip.stopovers || [];
                if (!stops.length) throw new Error('Keine Halte gefunden');

                const origin   = stops[0].stop?.name || '?';
                const dest     = stops[stops.length-1].stop?.name || '?';
                const operator = trip.line?.operator?.name || '';
                const product  = trip.line?.product || '';

                // Aktuellen Halt hervorheben
                const now = Date.now();
                let currentIdx = -1;
                stops.forEach((s, i) => {
                    const t = new Date(s.departure || s.arrival || s.plannedDeparture || s.plannedArrival || 0).getTime();
                    if (t <= now) currentIdx = i;
                });

                el.innerHTML = `
                    <div class="space-y-3">
                        <div class="flex items-start justify-between text-xs">
                            <div>
                                <div class="font-black text-white text-sm">${lineName}</div>
                                <div class="text-gray-400">${origin} → ${dest}</div>
                                ${operator ? `<div class="text-[10px] text-gray-600">${operator}</div>` : ''}
                            </div>
                            <div class="text-[10px] text-gray-500 text-right">
                                <div>${stops.length} Halte</div>
                                <div class="uppercase">${product}</div>
                            </div>
                        </div>
                        <div class="space-y-0 max-h-64 overflow-y-auto rounded-xl border border-zinc-800">
                            ${stops.map((s, i) => {
                                const isFirst   = i === 0;
                                const isLast    = i === stops.length - 1;
                                const isCurrent = i === currentIdx;
                                const isPast    = i < currentIdx;
                                const depT  = s.plannedDeparture || s.plannedArrival;
                                const timeStr = depT ? new Date(depT).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
                                const delay = (() => {
                                    const act  = s.departure || s.arrival;
                                    const plan = s.plannedDeparture || s.plannedArrival;
                                    if (!act || !plan) return '';
                                    const d = Math.round((new Date(act) - new Date(plan)) / 1000);
                                    if (Math.abs(d) < 60) return '';
                                    const mins = Math.round(d / 60);
                                    const sign = mins > 0 ? '+' : '';
                                    const cls  = mins >= 1 ? 'text-red-400' : 'text-blue-400';
                                    return `<span class="${cls} text-[9px] ml-1">${sign}${mins}'</span>`;
                                })();
                                const actTime = (() => {
                                    const act  = s.departure || s.arrival;
                                    if (!act) return '';
                                    return `<span class="text-gray-300 text-[9px] ml-1">${new Date(act).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>`;
                                })();
                                const cancelled = s.cancelled
                                    ? '<span class="text-red-500 text-[9px] ml-1">[entfällt]</span>' : '';
                                const bg = isCurrent
                                    ? 'bg-red-600/20 border-l-2 border-red-500'
                                    : isPast ? 'opacity-40' : '';
                                const dot = isCurrent ? '🔴' : isPast ? '·' : '○';
                                return `<div class="flex items-center gap-2 px-3 py-1.5 text-xs ${bg} ${isFirst||isLast?'font-bold':''}">
                                    <span class="text-[10px] w-3 text-center">${dot}</span>
                                    <span class="flex-1 truncate ${s.cancelled?'line-through text-gray-500':''}">${s.stop?.name||''}</span>
                                    <span class="font-mono text-gray-400 shrink-0">${timeStr}${actTime}${delay}${cancelled}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            } catch (e) {
                el.innerHTML = `<div class="text-red-500 text-xs">Fehler: ${e.message}</div>`;
            }
        }

        // ─── autoSaveDepartures in refreshDepartures einbinden ────────────────────────

        // Alle 90s watched trips prüfen
        setInterval(checkWatchedTrips, 90000);

        init();
    </script>
</body>
</html>
