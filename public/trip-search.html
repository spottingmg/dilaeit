<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fahrtensuche - dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #ef4444;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        .dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .trip-item {
            border-bottom: 1px solid rgba(156, 163, 175, 0.1);
        }

        .itinerary-line {
            position: absolute;
            left: 14px; top: 0; bottom: 0;
            width: 2px;
            background-color: #374151;
            z-index: 0;
        }

        .itinerary-item {
            padding-left: 32px;
            margin-bottom: 0.45rem;
            min-height: 48px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .itinerary-item-content { margin-left: 12px; }
        
        .precision-time { font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .thin-prognosis { font-weight: 300; }
        
        .delay-positive { color: #ef4444; }
        .delay-negative { color: #3b82f6; }
        .delay-zero { color: #22c55e; }
    </style>
</head>
<body class="dark transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter italic">dilaeit</h1>
            <div class="flex items-center gap-6">
                <a href="/" class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors"><i class="fas fa-arrow-left mr-2"></i>Abfahrtsmonitor</a>
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-zinc-900 hover:scale-110 transition-transform">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>
            </div>
        </header>

        <div class="space-y-6">
            <!-- Hauptsuche -->
            <div class="p-4 rounded-2xl bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800">
                <h3 class="text-sm font-bold uppercase tracking-wider text-gray-600 dark:text-gray-300 mb-4">Fahrtensuche</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="relative group">
                        <input id="trip-number-input" type="text" placeholder="Zug-/Busnummer (z.B. IC2201, 10612)" autocomplete="off" class="w-full rounded-xl p-3 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-lg focus:ring-2 focus:ring-red-500/50 outline-none transition-all" />
                        <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 transition-colors"></i>
                        <!-- Dropdown für Ergebnisse -->
                        <div id="trip-dropdown" class="absolute top-full left-0 w-full mt-2 bg-white dark:bg-zinc-900 rounded-xl shadow-2xl overflow-hidden hidden z-[100] border border-gray-100 dark:border-zinc-800 max-h-80 overflow-y-auto ring-1 ring-black/5"></div>
                    </div>
                    <div class="relative">
                        <input id="trip-date-input" type="date" class="w-full rounded-xl p-3 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 outline-none focus:ring-2 focus:ring-red-500/50 transition-all" />
                    </div>
                    <div class="flex gap-2">
                        <button id="search-trip-btn" class="flex-1 px-6 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-500 transition shadow-lg shadow-red-600/20">Suchen</button>
                        <button id="clear-trip-btn" class="px-6 py-3 bg-gray-600 text-white font-semibold rounded-xl hover:bg-gray-500 transition">Leeren</button>
                    </div>
                </div>
                <div id="trip-search-results" class="mt-4 text-sm text-gray-600 dark:text-gray-300"></div>
            </div>

            <!-- Fahrtverlauf -->
            <div id="trip-itinerary-container" class="hidden p-4 rounded-2xl bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold">Fahrtverlauf</h3>
                    <div class="text-sm text-gray-500">
                        <span id="trip-source-display">Quelle: --</span>
                    </div>
                </div>
                <!-- Zeitreise-Navigation innerhalb des Verlaufs -->
                <div id="trip-navigation" class="mb-6 flex items-center justify-between bg-white dark:bg-zinc-800 p-3 rounded-xl border border-gray-100 dark:border-zinc-700">
                    <div class="flex items-center gap-2">
                        <button id="prev-day-btn" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 transition">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="current-trip-date-display" class="text-sm font-bold px-2">--</span>
                        <button id="next-day-btn" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 transition">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="text-right text-[10px] text-gray-400 uppercase tracking-widest">
                        Fahrt: <span id="current-trip-number-display" class="font-bold text-gray-200">--</span>
                    </div>
                </div>
                <div id="trip-itinerary" class="space-y-0 relative">
                    <!-- Itinerary line is handled by stop items -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── Konfiguration ───────────────────────────────────────────────────────────
        const API_BASE = window.location.hostname === 'localhost' ? '' : 'https://dilaeit.onrender.com';

        // ─── Globale Variablen ───────────────────────────────────────────────────────
        let currentTripData = {
            number: null,
            date: null,
            results: []
        };

        const TRANSITOUS_HUBS = [
            'de:05116:8000250',  // Mönchengladbach Hbf
            'de:05315:8000207',  // Köln Hbf
            'de:05111:8000085',  // Düsseldorf Hbf
            'de:05913:8000096',  // Dortmund Hbf
            'de:05113:8000105',  // Duisburg Hbf
            'de:05124:8000191',  // Essen Hbf
            'de:05314:8000044',  // Bonn Hbf
            'de:07135:8000206',  // Koblenz Hbf
            'de:02000:8600282',  // Hamburg Hbf
            'de:11000:900003201', // Berlin Hbf
        ];

        const translationMap = {
            "technical defect on the route": "Reparatur an der Strecke",
            "repair to the line": "Reparatur an der Strecke",
            "repair to the track": "Reparatur an der Strecke",
            "repair at the track": "Reparatur an der Strecke",
            "repair on the line": "Reparatur an der Strecke",
            "repair at the overhead line": "Reparatur an der Oberleitung",
            "repair on the overhead line": "Reparatur an der Oberleitung",
            "person on the track": "Personen auf der Strecke",
            "unauthorized persons on the track": "unbefugte Personen auf der Strecke",
            "delay of a preceding train": "Verspätung eines vorausfahrenden Zuges",
            "delayed staff from previous journey": "verspätetes Personal aus vorheriger Fahrt",
            "technical defect on another train": "technischer Defekt an einem anderen Zug",
            "technical defect on the train": "technischer Defekt am Zug",
            "operational delays": "Verzögerungen im Betriebsablauf",
            "delay from previous trip": "Verspätung aus vorheriger Fahrt",
            "Platform change": "Gleiswechsel.",
            "Stop cancelled": "Halt entfällt.",
            "Train is cancelled": "Zug fällt aus."
        };

        const translate = (text) => {
            if (!text) return text;
            let out = translationMap[text] || text;
            out = out.replace(/Continues as line (.*)/i, "Fährt weiter als Linie $1");
            return out;
        };

        // ─── Init ────────────────────────────────────────────────────────────────────
        function init() {
            setupEventListeners();
            setupDefaultDate();
            attachThemeToggle();
        }

        function setupDefaultDate() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            document.getElementById('trip-date-input').value = `${y}-${m}-${d}`;
        }

        function attachThemeToggle() {
            document.getElementById('theme-toggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
            });
        }

        function setupEventListeners() {
            const input = document.getElementById('trip-number-input');
            const dropdown = document.getElementById('trip-dropdown');

            input.addEventListener('input', debounce((e) => handleTripInput(e.target.value), 300));
            input.addEventListener('focus', () => {
                if (dropdown.children.length > 0) dropdown.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.group')) dropdown.classList.add('hidden');
            });

            document.getElementById('search-trip-btn').addEventListener('click', () => handleTripSearch());
            document.getElementById('clear-trip-btn').addEventListener('click', clearTripSearch);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    dropdown.classList.add('hidden');
                    handleTripSearch();
                }
            });
            
            document.getElementById('prev-day-btn').addEventListener('click', () => changeTripDate(-1));
            document.getElementById('next-day-btn').addEventListener('click', () => changeTripDate(1));
        }

        // ─── Autocomplete für Fahrten ────────────────────────────────────────────────
        async function handleTripInput(val) {
            const query = val.trim();
            const dropdown = document.getElementById('trip-dropdown');
            const date = document.getElementById('trip-date-input').value;
            const when = date ? `${date}T12:00:00` : new Date().toISOString();

            if (query.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            dropdown.innerHTML = '<div class="px-4 py-4 text-sm text-gray-500 italic flex items-center gap-3"><i class="fas fa-circle-notch fa-spin text-red-500"></i> Suche nach Fahrten...</div>';
            dropdown.classList.remove('hidden');

            try {
                // Transitous: mehrere Hubs parallel
                const tResults = await Promise.all(
                    TRANSITOUS_HUBS.slice(0, 6).map(async stopId => {
                        try {
                            const r = await fetch(`https://api.transitous.org/api/v1/stoptimes?stopId=${stopId}&time=${encodeURIComponent(when)}&n=200`,
                                { headers: { 'Referer': 'https://dilaeit.onrender.com' }, signal: AbortSignal.timeout(6000) });
                            if (!r.ok) return [];
                            const d = await r.json();
                            return d.departures || d.stopTimes || (Array.isArray(d) ? d : []);
                        } catch { return []; }
                    })
                );
                
                const q = query.toUpperCase().replace(/\s+/g, '');
                const isNumericQ = /^\d+$/.test(q);
                const seen = new Set();
                const trips = [];

                tResults.flat().forEach(d => {
                    const display    = d.displayName    || '';
                    const tripShort  = d.tripShortName  || '';
                    const routeShort = d.routeShortName || '';
                    const showName   = (display && tripShort && display !== tripShort) ? `${display} (${tripShort})` : (display || tripShort || routeShort);
                    if (!showName) return;
                    
                    const nameUp = showName.toUpperCase().replace(/\s+/g, '');
                    const tripUp = tripShort.toUpperCase().replace(/\s+/g, '');
                    const displayUp = display.toUpperCase().replace(/\s+/g, '');
                    
                    const matches = tripUp === q || tripUp.endsWith(q) || tripUp.includes("(" + q + ")")
                                 || displayUp === q || displayUp.endsWith(q) || displayUp.includes("(" + q + ")")
                                 || (!isNumericQ && nameUp.includes(q));

                    if (matches && !seen.has(showName)) {
                        seen.add(showName);
                        trips.push({
                            id: d.tripId || d.trip?.tripId,
                            name: showName,
                            direction: d.headsign || '',
                            plannedDeparture: d.scheduledDeparture || d.departure || null
                        });
                    }
                });

                // Auch DB IRIS checken
                try {
                    const dbRes = await fetch(`${API_BASE}/api/iris/trip-search?number=${encodeURIComponent(query)}&date=${encodeURIComponent(date)}`, { signal: AbortSignal.timeout(5000) }).then(r=>r.json());
                    if (dbRes?.tripId && !seen.has(dbRes.line?.name)) {
                        trips.unshift({
                            id: dbRes.tripId,
                            name: dbRes.line?.name || query,
                            direction: dbRes.stopovers?.[dbRes.stopovers.length-1]?.stop?.name || '',
                            plannedDeparture: dbRes.stopovers?.[0]?.plannedDeparture || null
                        });
                    }
                } catch {}

                renderTripDropdown(trips);
            } catch (e) {
                dropdown.innerHTML = '<div class="px-4 py-4 text-sm text-red-500 font-medium">Netzwerkfehler.</div>';
            }
        }

        function renderTripDropdown(trips) {
            const dropdown = document.getElementById('trip-dropdown');
            dropdown.innerHTML = '';
            if (trips.length === 0) {
                dropdown.innerHTML = '<div class="px-4 py-3 text-sm text-gray-500 italic">Keine Fahrten gefunden.</div>';
                return;
            }
            trips.forEach(trip => {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 hover:bg-gray-50 dark:hover:bg-zinc-800 cursor-pointer border-b border-gray-100 dark:border-zinc-800 last:border-0 transition-colors flex items-center justify-between group/item';
                const time = trip.plannedDeparture ? new Date(trip.plannedDeparture).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold text-gray-900 dark:text-white truncate group-hover/item:text-red-500 transition-colors">${trip.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest truncate">${trip.direction || 'Unbekanntes Ziel'}</div>
                    </div>
                    <div class="text-xs font-mono text-gray-400 bg-gray-100 dark:bg-zinc-800 px-2 py-1 rounded-lg ml-3">${time}</div>`;
                item.onclick = () => {
                    document.getElementById('trip-number-input').value = trip.name;
                    dropdown.classList.add('hidden');
                    loadTripDetails(trip.id, document.getElementById('trip-date-input').value);
                };
                dropdown.appendChild(item);
            });
        }

        // ─── Suche Ausführen ─────────────────────────────────────────────────────────
        async function handleTripSearch() {
            const number = document.getElementById('trip-number-input').value.trim();
            const date = document.getElementById('trip-date-input').value;
            if (!number) return;
            loadTripDetails(number, date);
        }

        async function loadTripDetails(idOrNumber, date) {
            const results = document.getElementById('trip-search-results');
            const container = document.getElementById('trip-itinerary-container');
            const itinerary = document.getElementById('trip-itinerary');
            
            results.innerHTML = `<div class="flex items-center gap-3 py-4"><i class="fas fa-circle-notch fa-spin text-red-500"></i> Suche Fahrtverlauf...</div>`;
            container.classList.remove('hidden');
            itinerary.innerHTML = '<div class="py-20 text-center"><i class="fas fa-circle-notch fa-spin text-2xl text-red-600"></i></div>';

            try {
                let data = null;
                // Wenn es eine Transitous ID ist (enthält ":")
                if (idOrNumber.includes(':')) {
                    const res = await fetch(`${API_BASE}/api/train-details/${encodeURIComponent(idOrNumber)}`);
                    if (res.ok) data = await res.json();
                } else {
                    // Erst DB IRIS probieren
                    try {
                        const res = await fetch(`${API_BASE}/api/iris/trip-search?number=${encodeURIComponent(idOrNumber)}&date=${encodeURIComponent(date)}`).then(r=>r.json());
                        if (res?.stopovers?.length) data = res;
                    } catch {}
                    // Falls nicht gefunden, Transitous probieren
                    if (!data) {
                        const match = await searchTransitousTrip(idOrNumber, date);
                        if (match) {
                            const res = await fetch(`${API_BASE}/api/train-details/${encodeURIComponent(match.tripId)}`);
                            if (res.ok) data = await res.json();
                        }
                    }
                }

                if (!data || !data.stopovers) {
                    results.innerHTML = '<span class="text-red-500 font-bold">Keine Fahrt gefunden.</span>';
                    itinerary.innerHTML = '<div class="py-10 text-center text-zinc-500">Kein Verlauf verfügbar.</div>';
                    return;
                }

                results.innerHTML = `<span class="text-green-500 font-bold">Fahrt gefunden!</span>`;
                document.getElementById('trip-source-display').textContent = `QUELLE: ${data.source || 'API'}`;
                document.getElementById('current-trip-date-display').textContent = date;
                document.getElementById('current-trip-number-display').textContent = data.line?.name || idOrNumber;
                currentTripData = { number: idOrNumber, date: date, results: data };
                renderItinerary(data.stopovers, data.remarks || []);
            } catch (e) {
                results.innerHTML = '<span class="text-red-500">Fehler beim Laden.</span>';
                itinerary.innerHTML = '<div class="py-10 text-center text-red-500">Ein Fehler ist aufgetreten.</div>';
            }
        }

        async function searchTransitousTrip(number, date) {
            const when = date ? `${date}T12:00:00` : new Date().toISOString();
            const q = number.toUpperCase().replace(/\s+/g, '');
            for (const hub of TRANSITOUS_HUBS.slice(0, 8)) {
                try {
                    const res = await fetch(`https://api.transitous.org/api/v1/stoptimes?stopId=${hub}&time=${encodeURIComponent(when)}&n=200`, { headers: { 'Referer': 'https://dilaeit.onrender.com' } }).then(r=>r.json());
                    const match = (res.departures || res.stopTimes || []).find(d => {
                        const ts = (d.tripShortName || '').toUpperCase().replace(/\s+/g, '');
                        const dn = (d.displayName || '').toUpperCase().replace(/\s+/g, '');
                        return ts === q || dn === q || ts.includes("(" + q + ")") || dn.includes("(" + q + ")");
                    });
                    if (match) return match;
                } catch {}
            }
            return null;
        }

        function renderItinerary(stopovers, tripRemarks = []) {
            const container = document.getElementById('trip-itinerary');
            container.innerHTML = '<div class="itinerary-line"></div>';
            
            const now = Date.now();
            const sorted = [...stopovers].sort((a,b) => new Date(a.plannedArrival || a.plannedDeparture) - new Date(b.plannedArrival || b.plannedDeparture));
            
            sorted.forEach(stop => {
                const schedArr = stop.plannedArrival ? new Date(stop.plannedArrival) : null;
                const actualArr = stop.arrival ? new Date(stop.arrival) : null;
                const schedDep = stop.plannedDeparture ? new Date(stop.plannedDeparture) : null;
                const actualDep = stop.departure ? new Date(stop.departure) : null;
                const isCancelled = stop.cancelled;

                const formatTime = (sched, actual, isPast) => {
                    if (!sched) return '';
                    const planStr = `<span class="text-gray-500 text-[9px] mr-1">${sched.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>`;
                    if (!actual) return `<span class="text-gray-300 font-mono">${sched.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>`;
                    const timeStr = actual.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: isPast ? '2-digit' : undefined });
                    const color = actual > sched ? 'text-red-400' : 'text-green-400';
                    return `${planStr}<span class="${color} font-bold mono">${timeStr}</span>`;
                };

                const isPast = (actualDep && actualDep < now) || (actualArr && actualArr < now);
                const stopItem = document.createElement('div');
                stopItem.className = `itinerary-item relative ${isCancelled ? 'opacity-40' : ''}`;
                stopItem.innerHTML = `
                    <div class="absolute left-[11px] top-1/2 -translate-y-1/2 w-2 h-2 rounded-full ${isCancelled ? 'bg-gray-600' : 'bg-red-600'} z-10"></div>
                    <div class="flex items-center justify-between w-full">
                        <div class="itinerary-item-content">
                            <div class="text-sm font-bold ${isCancelled ? 'line-through' : ''}">${stop.stop.name}</div>
                            <div class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">${stop.platform || '---'}</div>
                        </div>
                        <div class="text-right text-[10px]">
                            ${schedArr ? `<div><span class="text-gray-600 mr-1">AN</span>${formatTime(schedArr, actualArr, isPast)}</div>` : ''}
                            ${schedDep ? `<div><span class="text-gray-600 mr-1">AB</span>${formatTime(schedDep, actualDep, isPast)}</div>` : ''}
                        </div>
                    </div>
                    ${(stop.remarks || []).map(r => `<div class="text-[9px] text-red-400 mt-1 ml-12 bg-red-400/5 p-1 rounded border border-red-400/10">${translate(r.text)}</div>`).join('')}`;
                container.appendChild(stopItem);
            });

            if (tripRemarks.length > 0) {
                const remDiv = document.createElement('div');
                remDiv.className = 'mt-6 pt-4 border-t border-zinc-800 space-y-2';
                tripRemarks.forEach(r => {
                    const d = document.createElement('div');
                    d.className = 'text-[10px] text-red-400 bg-red-400/5 p-2 rounded-lg border border-red-400/20 flex items-start gap-2';
                    d.innerHTML = `<i class="fas fa-info-circle mt-0.5"></i> <div class="flex-1">${translate(r.text)}</div>`;
                    remDiv.appendChild(d);
                });
                container.appendChild(remDiv);
            }
        }

        function clearTripSearch() {
            document.getElementById('trip-number-input').value = '';
            document.getElementById('trip-search-results').innerHTML = '';
            document.getElementById('trip-itinerary-container').classList.add('hidden');
            document.getElementById('trip-dropdown').classList.add('hidden');
        }

        function changeTripDate(days) {
            const dInput = document.getElementById('trip-date-input');
            const d = new Date(dInput.value);
            d.setDate(d.getDate() + days);
            const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
            dInput.value = `${y}-${m}-${dd}`;
            if (currentTripData.number) loadTripDetails(currentTripData.number, dInput.value);
        }

        function debounce(f, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f.apply(this, a), ms); }; }

        init();
    </script>
</body>
</html>
