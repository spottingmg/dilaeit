<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fahrtensuche - dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #ef4444;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        .dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .trip-item {
            border-bottom: 1px solid rgba(156, 163, 175, 0.1);
        }

        .itinerary-line {
            position: absolute;
            left: 14px; top: 0; bottom: 0;
            width: 2px;
            background-color: #374151;
            z-index: 0;
        }

        .itinerary-item {
            padding-left: 32px;
            margin-bottom: 0.45rem;
            min-height: 48px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .itinerary-item-content { margin-left: 12px; }
        
        .precision-time { font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .thin-prognosis { font-weight: 300; }
        
        .delay-positive { color: #ef4444; }
        .delay-negative { color: #3b82f6; }
        .delay-zero { color: #22c55e; }
    </style>
</head>
<body class="dark transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter italic">dilaeit</h1>
            <div class="flex items-center gap-6">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-zinc-900 hover:scale-110 transition-transform">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>
            </div>
        </header>

        <div class="space-y-6">
            <!-- Hauptsuche -->
            <div class="p-4 rounded-2xl bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800">
                <h3 class="text-sm font-bold uppercase tracking-wider text-gray-600 dark:text-gray-300 mb-4">Fahrtensuche</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="relative group">
                        <input id="trip-number-input" type="text" placeholder="Zug-/Busnummer (z.B. IC2201, 722)" autocomplete="off" class="w-full rounded-xl p-3 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-lg focus:ring-2 focus:ring-red-500/50 outline-none transition-all" />
                        <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 transition-colors"></i>
                        <!-- Dropdown für Ergebnisse -->
                        <div id="trip-dropdown" class="absolute top-full left-0 w-full mt-2 bg-white dark:bg-zinc-900 rounded-xl shadow-2xl overflow-hidden hidden z-[100] border border-gray-100 dark:border-zinc-800 max-h-80 overflow-y-auto ring-1 ring-black/5"></div>
                    </div>
                    <div class="relative">
                        <input id="trip-date-input" type="date" class="w-full rounded-xl p-3 bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 outline-none focus:ring-2 focus:ring-red-500/50 transition-all" />
                    </div>
                    <div class="flex gap-2">
                        <button id="search-trip-btn" class="flex-1 px-6 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-500 transition shadow-lg shadow-red-600/20">Suchen</button>
                        <button id="clear-trip-btn" class="px-6 py-3 bg-gray-600 text-white font-semibold rounded-xl hover:bg-gray-500 transition">Leeren</button>
                    </div>
                </div>
                <div id="trip-search-results" class="mt-4 text-sm text-gray-600 dark:text-gray-300"></div>
            </div>

            <!-- Fahrtverlauf -->
            <div id="trip-itinerary-container" class="hidden p-4 rounded-2xl bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold">Fahrtverlauf</h3>
                    <div class="text-sm text-gray-500">
                        <span id="trip-source-display">Quelle: --</span>
                    </div>
                </div>
                <!-- Zeitreise-Navigation innerhalb des Verlaufs -->
                <div id="trip-navigation" class="mb-6 flex items-center justify-between bg-white dark:bg-zinc-800 p-3 rounded-xl border border-gray-100 dark:border-zinc-700">
                    <div class="flex items-center gap-2">
                        <button id="prev-day-btn" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 transition">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="current-trip-date-display" class="text-sm font-bold px-2">--</span>
                        <button id="next-day-btn" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 transition">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="text-right text-[10px] text-gray-400 uppercase tracking-widest">
                        Fahrt: <span id="current-trip-number-display" class="font-bold text-gray-200">--</span>
                    </div>
                </div>
                <div id="trip-itinerary" class="space-y-6 relative">
                    <div class="itinerary-line"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── Konfiguration ───────────────────────────────────────────────────────────
        const API_BASE = (() => {
            const saved = localStorage.getItem('dilaeit_api_base');
            if (saved) return saved;
            return '';
        })();

        // ─── Globale Variablen ───────────────────────────────────────────────────────
        let currentTripData = {
            number: null,
            date: null,
            results: []
        };

        // ─── Zug-Erkennung ───────────────────────────────────────────────────────────
        function isTrain(lineName) {
            if (!lineName) return false;
            const name = (lineName || '').toUpperCase();
            const trainPrefixes = ['ICE','IC','ICD','RE','RB','IRE','EC','EN','TGV','NJ','RJ','RS'];
            const prefixMatches = (p) => {
                if (name === p) return true;
                if (name.startsWith(p + ' ') || name.startsWith(p + '-')) return true;
                // Handles patterns like "RS1" / "RE4" where there is no delimiter.
                if (name.startsWith(p) && name.length > p.length && /\d/.test(name.slice(p.length, p.length + 1))) return true;
                return false;
            };
            if (trainPrefixes.some(prefixMatches)) return true;
            // S-Bahn in den NRW-APIs kommt oft als "S 8" oder "S8"
            if (/^S\s*\d+/.test(name)) return true;
            return false;
        }

        // ─── Init ────────────────────────────────────────────────────────────────────
        function init() {
            setupEventListeners();
            setupDefaultDate();
            attachThemeToggle();
        }

        function setupDefaultDate() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            document.getElementById('trip-date-input').value = `${y}-${m}-${d}`;
        }

        function attachThemeToggle() {
            document.getElementById('theme-toggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
            });
        }

        function setupEventListeners() {
            const input = document.getElementById('trip-number-input');
            const dropdown = document.getElementById('trip-dropdown');

            input.addEventListener('input', (e) => handleTripInput(e.target.value));
            input.addEventListener('focus', () => {
                if (dropdown.children.length > 0) dropdown.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.group')) dropdown.classList.add('hidden');
            });

            document.getElementById('search-trip-btn').addEventListener('click', () => handleTripSearch());
            document.getElementById('clear-trip-btn').addEventListener('click', clearTripSearch);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    dropdown.classList.add('hidden');
                    handleTripSearch();
                }
            });
            
            // Zeitreise-Buttons
            document.getElementById('prev-day-btn').addEventListener('click', () => changeTripDate(-1));
            document.getElementById('next-day-btn').addEventListener('click', () => changeTripDate(1));
        }

        // ─── Autocomplete für Fahrten ────────────────────────────────────────────────
        let tripSearchTimer = null;
        async function handleTripInput(val) {
            const query = val.trim();
            const dropdown = document.getElementById('trip-dropdown');
            const date = document.getElementById('trip-date-input').value;

            if (query.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            // Lade-Indikator anzeigen
            dropdown.innerHTML = '<div class="px-4 py-4 text-sm text-gray-500 italic flex items-center gap-3"><i class="fas fa-circle-notch fa-spin text-red-500"></i> Suche nach Fahrten...</div>';
            dropdown.classList.remove('hidden');

            clearTimeout(tripSearchTimer);
            tripSearchTimer = setTimeout(async () => {
                try {
                    // DB via IRIS-Backend
                    const dbRes = await fetch(
                        `${API_BASE}/api/iris/trip-search?number=${encodeURIComponent(query)}&date=${encodeURIComponent(date)}`,
                        { signal: AbortSignal.timeout(15000) }
                    ).then(r => r.ok ? r.json() : null).catch(() => null);

                    const q = query.trim().toUpperCase().replace(/\s+/g, '');
                    const seen = new Set();
                    const trips = [];

                    if (dbRes?.line?.name && !seen.has(dbRes.line.name)) {
                        seen.add(dbRes.line.name);
                        trips.push({
                            id: dbRes.dbTripId || dbRes.tripId,
                            name: dbRes.line.name,
                            direction: dbRes.stopovers?.[dbRes.stopovers.length-1]?.stop?.name || '',
                            plannedDeparture: dbRes.stopovers?.[0]?.plannedDeparture || null
                        });
                    }

                    // Transitous: mehrere Hubs parallel
                    const tResults = await Promise.all(
                        TRANSITOUS_HUBS.slice(0, 5).map(async stopId => { // nur 5 für Autocomplete
                            try {
                                const r = await fetch(`https://api.transitous.org/api/v1/stoptimes?stopId=${stopId}&time=${encodeURIComponent(when)}&n=200`,
                                    { headers: { 'Referer': 'https://dilaeit.onrender.com' }, signal: AbortSignal.timeout(5000) });
                                if (!r.ok) return [];
                                const d = await r.json();
                                return d.departures || d.stopTimes || (Array.isArray(d) ? d : []);
                            } catch { return []; }
                        })
                    );
                    const tDeps = tResults.flat();
                    const isNumericQ = /^\d+$/.test(q);
                    tDeps.forEach(d => {
                        const display    = d.displayName    || '';
                        const tripShort  = d.tripShortName  || '';
                        const routeShort = d.routeShortName || '';
                        const showName   = (display && tripShort && display !== tripShort) ? `${display} (${tripShort})` : (display || tripShort || routeShort);
                        if (!showName) return;
                        const nameUp = showName.toUpperCase().replace(/\s+/g, '');
                        const tripUp = tripShort.toUpperCase().replace(/\s+/g, '');
                        const routeUp = routeShort.toUpperCase().replace(/\s+/g, '');
                        const displayUp = display.toUpperCase().replace(/\s+/g, '');
                        
                        // Für reine Zahlen: nur exakt oder endsWith auf tripShortName
                        // Für Text: auch includes auf displayName erlaubt
                        const matches = tripUp === q || tripUp.endsWith(q) || tripUp.includes("(" + q + ")")
                                     || routeUp === q || routeUp.endsWith(q)
                                     || displayUp === q || displayUp.endsWith(q) || displayUp.includes("(" + q + ")")
                                     || (!isNumericQ && nameUp.includes(q));
                        if (matches && !seen.has(showName)) {
                            seen.add(showName);
                            trips.push({
                                id: d.tripId || d.trip?.tripId,
                                name: showName,
                                direction: d.headsign || '',
                                plannedDeparture: d.scheduledDeparture || d.departure || null
                            });
                        }
                    });

                    renderTripDropdown(trips);
                } catch (e) {
                    console.error('Autocomplete error:', e);
                    dropdown.innerHTML = '<div class="px-4 py-4 text-sm text-red-500 font-medium">Netzwerkfehler bei der Suche.</div>';
                }
            }, 300);
        }

        function renderTripDropdown(trips) {
            const dropdown = document.getElementById('trip-dropdown');
            dropdown.innerHTML = '';

            if (trips.length === 0) {
                dropdown.innerHTML = '<div class="px-4 py-3 text-sm text-gray-500 italic">Keine Fahrten gefunden.</div>';
                dropdown.classList.remove('hidden');
                return;
            }

            trips.forEach(trip => {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 hover:bg-gray-50 dark:hover:bg-zinc-800 cursor-pointer border-b border-gray-100 dark:border-zinc-800 last:border-0 transition-colors flex items-center justify-between group/item';
                
                const time = trip.plannedDeparture ? new Date(trip.plannedDeparture).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                
                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-black text-red-600 italic group-hover/item:text-red-500">${trip.name}</span>
                            <span class="text-gray-400 text-xs">→</span>
                        </div>
                        <div class="text-sm font-bold truncate text-gray-700 dark:text-gray-200">${trip.direction || 'Unbekannt'}</div>
                    </div>
                    <div class="text-right ml-4">
                        <div class="text-sm font-mono font-bold text-gray-800 dark:text-gray-100">${time}</div>
                        <div class="text-[9px] text-gray-500 uppercase tracking-widest">Start</div>
                    </div>
                `;

                item.onclick = () => {
                    document.getElementById('trip-number-input').value = trip.name;
                    dropdown.classList.add('hidden');
                    handleTripSearch(trip.id); // Suche direkt mit der ID auslösen
                };
                dropdown.appendChild(item);
            });

            dropdown.classList.remove('hidden');
        }

        // ─── Suche nach Fahrt ───────────────────────────────────────────────────────
        async function handleTripSearch(explicitTripId = null) {
            const number = document.getElementById('trip-number-input').value.trim();
            const date = document.getElementById('trip-date-input').value;
            
            if (!number && !explicitTripId) {
                showMessage('Bitte gib eine Zug-/Busnummer ein (z.B. IC2201, 722)', 'error');
                return;
            }

            currentTripData.number = number;
            currentTripData.date = date;

            showMessage('Suche nach Fahrt...', 'info');
            
            try {
                // Wenn wir eine explizite ID haben, nutzen wir diese direkt
                if (explicitTripId) {
                    const dbResult = await fetch(`${API_BASE}/api/train-details/${encodeURIComponent(explicitTripId)}`, {
                        signal: AbortSignal.timeout ? AbortSignal.timeout(10000) : undefined
                    }).then(r => r.ok ? r.json() : null);
                    if (dbResult) {
                        showTripResults(dbResult, 'Deutsche Bahn');
                        return;
                    }
                }

                // Ansonsten normale Suche – DB, VRR und Transitous parallel
                const [dbResult, vrrResult, transitousResult] = await Promise.all([
                    searchDbTrip(number, date),
                    searchVrrTrip(number, date),
                    searchTransitousTrip(number, date)
                ]);

                // Priorität: DB IRIS → Transitous → VRR
                if (dbResult?.stopovers?.length > 0) {
                    showTripResults(dbResult, 'DB IRIS');
                    return;
                } else if (transitousResult?.stopovers?.length > 0) {
                    showTripResults(transitousResult, 'Transitous');
                    return;
                } else if (vrrResult?.stopovers?.length > 0) {
                    showTripResults(vrrResult, 'VRR OpenService');
                    return;
                } else {
                    showMessage('Keine Fahrt mit dieser Nummer gefunden.', 'error');
                    document.getElementById('trip-itinerary-container').classList.add('hidden');
                    return;
                }
            } catch (e) {
                console.error('Trip search error:', e);
                showMessage('Fehler bei der Suche.', 'error');
                document.getElementById('trip-itinerary-container').classList.add('hidden');
            }
        }

        // ─── VRR Suche ───────────────────────────────────────────────────────────────
        async function searchVrrTrip(number, date) {
            try {
                // VRR Suche: Wir suchen nach der Nummer in den Abfahrten einer zentralen Station
                // Um die Trefferquote zu erhöhen, probieren wir mehrere große Knotenpunkte
                const hubs = ['Düsseldorf Hbf', 'Essen Hbf', 'Dortmund Hbf', 'Duisburg Hbf', 'Aachen Hbf'];
                
                for (const hub of hubs) {
                    const stations = await searchVrrStations(hub);
                    if (!stations || stations.length === 0) continue;

                    const departures = await getVrrDepartures(stations[0].id, date);
                    const matchingTrip = departures.find(d => 
                        d.line?.name === number || 
                        String(d.line?.name).toUpperCase() === String(number).toUpperCase() ||
                        String(d.line?.name).includes(number)
                    );

                    if (matchingTrip && matchingTrip.tripId) {
                        return await getVrrTripDetails(matchingTrip.tripId);
                    }
                }
                return null;
            } catch (e) {
                console.warn('VRR trip search failed:', e);
                return null;
            }
        }

        // ─── Transitous Suche ─────────────────────────────────────────────────────────
        // Mehrere große Bahnhöfe parallel durchsuchen für maximale Trefferquote
                const TRANSITOUS_HUBS = [
            'de:05116:8000250',  // Mönchengladbach Hbf
            'de:05315:8000207',  // Köln Hbf
            'de:05111:8000085',  // Düsseldorf Hbf
            'de:05913:8000096',  // Dortmund Hbf
            'de:05113:8000105',  // Duisburg Hbf
            'de:05124:8000191',  // Essen Hbf
            'de:05314:8000044',  // Bonn Hbf
            'de:07135:8000206',  // Koblenz Hbf
            'de:02000:8600282',  // Hamburg Hbf
            'de:11000:900003201', // Berlin Hbf
        ];

        async function searchTransitousTrip(number, date) {
            try {
                const when = date ? `${date}T08:00:00` : new Date().toISOString();
                const q    = number.trim().toUpperCase().replace(/\s+/g, '');
                const isNumeric = /^\d+$/.test(q); // reine Zahl = Fahrtnummer

                // Alle Hubs parallel anfragen
                const results = await Promise.all(TRANSITOUS_HUBS.map(async stopId => {
                    try {
                        const url = `https://api.transitous.org/api/v1/stoptimes?stopId=${stopId}&time=${encodeURIComponent(when)}&n=200`;
                        const res = await fetch(url, { headers: { 'Referer': 'https://dilaeit.onrender.com' }, signal: AbortSignal.timeout(8000) });
                        if (!res.ok) return [];
                        const data = await res.json();
                        return data.departures || data.stopTimes || (Array.isArray(data) ? data : []);
                    } catch { return []; }
                }));

                const allDeps = results.flat();

                // Matching mit Priorität:
                // 1. Exakter tripShortName (Fahrtnummer "10613" == "10613")
                // 2. Exakter routeShortName ("RB27" == "RB27")
                // 3. displayName endet mit Zahl ("IC1549" endsWith "1549")
                // 4. displayName enthält ("IC2202" includes "2202")
                // Busse/Trams bei reiner Zahlsuche ausschließen
                const findMatch = (deps) => {
                    // Priorität 1: exakte Fahrtnummer
                    let m = deps.find(d => {
                        const ts = (d.tripShortName || '').toUpperCase().replace(/\s+/g, '');
                        return ts === q;
                    });
                    if (m) return m;

                    // Priorität 2: exakter Linienname
                    m = deps.find(d => {
                        const rs = (d.routeShortName || '').toUpperCase().replace(/\s+/g, '');
                        return rs === q;
                    });
                    if (m) return m;

                    // Priorität 3: displayName endet mit Eingabe (z.B. "IC 1549" → "1549")
                    m = deps.find(d => {
                        const dn = (d.displayName || '').toUpperCase().replace(/\s+/g, '');
                        const ts = (d.tripShortName || '').toUpperCase().replace(/\s+/g, '');
                        return dn.endsWith(q) || ts.endsWith(q) || dn.includes("(" + q + ")") || ts.includes("(" + q + ")")
                    });
                    if (m) return m;

                    // Priorität 4: nur wenn KEIN reiner Zahleingabe → Linien wie "106" würden sonst "10613" matchen
                    if (!isNumeric) {
                        m = deps.find(d => {
                            const dn = (d.displayName || d.routeShortName || '').toUpperCase().replace(/\s+/g, '');
                            return dn.includes(q);
                        });
                    }
                    return m || null;
                };

                const match = findMatch(allDeps);
                const tripId = match?.tripId || match?.trip?.tripId;
                if (!tripId) return null;

                // Fahrtverlauf über Transitous /trip holen
                // v1/trip gibt ein Itinerary zurück mit legs[]
                const tripUrl = `https://api.transitous.org/api/v1/trip?tripId=${encodeURIComponent(tripId)}`;
                const tripRes = await fetch(tripUrl, { headers: { 'Referer': 'https://dilaeit.onrender.com' }, signal: AbortSignal.timeout(10000) });
                if (!tripRes.ok) {
                    console.warn('Transitous /trip failed:', tripRes.status, await tripRes.text().catch(()=>''));
                    return null;
                }
                const tripData = await tripRes.json();

                // Transitous /trip gibt entweder { legs: [...] } oder direkt ein Itinerary
                const legs = tripData.legs || tripData.itinerary?.legs || (Array.isArray(tripData) ? tripData : []);
                // Transit-Leg finden (nicht WALK)
                const transitLeg = legs.find(l => l.mode && l.mode !== 'WALK' && l.mode !== 'FOOT') || legs[0];
                if (!transitLeg) {
                    console.warn('Transitous: kein Transit-Leg gefunden', JSON.stringify(tripData).slice(0,200));
                    return null;
                }

                // from + intermediateStops + to zusammenführen
                const allStops = [
                    transitLeg.from,
                    ...(transitLeg.intermediateStops || []),
                    transitLeg.to
                ].filter(Boolean);

                const stopovers = allStops.map(s => ({
                    stop: { name: s.name || '' },
                    plannedArrival:    s.scheduledArrival   || null,
                    arrival:           s.arrival            || null,
                    plannedDeparture:  s.scheduledDeparture || null,
                    departure:         s.departure          || null,
                    arrivalDelaySec:   s.arrival   && s.scheduledArrival   ? Math.round((new Date(s.arrival)   - new Date(s.scheduledArrival))   / 1000) : null,
                    departureDelaySec: s.departure && s.scheduledDeparture ? Math.round((new Date(s.departure) - new Date(s.scheduledDeparture)) / 1000) : null,
                    platform:        s.track          || null,
                    plannedPlatform: s.scheduledTrack || s.track || null,
                    cancelled:  s.cancelled  || false,
                    additional: false,
                    remarks: (s.remarks || []).map(r => ({
                        text: r.summary || r.text || '',
                        type: r.type || 'hint',
                        priority: r.priority || 50
                    }))
                }));

                return {
                    stopovers,
                    line: { name: match.displayName || match.tripShortName || match.routeShortName || match.trip?.displayName || number },
                    source: 'Transitous',
                    remarks: []
                };
            } catch (e) {
                console.warn('Transitous trip search failed:', e);
                return null;
            }
        }

        // ─── DB IRIS Suche (Fahrtnummer → Fahrtverlauf) ──────────────────────────────
        async function searchDbTrip(number, date) {
            try {
                const d = date || new Date().toISOString().slice(0, 10);
                const res = await fetch(
                    `${API_BASE}/api/iris/trip-search?number=${encodeURIComponent(number)}&date=${encodeURIComponent(d)}`,
                    { signal: AbortSignal.timeout(30000) } // IRIS braucht etwas länger
                );
                if (!res.ok) return null;
                const data = await res.json();
                return data?.stopovers?.length ? data : null;
            } catch (e) {
                console.warn('IRIS trip search failed:', e.message);
                return null;
            }
        }

        // ─── Hilfsfunktionen für VRR ─────────────────────────────────────────────────
        async function searchVrrStations(query) {
            const res = await fetch(`${API_BASE}/api/locations?query=${encodeURIComponent(query)}`);
            if (!res.ok) return [];
            const data = await res.json();
            return data?.locations || [];
        }

        async function getVrrDepartures(stopId, date) {
            const res = await fetch(`${API_BASE}/api/stops/${encodeURIComponent(stopId)}/departures?when=${encodeURIComponent(date)}T12:00:00&duration=120&results=40`);
            if (!res.ok) return [];
            const data = await res.json();
            return data?.departures || [];
        }

        async function getVrrTripDetails(tripId) {
            const res = await fetch(`${API_BASE}/api/trips/${encodeURIComponent(tripId)}`);
            if (!res.ok) return null;
            const data = await res.json();
            return data;
        }

        const regexTranslations = [
            {
                pattern: /^(.+?)\s+heading towards\s+(.+?)\s+from here\.?$/i,
                replace: (_, line, dest) =>
                    `Durchbindung: Kommt als Linie ${line.trim()} aus Richtung ${dest.trim()}.`
            },
            {
                pattern: /^(.+?)\s+heading towards\s+(.+?)\.?$/i,
                replace: (_, line, dest) =>
                    `Durchbindung: Fährt weiter als Linie ${line.trim()} Richtung ${dest.trim()}.`
            },
            {
                pattern: /^throughbinding\s+from\s+(?:line\s+)?(.+)$/i,
                replace: (_, line) => `Durchbindung von Linie ${line.trim()}.`
            },
            {
                pattern: /^throughbinding\s+(?:on|as|to)\s+(?:line\s+)?(.+)$/i,
                replace: (_, line) => `Durchbindung auf Linie ${line.trim()}.`
            },
            {
                pattern: /^continues?\s+as\s+(?:line\s+)?(.+)$/i,
                replace: (_, line) => `Fährt weiter als Linie ${line.trim()}.`
            },
            {
                pattern: /^coming\s+from\s+(?:line\s+)?(.+)$/i,
                replace: (_, line) => `Kommt als Linie ${line.trim()}.`
            },
            {
                pattern: /^delay\s+of\s+approx\.?\s+(\d+)\s+minutes?\.?$/i,
                replace: (_, min) => `Verspätung von ca. ${min} Minuten.`
            },
            {
                pattern: /^cancelled\s+due\s+to\s+(.+)$/i,
                replace: (_, reason) => `Fällt aus wegen ${reason.trim()}.`
            },
            {
                pattern: /^stop\s+(.+?)\s+is\s+not\s+served\.?$/i,
                replace: (_, stop) => `Halt ${stop.trim()} entfällt.`
            },
        ];

        const translate = (text) => {
            if (!text) return '';
            if (translationMap[text]) return translationMap[text];
            for (const { pattern, replace } of regexTranslations) {
                const m = text.match(pattern);
                if (m) return text.replace(pattern, replace);
            }
            return text;
        };

        function showTripResults(tripData, source) {
            showMessage('', 'info'); // Suchmeldung löschen
            document.getElementById('trip-navigation').classList.remove('hidden');
            document.getElementById('trip-itinerary-container').classList.remove('hidden');
            
            // Falls der Name im tripData steht, nutzen wir diesen
            const displayName = tripData.line?.name || currentTripData.number;
            document.getElementById('current-trip-number-display').textContent = displayName;
            document.getElementById('current-trip-date-display').textContent = formatDate(currentTripData.date);
            document.getElementById('trip-source-display').textContent = `Quelle: ${source}`;
            
            renderTripItinerary(tripData);
        }

        function renderTripItinerary(tripData) {
            const container = document.getElementById('trip-itinerary');
            container.innerHTML = '';
            
            const stopovers = tripData.stopovers || [];
            
            stopovers.forEach((stop, index) => {
                const item = document.createElement('div');
                item.className = 'relative itinerary-item';
                
                const schedArr = stop.plannedArrival ? new Date(stop.plannedArrival) : null;
                const actualArr = stop.arrival ? new Date(stop.arrival) : null;
                const schedDep = stop.plannedDeparture ? new Date(stop.plannedDeparture) : null;
                const actualDep = stop.departure ? new Date(stop.departure) : null;
                
                const arrTime = schedArr ? schedArr.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                const depTime = schedDep ? schedDep.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                
                // IMMER Sekundenanzeige (2-digit) für actual times
                const arrActual = actualArr ? actualArr.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
                const depActual = actualDep ? actualDep.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
                
                // delaySec kommt vom Server (oder berechnen wenn fehlt)
                let arrDelaySec = stop.arrivalDelaySec;
                if (arrDelaySec === undefined && actualArr && schedArr) arrDelaySec = Math.round((actualArr - schedArr) / 1000);
                let depDelaySec = stop.departureDelaySec;
                if (depDelaySec === undefined && actualDep && schedDep) depDelaySec = Math.round((actualDep - schedDep) / 1000);

                const formatDelay = (secs) => {
                    if (secs === null || secs === undefined) return null;
                    if (Math.abs(secs) < 60) return '±0';
                    const sign = secs >= 60 ? '+' : '-';
                    const mins = Math.abs(Math.round(secs / 60));
                    return sign + mins + "'";
                };

                const getDelayClass = (secs) => {
                    if (secs === null || secs === undefined) return '';
                    return secs >= 60 ? 'delay-positive' : 'delay-zero'; // green for < 60s
                };
                
                const arrDelayStr = formatDelay(arrDelaySec);
                const depDelayStr = formatDelay(depDelaySec);
                const arrDelayClass = getDelayClass(arrDelaySec);
                const depDelayClass = getDelayClass(depDelaySec);
                
                item.innerHTML = `
                    <div class="absolute left-2 top-2 w-3.5 h-3.5 rounded-full border-2 border-white dark:border-zinc-950 z-10 bg-red-600"></div>
                    <div class="itinerary-item-content">
                        <div class="flex justify-between items-start gap-2">
                            <div class="min-w-0">
                                <h4 class="font-semibold text-sm">${stop.stop.name}</h4>
                                <div class="text-xs text-gray-500 mt-1">
                                    Gleis: ${stop.platform || '---'}
                                </div>
                                ${(stop.remarks || []).map(r => `
                                    <div class="text-[10px] text-red-400 mt-1 flex items-start gap-1">
                                        <i class="fas fa-exclamation-triangle mt-0.5"></i>
                                        <span>${translate(r.text)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="text-right mono text-xs leading-tight shrink-0">
                                <div class="flex items-center justify-end gap-1">
                                    <span class="text-gray-600 text-[10px]">AN</span>
                                    <span class="font-mono ${arrDelaySec !== null ? 'text-gray-400 line-through' : ''}">${arrTime}</span>
                                    ${arrDelaySec !== null ? `<span class="precision-time ${arrDelayClass}">${arrActual}</span>` : ''}
                                    ${arrDelayStr ? `<span class="text-[9px] ${arrDelayClass}">${arrDelayStr}</span>` : ''}
                                </div>
                                <div class="flex items-center justify-end gap-1">
                                    <span class="text-gray-600 text-[10px]">AB</span>
                                    <span class="font-mono ${depDelaySec !== null ? 'text-gray-400 line-through' : ''}">${depTime}</span>
                                    ${depDelaySec !== null ? `<span class="precision-time ${depDelayClass}">${depActual}</span>` : ''}
                                    ${depDelayStr ? `<span class="text-[9px] ${depDelayClass}">${depDelayStr}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // ─── Zeitreise ───────────────────────────────────────────────────────────────
        function changeTripDate(days) {
            if (!currentTripData.number) return;
            
            const currentDate = new Date(currentTripData.date);
            const newDate = new Date(currentDate);
            newDate.setDate(currentDate.getDate() + days);
            
            const y = newDate.getFullYear();
            const m = String(newDate.getMonth() + 1).padStart(2, '0');
            const d = String(newDate.getDate()).padStart(2, '0');
            const newDateString = `${y}-${m}-${d}`;
            
            currentTripData.date = newDateString;
            document.getElementById('trip-date-input').value = newDateString;
            document.getElementById('current-trip-date-display').textContent = formatDate(newDateString);
            
            // Neue Suche für das geänderte Datum
            handleTripSearch();
        }

        // ─── UI-Hilfsfunktionen ─────────────────────────────────────────────────────
        function showMessage(text, type = 'info') {
            const container = document.getElementById('trip-search-results');
            container.innerHTML = `<div class="text-${type === 'error' ? 'red' : 'gray'}-500">${text}</div>`;
        }

        function formatDate(dateString) {
            const d = new Date(dateString);
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function clearTripSearch() {
            document.getElementById('trip-number-input').value = '';
            document.getElementById('trip-date-input').value = '';
            document.getElementById('trip-navigation').classList.add('hidden');
            document.getElementById('trip-itinerary-container').classList.add('hidden');
            document.getElementById('trip-search-results').innerHTML = '';
            currentTripData = { number: null, date: null, results: [] };
        }

        // ─── Init ────────────────────────────────────────────────────────────────────
        init();
    </script>
