<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit · Konverter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #0a0a0a; color: #e5e7eb; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

        #drop-zone {
            border: 2px dashed #374151;
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: #111;
        }
        #drop-zone.drag-over { border-color: #ef4444; background: #1a0a0a; }
        #drop-zone:hover { border-color: #4b5563; }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
        .badge-train  { background: #1e3a5f; color: #93c5fd; }
        .badge-bus    { background: #14532d; color: #86efac; }
        .badge-subway { background: #2e1065; color: #c4b5fd; }
        .badge-tram   { background: #451a03; color: #fcd34d; }
        .badge-ferry  { background: #164e63; color: #67e8f9; }
        .badge-other  { background: #1f2937; color: #9ca3af; }

        .scard { background: #111; border: 1px solid #1f2937; border-radius: 14px; padding: 16px 20px; flex: 1; min-width: 120px; }
        .results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .results-table th { text-align: left; padding: 10px 12px; color: #6b7280; font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #1f2937; white-space: nowrap; }
        .results-table td { padding: 9px 12px; border-bottom: 1px solid #111827; color: #e5e7eb; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: #ef4444; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    </style>
</head>
<body class="dark min-h-screen">

<header class="sticky top-0 z-50 border-b border-zinc-900 bg-black/80 backdrop-blur-sm">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <span class="text-red-600 font-black text-xl italic tracking-tight">dilaeit</span>
            <span class="text-zinc-600 text-xs mono" id="mode-label">/ konverter</span>
        </a>
        <a href="/stats.html" class="text-zinc-500 hover:text-zinc-300 px-2 py-2 rounded-lg hover:bg-zinc-900 transition-colors text-sm">
            <i class="fas fa-chart-bar"></i>
        </a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-10">
    <div class="mb-10">
        <h1 class="text-3xl font-black tracking-tight mb-2">
            <span id="source-name" class="text-zinc-300">Transit</span>
            <span class="text-zinc-600 mx-3">→</span>
            <span class="text-red-600 italic">dilaeit</span>
        </h1>
        <p class="text-zinc-400 text-sm max-w-lg" id="mode-desc">
            Konvertiere deinen Export ins dilaeit-Format.
        </p>
    </div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".json,.txt" class="hidden">
        <div class="text-5xl mb-4 text-zinc-600"><i class="fas fa-file-import"></i></div>
        <p class="text-zinc-300 font-semibold text-lg mb-1">Export JSON/TXT hier ablegen</p>
        <p class="text-zinc-600 text-sm">oder klicken zum Auswählen</p>
    </div>

    <div id="result-section" class="hidden mt-8">
        <div class="flex flex-wrap gap-3 mb-6" id="stat-row"></div>
        <div class="flex items-center justify-between mb-3 flex-wrap gap-4">
            <p class="text-zinc-500 text-sm" id="preview-hint"></p>
            <button onclick="startDownload()" class="bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-6 py-3 rounded-xl shadow-lg shadow-red-600/20 transition-all active:scale-95">
                <i class="fas fa-download mr-2"></i>dilaeit JSON herunterladen
            </button>
        </div>
        <div class="border border-zinc-800 rounded-2xl overflow-hidden bg-zinc-900/30">
            <div style="max-height: 500px; overflow-y: auto;">
                <table class="results-table">
                    <thead class="sticky top-0 bg-zinc-950 z-20">
                        <tr>
                            <th>Datum</th><th>Zeit</th><th>Linie</th><th>Von</th><th>Nach</th><th>km</th><th>Versp.</th>
                        </tr>
                    </thead>
                    <tbody id="preview-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    let converted = [];
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'traewelling';

    if (mode === 'travelynx') {
        document.getElementById('source-name').textContent = 'travelynx.de';
        document.getElementById('mode-label').textContent = '/ travelynx-konverter';
        document.getElementById('mode-desc').textContent = 'Konvertiere deinen travelynx.de JSON-Export für dilaeit.';
    } else {
        document.getElementById('source-name').textContent = 'Träwelling';
        document.getElementById('mode-label').textContent = '/ träwelling-konverter';
        document.getElementById('mode-desc').textContent = 'Konvertiere deinen Träwelling JSON-Export für dilaeit.';
    }

    document.getElementById('file-input').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const raw = reader.result;
                converted = mode === 'travelynx' ? convertTravelynx(raw) : convertTraewelling(raw);
                render(converted);
            } catch(err) { alert('Fehler bei der Konvertierung: ' + err.message); }
        };
        reader.readAsText(file);
    };

    function convertTraewelling(raw) {
        const parsed = JSON.parse(raw);
        const data = parsed.data || parsed;
        if (!Array.isArray(data)) throw new Error('Kein gültiger Träwelling Export (Array erwartet)');
        
        return data.map(entry => {
            const s = entry.status;
            const ci = s.checkin;
            const depISO     = ci.manualDeparture   || ci.origin.departurePlanned;
            const depRealISO = ci.origin.departureReal || null;
            const arrISO     = ci.manualArrival     || ci.destination.arrivalPlanned;
            const arrRealISO = ci.destination.arrivalReal || null;

            const toTime = iso => iso ? new Date(iso).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}) : null;
            const delay  = arrRealISO && arrISO ? Math.round((new Date(arrRealISO) - new Date(arrISO)) / 60000) : 0;

            // Koordinaten: versuche verschiedene Felder die Träwelling liefert
            const originLat  = ci.origin.latitude      || ci.origin.lat      || ci.origin.coords?.[0]  || null;
            const originLng  = ci.origin.longitude     || ci.origin.lng      || ci.origin.coords?.[1]  || null;
            const destLat    = ci.destination.latitude || ci.destination.lat || ci.destination.coords?.[0] || null;
            const destLng    = ci.destination.longitude|| ci.destination.lng || ci.destination.coords?.[1] || null;

            return {
                id:          'trw-' + s.id,
                date:        new Date(depISO).toISOString().slice(0,10),
                time:        toTime(depISO),
                depReal:     toTime(depRealISO),
                arrPlanned:  toTime(arrISO),
                arrReal:     toTime(arrRealISO),
                depManual:   false,
                arrManual:   false,
                line:        ci.lineName || ci.number || '?',
                from:        ci.origin.name,
                to:          ci.destination.name,
                mode:        (ci.category || 'train').toLowerCase(),
                km:          ci.distance ? Math.round(ci.distance / 100) / 10 : null,
                delay:       delay,
                note:        s.body || null,
                fromCoords:  (originLat && originLng) ? [parseFloat(originLat), parseFloat(originLng)] : null,
                toCoords:    (destLat   && destLng)   ? [parseFloat(destLat),   parseFloat(destLng)]   : null,
            };
        });
    }

    function convertTravelynx(raw) {
        const data = JSON.parse(raw);
        if (!Array.isArray(data)) throw new Error('Kein gültiger Travelynx Export (Array erwartet)');
        
        return data.map(j => {
            const schedDep = parseFloat(j.sched_dep_ts) * 1000;
            const schedArr = parseFloat(j.sched_arr_ts) * 1000;
            const rtDep    = j.rt_dep_ts  ? parseFloat(j.rt_dep_ts)  * 1000 : null;
            const rtArr    = j.rt_arr_ts  ? parseFloat(j.rt_arr_ts)  * 1000 : null;

            let delay = 0;
            if (j.delay_arr != null) delay = Math.round(parseFloat(j.delay_arr) / 60);
            else if (rtArr && schedArr) delay = Math.round((rtArr - schedArr) / 60000);

            const toTime = ms => ms ? new Date(ms).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}) : null;

            return {
                id:         'tlx-' + j.id,
                date:       new Date(schedDep).toISOString().slice(0,10),
                time:       toTime(schedDep),
                depReal:    rtDep ? toTime(rtDep) : null,
                arrPlanned: toTime(schedArr),
                arrReal:    rtArr ? toTime(rtArr) : null,
                depManual:  false,
                arrManual:  false,
                line:       (j.type + ' ' + (j.line || j.no || '')).trim(),
                from:       j.from_name,
                to:         j.to_name,
                mode:       j.type?.toLowerCase().includes('bus') ? 'bus' : 'train',
                km:         j.km ? parseFloat(j.km) : null,
                delay:      delay,
                fromCoords: j.from_latlon || null,
                toCoords:   j.to_latlon   || null,
                note:       j.user_data?.comment || null
            };
        });
    }

    function render(data) {
        let totalKm = 0;
        data.forEach(j => { if(j.km) totalKm += j.km; });
        
        document.getElementById('stat-row').innerHTML = `
            <div class="scard">
                <div class="text-2xl font-black text-white mono">${data.length}</div>
                <div class="text-[10px] text-zinc-500 uppercase mt-1">Fahrten</div>
            </div>
            <div class="scard">
                <div class="text-2xl font-black text-blue-400 mono">${Math.round(totalKm)}</div>
                <div class="text-[10px] text-zinc-500 uppercase mt-1">km gesamt</div>
            </div>
        `;

        document.getElementById('preview-body').innerHTML = data.slice(0, 100).map(j => `
            <tr>
                <td class="text-zinc-500 mono">${j.date}</td>
                <td class="text-zinc-400 mono">${j.time}</td>
                <td class="font-bold">${j.line}</td>
                <td class="text-zinc-400 text-xs">${j.from}</td>
                <td class="text-zinc-400 text-xs">${j.to}</td>
                <td class="text-zinc-500 mono">${j.km || '—'}</td>
                <td class="${j.delay > 0 ? 'text-red-400' : 'text-green-400'} font-bold mono">${j.delay > 0 ? '+' : ''}${j.delay}'</td>
            </tr>
        `).join('');
        
        document.getElementById('preview-hint').textContent = data.length > 100 ? `Vorschau: Erste 100 von ${data.length} Fahrten` : `${data.length} Fahrten bereit zum Download.`;
        document.getElementById('result-section').classList.remove('hidden');
    }

    function startDownload() {
        const blob = new Blob([JSON.stringify(converted, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `dilaeit_import_${mode}_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }
</script>
</body>
</html>
