<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit · json-Konverter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Träwelling-Export in das dilaeit-Format konvertieren">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #0a0a0a; color: #e5e7eb; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

        #drop-zone {
            border: 2px dashed #374151;
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: #111;
        }
        #drop-zone.drag-over { border-color: #ef4444; background: #1a0a0a; }
        #drop-zone:hover { border-color: #4b5563; }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
        .badge-train  { background: #1e3a5f; color: #93c5fd; }
        .badge-bus    { background: #14532d; color: #86efac; }
        .badge-subway { background: #2e1065; color: #c4b5fd; }
        .badge-tram   { background: #451a03; color: #fcd34d; }
        .badge-ferry  { background: #164e63; color: #67e8f9; }
        .badge-other  { background: #1f2937; color: #9ca3af; }

        .scard { background: #111; border: 1px solid #1f2937; border-radius: 14px; padding: 16px 20px; flex: 1; min-width: 120px; }
        .results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .results-table th { text-align: left; padding: 10px 12px; color: #6b7280; font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #1f2937; white-space: nowrap; }
        .results-table td { padding: 9px 12px; border-bottom: 1px solid #111827; color: #e5e7eb; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: #ef4444; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    </style>
</head>
<body class="dark min-h-screen">

<header class="sticky top-0 z-50 border-b border-zinc-900 bg-black/80 backdrop-blur-sm">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <span class="text-red-600 font-black text-xl italic tracking-tight">dilaeit</span>
            <span class="text-zinc-600 text-xs mono" id="mode-label">/ konverter</span>
        </a>
        <a href="/stats.html" class="text-zinc-500 hover:text-zinc-300 px-2 py-2 rounded-lg hover:bg-zinc-900 transition-colors text-sm">
            <i class="fas fa-chart-bar"></i>
        </a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-10">
    <div class="mb-10">
        <h1 class="text-3xl font-black tracking-tight mb-2">
            <span id="source-name" class="text-zinc-300">Transit</span>
            <span class="text-zinc-600 mx-3">→</span>
            <span class="text-red-600 italic">dilaeit</span>
        </h1>
        <p class="text-zinc-400 text-sm max-w-lg" id="mode-desc">
            Konvertiere deinen Export ins dilaeit-Format.
        </p>
    </div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".json" class="hidden">
        <div class="text-5xl mb-4 text-zinc-600"><i class="fas fa-file-import"></i></div>
        <p class="text-zinc-300 font-semibold text-lg mb-1">JSON hier ablegen</p>
        <p class="text-zinc-600 text-sm">oder klicken zum Auswählen</p>
    </div>

    <div id="result-section" class="hidden mt-8">
        <div class="flex flex-wrap gap-3 mb-6" id="stat-row"></div>
        <div class="flex items-center justify-between mb-3">
            <p class="text-zinc-500 text-sm" id="preview-hint"></p>
            <button onclick="startDownload()" class="bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-5 py-2.5 rounded-xl">
                JSON herunterladen
            </button>
        </div>
        <div class="border border-zinc-800 rounded-2xl overflow-hidden">
            <div style="max-height: 460px; overflow-y: auto;">
                <table class="results-table">
                    <thead class="sticky top-0 bg-zinc-950">
                        <tr>
                            <th>Datum</th><th>Zeit</th><th>Linie</th><th>Von</th><th>Nach</th><th>Typ</th><th>km</th>
                        </tr>
                    </thead>
                    <tbody id="preview-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    let converted = [];
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'traewelling';

    if (mode === 'travelynx') {
        document.getElementById('source-name').textContent = 'travelynx.de';
        document.getElementById('mode-label').textContent = '/ travelynx-konverter';
        document.getElementById('mode-desc').textContent = 'Konvertiere deinen travelynx.de JSON-Export für dilaeit.';
    } else {
        document.getElementById('source-name').textContent = 'Träwelling';
        document.getElementById('mode-label').textContent = '/ träwelling-konverter';
    }

    document.getElementById('file-input').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                converted = mode === 'travelynx' ? convertTravelynx(reader.result) : convertTraewelling(reader.result);
                render(converted);
            } catch(err) { alert(err.message); }
        };
        reader.readAsText(file);
    };

    function convertTraewelling(raw) {
        const parsed = JSON.parse(raw);
        return parsed.data.map(entry => {
            const s = entry.status;
            const ci = s.checkin;
            const depISO = ci.manualDeparture || ci.origin.departurePlanned;
            return {
                id: 'trw-' + s.id,
                date: new Date(depISO).toISOString().slice(0,10),
                time: new Date(depISO).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}),
                line: ci.lineName || ci.number || '?',
                from: ci.origin.name,
                to: ci.destination.name,
                mode: (ci.category || 'train').toLowerCase(),
                km: ci.distance ? Math.round(ci.distance / 100) / 10 : null,
                delay: Math.round((new Date(ci.destination.arrivalReal || ci.destination.arrivalPlanned) - new Date(ci.destination.arrivalPlanned)) / 60000),
                fromCoords: ci.origin.latitude ? [ci.origin.latitude, ci.origin.longitude] : null,
                toCoords: ci.destination.latitude ? [ci.destination.latitude, ci.destination.longitude] : null
            };
        });
    }

    function convertTravelynx(raw) {
        const data = JSON.parse(raw);
        return data.map(j => ({
            id: 'tlx-' + j.id,
            date: new Date(j.sched_dep_ts * 1000).toISOString().slice(0,10),
            time: new Date(j.sched_dep_ts * 1000).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}),
            line: (j.type + ' ' + (j.line || j.no)).trim(),
            from: j.from_name,
            to: j.to_name,
            mode: j.type?.toLowerCase().includes('bus') ? 'bus' : 'train',
            km: null,
            delay: Math.round(j.delay_arr / 60),
            fromCoords: j.from_latlon,
            toCoords: j.to_latlon
        }));
    }

    function render(data) {
        document.getElementById('preview-body').innerHTML = data.map(j => `
            <tr>
                <td>${j.date}</td><td>${j.time}</td><td>${j.line}</td><td>${j.from}</td><td>${j.to}</td><td>${j.mode}</td><td>${j.km || '—'}</td>
            </tr>
        `).join('');
        document.getElementById('result-section').classList.remove('hidden');
    }

    function startDownload() {
        const blob = new Blob([JSON.stringify(converted, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `dilaeit_import_${mode}.json`;
        a.click();
    }
</script>
</body>
</html>
