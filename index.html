<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>aerror v.0.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: var(--card); padding: 18px 20px; border-bottom: 1px solid #d2d2d7; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 700; }
        .search-area { padding: 20px; background: var(--card); border-bottom: 1px solid #d2d2d7; }
        input[type="text"] { width: 100%; padding: 16px; background: #f2f2f2; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        .time-controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 12px; }
        .time-controls input { padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 13px; }
        .now-btn { padding: 10px; background: #eee; border: 1px solid #d2d2d7; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .row { padding: 20px; background: var(--card); border-bottom: 1px solid #f0f0f2; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .line-id { color: var(--db-red); font-weight: 800; font-size: 24px; }
        .time-group { text-align: right; }
        .v-red { color: #ff3b30 !important; }
        .p-green { color: #34c759 !important; }
        .ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .ov-bar { background: var(--card); padding: 18px 20px; border-bottom: 1px solid #d2d2d7; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; font-weight: 700; }
        #dropdown, #archive-view { position: absolute; left: 20px; right: 20px; background: #fff; border: 1px solid #d2d2d7; z-index: 9999; display: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .item { padding: 15px; border-bottom: 1px solid #f0f0f2; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <span onclick="location.reload()" style="cursor:pointer">↻</span>
    <h1>AERROR v.0.1</h1>
    <span onclick="toggleArchive()" style="cursor:pointer">📂</span>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="Haltestelle suchen..." oninput="debounceSearch()" autocomplete="off">
    <div class="time-controls">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
        <button class="now-btn" onclick="setNow()">JETZT</button>
    </div>
    <div id="dropdown"></div>
    <div id="archive-view"></div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar"><span id="ov_title">Fahrtverlauf</span><span onclick="closeOv()" style="cursor:pointer; font-size:24px;">✕</span></div>
    <div id="trip_content"></div>
</div>

<script>
    const API = "https://v6.db.transport.rest";
    let activeId = "";
    let timer;

    function setNow() {
        const n = new Date();
        document.getElementById('dateInput').value = n.toISOString().split('T')[0];
        document.getElementById('timeInput').value = n.toTimeString().slice(0, 5);
        if(activeId) loadDeps();
    }
    setNow();

    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }

    async function doSearch() {
        const q = document.getElementById('inp').value;
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }
        dd.style.display = 'block';
        const r = await fetch(`${API}/locations?query=${encodeURIComponent(q)}&results=5`);
        const data = await r.json();
        dd.innerHTML = data.map(l => `<div class="item" onclick="pick('${l.id}', '${l.name}')">${l.name}</div>`).join('');
    }

    function pick(id, name) {
        activeId = id; document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadDeps();
    }

    async function loadDeps() {
        const dt = new Date(`${document.getElementById('dateInput').value}T${document.getElementById('timeInput').value}`).toISOString();
        const res = document.getElementById('results');
        res.innerHTML = "<div style='padding:40px; text-align:center; color:#888;'>Suche...</div>";
        const r = await fetch(`${API}/stops/${encodeURIComponent(activeId)}/departures?when=${dt}&duration=60`);
        const data = await r.json();
        res.innerHTML = data.departures.map(d => {
            const ist = d.when || d.plannedWhen;
            const diff = (new Date(ist) - new Date(d.plannedWhen)) / 60000;
            return `<div class="row" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${(d.direction||"").replace(/'/g,"")}')">
                <div><span class="line-id">${d.line.name}</span><br><span style="font-size:14px; font-weight:600;">${d.direction}</span></div>
                <div class="time-group">
                    <span style="font-size:20px;" class="${diff>0?'v-red':''}">${new Date(ist).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                    <span style="font-size:11px; color:#888; display:block;">Soll: ${new Date(d.plannedWhen).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                </div>
            </div>`;
        }).join('');
    }

    async function loadTrip(tid, line, dest) {
        saveToArchive(tid, line, dest);
        document.getElementById('ov_trip').style.display = 'block';
        const r = await fetch(`${API}/trips/${encodeURIComponent(tid)}`);
        const data = await r.json();
        document.getElementById('ov_title').innerText = line + " → " + dest;
        document.getElementById('trip_content').innerHTML = data.trip.stopovers.map(s => `
            <div style="padding:15px; border-bottom:1px solid #eee;">
                <div style="font-weight:600;">${s.stop.name}</div>
                <div style="font-size:20px;">${new Date(s.departure||s.arrival||s.plannedDeparture).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
            </div>`).join('');
    }

    function saveToArchive(tid, line, dest) {
        let arc = JSON.parse(localStorage.getItem('aerror_arc') || "[]");
        arc = arc.filter(x => x.tid !== tid).slice(0, 9);
        arc.unshift({tid, line, dest, time: new Date().toLocaleString()});
        localStorage.setItem('aerror_arc', JSON.stringify(arc));
    }

    function toggleArchive() {
        const v = document.getElementById('archive-view');
        v.style.display = v.style.display === 'block' ? 'none' : 'block';
        const arc = JSON.parse(localStorage.getItem('aerror_arc') || "[]");
        v.innerHTML = arc.length ? arc.map(a => `<div class="item" onclick="loadTrip('${a.tid}','${a.line}','${a.dest}')"><b>${a.line}</b> → ${a.dest}<br><small style="color:#888">${a.time}</small></div>`).join('') : "<div style='padding:20px;'>Noch keine Fahrten im Archiv.</div>";
    }

    function closeOv() { document.getElementById('ov_trip').style.display = 'none'; }
</script>
</body>
</html>
