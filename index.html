<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --green: #008f39; --red: #ff3b30; --border: #d2d2d7; }
        [data-theme="dark"] { --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --sub: #a1a1a6; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .header { background: var(--card); padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; color: var(--db-red); text-transform: lowercase; cursor: pointer; }
        .search-area { padding: 20px; background: var(--card); border-bottom: 1px solid var(--border); position: relative; }
        input[type="text"] { width: 100%; padding: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; color: var(--text); }
        .time-controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 12px; }
        .time-controls input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; width: 100%; box-sizing: border-box; }
        .now-btn { padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; color: var(--text); }
        .row { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .line-id { color: var(--db-red); font-weight: 800; font-size: 20px; }
        .dest { font-size: 14px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .t-row { font-size: 17px; display: flex; gap: 8px; justify-content: flex-end; font-variant-numeric: tabular-nums; }
        .t-soll { color: var(--sub); font-weight: 400; }
        .v-red { color: var(--red); } .v-green { color: var(--green); }
        .live-confirmed { font-weight: 800 !important; } 
        .prognose { font-weight: 400; opacity: 0.85; }   
        .ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .ov-bar { background: var(--card); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .stop-row { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .stop-times { font-size: 12px; width: 105px; flex-shrink: 0; line-height: 1.3; }
        #dropdown, #archive-view { position: absolute; left: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); z-index: 9999; display: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 300px; overflow-y: auto; }
        .item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--text); }
        .cancelled { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body data-theme="light">

<div class="header">
    <h1 onclick="location.reload()">dilaeit</h1>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span onclick="toggleTheme()" id="themeIcon" style="cursor:pointer;">🌙</span>
        <span onclick="toggleArchive()" style="cursor:pointer; font-size:14px; color: var(--sub);">Archiv</span>
    </div>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div class="time-controls">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
        <button class="now-btn" onclick="setNow()">Jetzt</button>
    </div>
    <div id="dropdown"></div>
    <div id="archive-view"></div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar">
        <span id="ov_title" style="font-weight:800">Verlauf</span>
        <span onclick="closeOv()" style="cursor:pointer; font-size:24px;">✕</span>
    </div>
    <div id="trip_content"></div>
</div>

<script>
    const API_DB = "https://v6.db.transport.rest";
    const API_VRR = "https://v6.vrr.transport.rest";
    let activeId = "";
    let timer;

    function cleanN(n) { return n ? n.split(',')[0].trim() : ""; }
    function isTrain(l) { return l && /^(RE|RB|S|IC|ICE|TGV|EC|NJ)/i.test(l); }
    function getPlat(l, p) { return p ? (isTrain(l) ? 'Gl. ' : 'Bst. ') + p : ''; }

    // FETT-LOGIK: Sekunden & Fett nur wenn delay vorhanden (Kurs angemeldet)
function getLiveDisplay(planned, actual, delay) {
    if (!actual) return { class: 'prognose', displayTime: '' };
    
    const d = new Date(actual);
    const hasSeconds = d.getSeconds() !== 0;
    const hasDelayInfo = (delay !== null && delay !== undefined);
    
    // Wenn Sekunden da sind ODER ein Delay-Flag existiert -> FETT
    if (hasSeconds || hasDelayInfo) {
        return { 
            class: 'live-confirmed', 
            displayTime: d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}) 
        };
    }
    
    // Ansonsten: Normal (Dünn)
    return { 
        class: 'prognose', 
        displayTime: d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
    };
}

    async function fetchSafety(path, useVRRFirst = true) {
        const primary = useVRRFirst ? API_VRR : API_DB;
        const secondary = useVRRFirst ? API_DB : API_VRR;
        try {
            let r = await fetch(primary + path);
            if (!r.ok) throw new Error();
            return await r.json();
        } catch (e) {
            let r = await fetch(secondary + path);
            return await r.json();
        }
    }

    async function doSearch() {
        const q = document.getElementById('inp').value;
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }
        dd.style.display = 'block';
        try {
            // Die API liefert manchmal direkt ein Array, manchmal ein Objekt mit .locations
            const data = await fetchSafety(`/locations?query=${encodeURIComponent(q)}&results=10`, true);
            const stops = Array.isArray(data) ? data : (data.locations || []);
            
            dd.innerHTML = stops
                .filter(l => l.type === 'stop' || l.type === 'station')
                .map(l => `<div class="item" onclick="pick('${l.id}', '${l.name}')">${l.name}</div>`)
                .join('');
            
            if (!dd.innerHTML) dd.innerHTML = "<div class='item'>Nichts gefunden.</div>";
        } catch (e) { 
            dd.innerHTML = "<div class='item'>Suche aktuell gestört.</div>"; 
        }
    }

    function pick(id, name) {
        activeId = id; 
        document.getElementById('inp').value = cleanN(name);
        document.getElementById('dropdown').style.display = 'none'; 
        loadDeps();
    }

    async function loadDeps() {
        if(!activeId) return;
        const dateVal = document.getElementById('dateInput').value;
        const timeVal = document.getElementById('timeInput').value;
        const dt = new Date(`${dateVal}T${timeVal}`).toISOString();
        
        const res = document.getElementById('results');
        res.innerHTML = "<div style='padding:40px; text-align:center;'>Suche Abfahrten...</div>";
        
        try {
            const data = await fetchSafety(`/stops/${encodeURIComponent(activeId)}/departures?when=${dt}&duration=120`, true);
            const departures = data.departures || data;
            
            res.innerHTML = departures.map(d => {
                const ist = d.when || d.plannedWhen, soll = d.plannedWhen;
                const live = getLiveDisplay(soll, ist, d.delay);
                const color = (new Date(ist) > new Date(soll)) ? 'v-red' : 'v-green';
                
                return `<div class="row ${d.cancelled?'cancelled':''}" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${cleanN(d.direction)}')">
                    <div style="flex-grow:1; overflow:hidden; margin-right:10px;">
                        <div style="display:flex; align-items:baseline; gap:10px;">
                            <span class="line-id">${d.line.name}</span>
                            <span style="font-size:11px; color:var(--sub); font-weight:800;">${getPlat(d.line.name, d.platform)}</span>
                        </div>
                        <span class="dest">${d.cancelled ? 'Fällt aus' : cleanN(d.direction)}</span>
                    </div>
                    <div class="time-stack">
                        <div class="t-row">
                            <span class="t-soll">${formatT(soll)}</span>
                            ${!d.cancelled ? `<span class="${color} ${live.class}">${live.displayTime}</span>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        } catch (e) { res.innerHTML = "<div style='padding:40px; text-align:center;'>Keine Daten empfangen.</div>"; }
    }

    async function loadTrip(tid, line, dest) {
        saveToArchive(tid, line, dest);
        document.getElementById('ov_trip').style.display = 'block';
        const cont = document.getElementById('trip_content');
        cont.innerHTML = "<div style='padding:50px; text-align:center;'>Lade Live-Verlauf...</div>";
        try {
            const data = await fetchSafety(`/trips/${encodeURIComponent(tid)}`, !isTrain(line));
            const trip = data.trip || data;
            document.getElementById('ov_title').innerText = line + " -> " + dest;
            
            cont.innerHTML = trip.stopovers.map(s => {
                const renderRow = (soll, ist, delay, lbl) => {
                    if (!soll) return '';
                    const live = getLiveDisplay(soll, ist, delay);
                    const color = new Date(ist||soll) > new Date(soll) ? 'v-red' : 'v-green';
                    return `<div>
                        <span style="color:var(--sub); width:28px; display:inline-block; font-weight:bold;">${lbl}</span>
                        <span class="t-soll" style="font-weight:400;">${formatT(soll)}</span>
                        ${!s.cancelled ? `<span class="${color} ${live.class}">${live.displayTime}</span>` : ''}
                    </div>`;
                };
                return `<div class="stop-row ${s.cancelled?'cancelled':''}">
                    <div class="stop-times">${renderRow(s.plannedArrival, s.arrival, s.arrivalDelay, 'An')}${renderRow(s.plannedDeparture, s.departure, s.departureDelay, 'Ab')}</div>
                    <div style="flex-grow:1;">
                        <div style="font-weight:600; font-size:14px; display:flex; justify-content:space-between; align-items: center;">
                            <span>${cleanN(s.stop.name)}</span>
                            <span style="font-size:11px; color:var(--sub); font-weight:800; margin-left:10px;">${getPlat(line, s.platform)}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } catch (e) { cont.innerHTML = "<div style='padding:50px; text-align:center;'>Verlauf nicht verfügbar.</div>"; }
    }

    function toggleTheme() { const b = document.body, i = document.getElementById('themeIcon'), isL = b.getAttribute('data-theme') === 'light'; b.setAttribute('data-theme', isL ? 'dark' : 'light'); i.innerText = isL ? '☀️' : '🌙'; }
    function setNow() { const n = new Date(); document.getElementById('dateInput').value = n.toISOString().split('T')[0]; document.getElementById('timeInput').value = n.toTimeString().slice(0, 5); }
    function formatT(iso) { return iso ? new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''; }
    function formatFull(iso) { return iso ? new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}) : ''; }
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }
    function closeOv() { document.getElementById('ov_trip').style.display = 'none'; }
    function saveToArchive(tid, line, dest) { let arc = JSON.parse(localStorage.getItem('arc') || "[]"); arc = arc.filter(x => x.tid !== tid).slice(0, 9); arc.unshift({tid, line, dest, time: new Date().toLocaleString()}); localStorage.setItem('arc', JSON.stringify(arc)); }
    function toggleArchive() { const v = document.getElementById('archive-view'); v.style.display = v.style.display === 'block' ? 'none' : 'block'; const arc = JSON.parse(localStorage.getItem('arc') || "[]"); v.innerHTML = arc.map(a => `<div class="item" onclick="loadTrip('${a.tid}','${a.line}','${a.dest}')"><b>${a.line}</b> -> ${a.dest}<br><small>${a.time}</small></div>`).join('') || "<div class='item'>Archiv leer.</div>"; }
    setNow();
</script>
</body>
</html>
