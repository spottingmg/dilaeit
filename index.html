<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit | GitHub Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        input { width: 100%; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        #dropdown { background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-top: 5px; display: none; }
        .dd-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .row { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .line { background: var(--db-red); color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .delay { color: var(--red); }
        .ontime { color: var(--green); }
        #status { font-size: 10px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<h1 style="color:var(--db-red); margin: 0 0 20px 0;">dilaeit</h1>

<input type="text" id="inp" placeholder="Station (z.B. Köln Hbf)" oninput="debounceSearch()" autocomplete="off">
<div id="dropdown"></div>

<div id="status">Bereit für GitHub Test...</div>
<div id="results" style="margin-top:20px"></div>

<script>
    const API_BASE = "https://eu.transitous.org";
    let timer;

    async function fetchViaProxy(url, isPost = false, body = null) {
        // Wir nutzen den AllOrigins JSON-Wrapper, der auf GitHub am stabilsten läuft
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        
        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            // AllOrigins packt die Antwort in ein "contents" Feld als String
            return JSON.parse(data.contents);
        } catch (e) {
            document.getElementById('status').innerText = "Proxy-Fehler: " + e.message;
            throw e;
        }
    }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if(q.length < 2) { dd.style.display = 'none'; return; }

        dd.style.display = 'block';
        dd.innerHTML = '<div class="dd-item">Suche...</div>';

        try {
            // Wir nutzen die GET-Schnittstelle für den Guesser
            const data = await fetchViaProxy(`${API_BASE}/guesser?input=${encodeURIComponent(q)}`);
            
            if(!data.guesses || data.guesses.length === 0) {
                dd.innerHTML = '<div class="dd-item">Keine Treffer</div>';
                return;
            }

            dd.innerHTML = data.guesses.map(g => `
                <div class="dd-item" onclick="pick('${g.id}', '${g.name}')">
                    <strong>${g.name}</strong>
                </div>
            `).join('');
        } catch(e) {
            dd.innerHTML = '<div class="dd-item">Fehler beim Laden.</div>';
        }
    }

    function pick(id, name) {
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadBoard(id);
    }

    async function loadBoard(id) {
        const res = document.getElementById('results');
        res.innerHTML = "Lade Abfahrten...";
        const now = Math.floor(Date.now() / 1000);

        try {
            // Wir nutzen hier den direkten STB-Endpunkt als GET (viele Proxies mögen kein POST)
            const data = await fetchViaProxy(`${API_BASE}/stb/stop_board?stop_id=${id}&time=${now}&direction=Departure&event_count=15`);
            
            res.innerHTML = data.content.entries.map(e => {
                const delay = Math.round((e.event.time - e.event.schedule_time) / 60);
                const time = new Date(e.event.schedule_time * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                return `
                <div class="row">
                    <div>
                        <span class="line">${e.line_id || 'Zug'}</span>
                        <div style="margin-top:5px; font-weight:bold">${e.direction}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:12px; opacity:0.5">${time}</div>
                        <div class="${delay > 0 ? 'delay' : 'ontime'}">${delay > 0 ? '+' + delay : 'Pünktlich'}</div>
                    </div>
                </div>`;
            }).join('');
        } catch(e) {
            res.innerHTML = "Abfahrten konnten nicht geladen werden.";
        }
    }

    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 500); }
</script>
</body>
</html>
