<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit - ÖPNV in Echtzeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #ef4444;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        .dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .search-container {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-primary);
            padding: 1rem 0;
        }

        .trip-item {
            border-bottom: 1px solid rgba(156, 163, 175, 0.1);
        }

        /* Compact Itinerary */
        #trip-itinerary {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .itinerary-item {
            padding: 0.25rem 0;
        }

        .cancelled {
            color: #9ca3af !important;
            text-decoration: line-through;
        }

        .realtime-on-time {
            color: var(--success);
        }

        .realtime-delay {
            color: var(--error);
        }

        .platform-changed {
            color: #f97316; /* Orange */
            font-weight: bold;
        }

        .detail-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            z-index: 100;
            overflow-y: auto;
        }

        .detail-view.active {
            display: block;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }

        .search-as-you-type-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .thin-prognosis {
            font-weight: 300;
        }

        .precision-time {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .itinerary-line {
            position: absolute;
            left: 19px;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #374151;
            z-index: 0;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="dark transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter italic">dilaeit</h1>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end text-xs mono text-gray-500">
                    <span id="current-date">--.--.----</span>
                    <span id="current-time" class="text-sm font-bold text-gray-300">--:--:--</span>
                </div>
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-zinc-900 hover:scale-110 transition-transform">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>
            </div>
        </header>

        <!-- Search Section -->
        <div class="search-container space-y-4">
            <div class="relative group">
                <input 
                    type="text" 
                    id="station-search" 
                    placeholder="Haltestelle suchen..." 
                    autocomplete="off"
                    class="w-full bg-gray-100 dark:bg-zinc-900 border-none rounded-2xl py-5 pl-14 pr-4 text-lg focus:ring-2 focus:ring-red-500/50 transition-all outline-none shadow-sm"
                >
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 text-xl"></i>
                
                <!-- Search Results Overlay -->
                <div id="search-results" class="absolute top-full left-0 w-full mt-3 bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl overflow-hidden hidden z-50 border border-gray-100 dark:border-zinc-800 search-as-you-type-results">
                    <!-- Results injected here -->
                </div>
            </div>

            <!-- Query Filters -->
            <div class="flex gap-3 items-center overflow-x-auto pb-2 no-scrollbar">
                <div class="flex items-center bg-gray-100 dark:bg-zinc-900 rounded-xl px-3 py-2 gap-2">
                    <i class="far fa-calendar text-gray-400 text-xs"></i>
                    <input type="date" id="query-date" class="bg-transparent border-none text-xs outline-none focus:ring-0 w-28">
                </div>
                <div class="flex items-center bg-gray-100 dark:bg-zinc-900 rounded-xl px-3 py-2 gap-2">
                    <i class="far fa-clock text-gray-400 text-xs"></i>
                    <input type="time" id="query-time" class="bg-transparent border-none text-xs outline-none focus:ring-0 w-20">
                </div>
                <button id="reset-query" class="px-4 py-2 bg-gray-100 dark:bg-zinc-900 rounded-xl text-xs font-medium hover:text-red-500 transition-colors">Jetzt</button>
            </div>
        </div>

        <!-- Board Content -->
        <div id="board-container" class="mt-8 space-y-6">
            <div id="board-header" class="hidden flex justify-between items-end border-b border-gray-100 dark:border-zinc-800 pb-4">
                <div>
                    <h2 id="station-display-name" class="text-2xl font-bold tracking-tight"></h2>
                    <p id="board-type" class="text-xs text-gray-500 uppercase tracking-widest mt-1">Abfahrtstafel</p>
                </div>
                <div id="refresh-indicator" class="text-[10px] text-gray-500 mono flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    LIVE REFRESH
                </div>
            </div>

            <div id="departures-list" class="divide-y divide-gray-100 dark:divide-zinc-900">
                <!-- Empty State -->
                <div class="flex flex-col items-center justify-center py-32 text-gray-500 space-y-6 opacity-40">
                    <div class="relative">
                        <i class="fas fa-train text-7xl"></i>
                        <i class="fas fa-search absolute -bottom-2 -right-2 text-2xl"></i>
                    </div>
                    <p class="text-sm font-medium">Suche nach einer Station, um Live-Abfahrten zu sehen.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail View Modal -->
    <div id="detail-view" class="detail-view">
        <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen flex flex-col">
            <header class="flex items-center gap-6 mb-10">
                <button id="close-detail" class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-zinc-900 flex items-center justify-center hover:scale-105 transition-transform">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="flex-1">
                    <div class="flex items-center gap-3">
                        <span id="detail-line-badge" class="px-3 py-1 rounded-lg text-xs font-black bg-red-600 text-white italic">--</span>
                        <h2 id="detail-train-direction" class="text-xl font-bold truncate">--</h2>
                    </div>
                    <p id="detail-operator" class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest">--</p>
                </div>
            </header>

            <div class="flex-1 relative">
                <div class="itinerary-line"></div>
                <div id="trip-itinerary" class="space-y-10 relative z-10">
                    <!-- Stops injected here -->
                </div>
            </div>

            <footer class="mt-12 py-6 border-t border-gray-100 dark:border-zinc-900 flex justify-between items-center text-[10px] text-gray-500 mono">
                <span id="detail-trip-id">TRIP: --</span>
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    ECHTZEIT AKTIV
                </span>
            </footer>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        const API_ENDPOINTS = [
            'https://v6.db.transport.rest',
            'https://v5.db.transport.rest'
        ];
        const VRR_API = 'https://v5.vrr.transport.rest'; // Specialized VRR API
        let currentEndpointIndex = 0;
        const REFRESH_INTERVAL = 60000;
        
        let state = {
            currentStation: null,
            departures: [],
            refreshTimer: null,
            searchTimer: null,
            lastSearchQuery: '',
            isRateLimited: false,
            lastRequestTime: 0
        };

        const $ = (id) => document.getElementById(id);

        function getApiBase(isVRR = false) {
            if (isVRR) return VRR_API;
            return API_ENDPOINTS[currentEndpointIndex];
        }

        function isNRWStation(station) {
            if (!station || !station.name) return false;
            const name = station.name.toLowerCase();
            const nrwKeywords = [
                'düsseldorf', 'duisburg', 'essen', 'bochum', 'dortmund', 'gelsenkirchen', 
                'mönchengladbach', 'wuppertal', 'oberhausen', 'krefeld', 'hagen', 'hamm', 
                'mülheim', 'leverkusen', 'solingen', 'neuss', 'herne', 'rheydt', 'viersen',
                'korschenbroich', 'kleinenbroich', 'büttgen', 'jüchen', 'erkelenz', 'hückelhoven',
                'baal', 'wassenberg', 'wegberg'
            ];
            const nrwPrefixes = ['mg', 'dus', 'e ', 'do ', 'w ', 'k ', 'bn '];
            
            return nrwKeywords.some(k => name.includes(k)) || 
                   nrwPrefixes.some(p => name.startsWith(p));
        }

        function switchApiEndpoint() {
            currentEndpointIndex = (currentEndpointIndex + 1) % API_ENDPOINTS.length;
            console.log('Switched to API endpoint:', getApiBase());
        }

        // --- Initialization ---
        function init() {
            setupClock();
            setupDefaultDateTime();
            attachEventListeners();
            
            // Only refresh when tab is visible
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && state.currentStation && !state.isRateLimited) {
                    refreshDepartures();
                }
            });
        }

        function setupClock() {
            const update = () => {
                const now = new Date();
                $('current-date').textContent = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
                $('current-time').textContent = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            };
            setInterval(update, 1000);
            update();
        }

        function setupDefaultDateTime() {
            const now = new Date();
            $('query-date').value = now.toISOString().split('T')[0];
            $('query-time').value = now.toTimeString().slice(0, 5);
        }

        function attachEventListeners() {
            $('station-search').addEventListener('input', e => handleSearchInput(e.target.value));
            $('station-search').addEventListener('focus', () => {
                if ($('search-results').children.length > 0) {
                    $('search-results').classList.remove('hidden');
                }
            });
            $('reset-query').addEventListener('click', () => {
                setupDefaultDateTime();
                if (state.currentStation) refreshDepartures();
            });
            $('theme-toggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
            });
            $('close-detail').addEventListener('click', () => {
                $('detail-view').classList.remove('active');
            });
            
            // Close search results on click outside
            document.addEventListener('click', e => {
                if (!e.target.closest('.search-container')) {
                    $('search-results').classList.add('hidden');
                }
            });

            // Re-fetch on date/time change
            $('query-date').addEventListener('change', () => state.currentStation && refreshDepartures());
            $('query-time').addEventListener('change', () => state.currentStation && refreshDepartures());
        }

        // --- Search Logic ---
        async function handleSearchInput(val) {
            const query = val.trim();
            if (query === state.lastSearchQuery) return;
            
            if (query.length < 2) {
                state.lastSearchQuery = query;
                $('search-results').classList.add('hidden');
                return;
            }

            clearTimeout(state.searchTimer);
            state.searchTimer = setTimeout(async () => {
                state.lastSearchQuery = query;
                
                const container = $('search-results');
                container.innerHTML = '<div class="px-5 py-4 text-sm text-gray-500 italic"><i class="fas fa-spinner fa-spin mr-2"></i>Suche...</div>';
                container.classList.remove('hidden');

                // APIs to try
                const endpoints = [
                    'https://v6.db.transport.rest',
                    'https://v5.db.transport.rest',
                    'https://v5.vrr.transport.rest'
                ];
                
                let resultsFound = false;

                // Try each endpoint
                for (const baseUrl of endpoints) {
                    try {
                        console.log(`Searching on: ${baseUrl}`);
                        const res = await fetch(`${baseUrl}/locations?query=${encodeURIComponent(query)}&results=15`);
                        
                        if (!res.ok) {
                            console.warn(`Search failed on ${baseUrl}: ${res.status}`);
                            continue;
                        }
                        
                        const data = await res.json();
                        // v6 returns array, v5 returns array, some return {results: []}
                        const results = Array.isArray(data) ? data : (data.results || []);
                        
                        if (results && results.length > 0) {
                            const validResults = results.filter(r => r.name && (r.id || r.extId));
                            if (validResults.length > 0) {
                                console.log(`Found ${validResults.length} stations on ${baseUrl}`);
                                renderSearchResults(validResults);
                                resultsFound = true;
                                break; 
                            }
                        }
                    } catch (err) {
                        console.error(`Fetch error on ${baseUrl}:`, err);
                    }
                }

                if (!resultsFound) {
                    container.innerHTML = `
                        <div class="px-5 py-4 text-sm text-red-500 italic space-y-2">
                            <div>Keine Station gefunden.</div>
                            <p class="text-[10px] text-gray-400">Tipp: Probiere es mit einem anderen Suchbegriff.</p>
                        </div>
                    `;
                }
            }, 300);
        }

        function renderSearchResults(results) {
            const container = $('search-results');
            container.innerHTML = '';
            
            if (!Array.isArray(results)) {
                container.classList.add('hidden');
                return;
            }

            const validResults = results.filter(r => r.name && (r.id || r.extId));
            
            if (validResults.length === 0) {
                container.innerHTML = '<div class="px-5 py-4 text-sm text-gray-500 italic">Keine Stationen gefunden.</div>';
                container.classList.remove('hidden');
                return;
            }

            validResults.forEach(loc => {
                const item = document.createElement('div');
                item.className = 'px-5 py-4 hover:bg-gray-50 dark:hover:bg-zinc-800/50 cursor-pointer flex items-center gap-4 border-b border-gray-100 dark:border-zinc-800 last:border-0';
                
                const products = loc.products ? Object.keys(loc.products).filter(p => loc.products[p]) : [];
                
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-zinc-800 flex items-center justify-center text-gray-400">
                        <i class="fas fa-location-dot"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm truncate">${loc.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-wider mt-0.5">${products.join(' • ')}</div>
                    </div>
                `;
                item.onclick = (e) => {
                    e.stopPropagation();
                    selectStation(loc);
                };
                container.appendChild(item);
            });

            container.classList.remove('hidden');
        }

        function selectStation(loc) {
            state.currentStation = loc;
            state.isRateLimited = false; // Reset rate limit on new selection
            $('station-search').value = loc.name;
            $('search-results').classList.add('hidden');
            $('board-header').classList.remove('hidden');
            $('station-display-name').textContent = loc.name;
            
            refreshDepartures();
            
            // Auto-refresh
            if (state.refreshTimer) clearInterval(state.refreshTimer);
            state.refreshTimer = setInterval(() => {
                if (document.visibilityState === 'visible' && !state.isRateLimited) {
                    refreshDepartures();
                }
            }, REFRESH_INTERVAL);
        }

        // --- Departure Logic ---
        async function refreshDepartures() {
            if (!state.currentStation) return;
            
            const now = Date.now();
            if (now - state.lastRequestTime < 1500) return; // Slightly faster cooldown
            state.lastRequestTime = now;

            const date = $('query-date').value;
            const time = $('query-time').value;
            const timestamp = `${date}T${time}:00`;

            // Prepare endpoints to try
            let endpointsToTry = [];
            if (isNRWStation(state.currentStation)) {
                endpointsToTry = [VRR_API, ...API_ENDPOINTS];
            } else {
                endpointsToTry = [...API_ENDPOINTS, VRR_API];
            }

            let lastError = null;
            for (const apiBase of endpointsToTry) {
                try {
                    const url = `${apiBase}/stops/${encodeURIComponent(state.currentStation.id)}/departures?when=${encodeURIComponent(timestamp)}&duration=120&results=40&remarks=true`;
                    const res = await fetch(url, { signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : null });
                    
                    if (res.status === 429 || (res.status === 500 && (await res.clone().text()).includes('Too Many Requests'))) {
                        continue; // Try next API
                    }

                    if (!res.ok) {
                        continue; // Try next API
                    }

                    state.isRateLimited = false;
                const data = await res.json();
                const departures = Array.isArray(data) ? data : (data.departures || []);
                
                // Tag each departure with the API that provided it
                state.departures = departures.map(d => ({ ...d, sourceApi: apiBase }));
                
                renderDepartures();
                return; // Success!
                } catch (err) {
                    console.warn(`Departure fetch failed on ${apiBase}:`, err);
                    lastError = err;
                }
            }

            // If all failed
            console.error('All departure fetch attempts failed:', lastError);
            state.isRateLimited = (lastError?.message?.includes('Limit') || false);
            
            let errorHtml = `
                <div class="py-20 text-center space-y-4">
                    <p class="text-red-500 font-bold">Fehler beim Laden der Daten.</p>
                    <p class="text-[10px] text-gray-500 mono opacity-50">${lastError?.message === 'Failed to fetch' ? 'Serververbindung fehlgeschlagen' : lastError?.message}</p>
            `;

            if (state.isRateLimited) {
                errorHtml += `
                    <p class="text-xs text-orange-500">System überlastet. Warte kurz...</p>
                    <p class="text-[10px] text-gray-400">Automatischer Versuch in 10s</p>
                `;
                setTimeout(() => { 
                    state.isRateLimited = false; 
                    if (state.currentStation) refreshDepartures(); 
                }, 10000);
            } else {
                errorHtml += `<button onclick="refreshDepartures()" class="px-6 py-3 bg-zinc-800 rounded-xl text-sm font-bold hover:bg-zinc-700 transition-colors shadow-lg">Erneut versuchen</button>`;
            }

            errorHtml += `</div>`;
            $('departures-list').innerHTML = errorHtml;
        }

        function renderDepartures() {
            const container = $('departures-list');
            container.innerHTML = '';

            if (!state.departures || state.departures.length === 0) {
                container.innerHTML = `<p class="py-20 text-center text-gray-500 text-sm italic">Momentan keine Abfahrten gefunden.</p>`;
                return;
            }

            state.departures.forEach(dep => {
                // In transport.rest APIs:
                // dep.plannedWhen: original scheduled time
                // dep.when: current best estimate (real-time if available)
                const scheduledTime = dep.plannedWhen ? new Date(dep.plannedWhen) : (dep.when ? new Date(dep.when) : null);
                const actualTime = dep.when ? new Date(dep.when) : scheduledTime;
                
                if (!scheduledTime) return;

                const delay = Math.round((actualTime.getTime() - scheduledTime.getTime()) / 60000);
                const isCancelled = dep.cancelled;
                // Consider it real-time if either a prognosis exists OR the time differs from plan
                const hasRealtime = !!dep.prognosis || (dep.plannedWhen && dep.when && dep.plannedWhen !== dep.when);
                
                let timeColorClass = 'text-gray-400';
                if (hasRealtime) {
                    timeColorClass = delay > 0 ? 'text-red-500' : 'text-green-500';
                }

                const lineName = dep.line?.name || dep.line?.id || '???';
                const direction = dep.direction || 'Unbekanntes Ziel';
                
                const item = document.createElement('div');
                item.className = `trip-item py-4 flex items-center gap-5 hover:bg-gray-50 dark:hover:bg-zinc-900/30 cursor-pointer transition-colors px-2 rounded-xl ${isCancelled ? 'opacity-40' : ''}`;
                
                item.innerHTML = `
                    <div class="w-16 flex flex-col justify-center">
                        <!-- Planzeit oben (Weiß, Fett) -->
                        <div class="text-lg font-bold mono text-white leading-none ${isCancelled ? 'line-through text-gray-500' : ''}">
                            ${scheduledTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}
                        </div>
                        
                        <!-- Echtzeit/Prognose darunter (Farbig, ohne Sekunden) -->
                        ${!isCancelled ? `
                            <div class="text-xs font-bold mt-1 ${timeColorClass}">
                                ${hasRealtime ? (delay > 0 ? '+' + delay : (delay < 0 ? delay : actualTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }))) : ''}
                            </div>
                        ` : '<div class="text-[10px] text-red-500 font-bold uppercase mt-1">Fällt aus</div>'}
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-0.5">
                            <span class="px-2 py-0.5 rounded text-[10px] font-black bg-red-600 text-white italic uppercase">${lineName}</span>
                            <span class="font-bold text-base truncate ${isCancelled ? 'line-through text-gray-500' : ''}">${direction}</span>
                        </div>
                        <div class="flex items-center gap-3 text-[10px] mono">
                            <span class="${dep.prognosis && dep.prognosis.platform !== dep.platform ? 'platform-changed' : 'text-gray-500'}">
                                ${dep.platform ? 'GLEIS ' + dep.platform : ''}
                            </span>
                            ${dep.remarks?.length > 0 ? `<span class="text-red-400 truncate max-w-[200px]"><i class="fas fa-info-circle mr-1"></i>${dep.remarks[0].text}</span>` : ''}
                        </div>
                    </div>

                    <div class="text-gray-500">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </div>
                `;

                item.onclick = () => showTripDetails(dep);
                container.appendChild(item);
            });
        }

        // --- Detail Logic ---
        async function showTripDetails(dep) {
            const tripId = dep.tripId || (dep.prognosis && dep.prognosis.tripId);
            if (!tripId) {
                console.error('No tripId found for departure:', dep);
                return;
            }
            
            const modal = $('detail-view');
            const itinerary = $('trip-itinerary');
            
            modal.classList.add('active');
            itinerary.innerHTML = `<div class="py-20 text-center"><i class="fas fa-circle-notch fa-spin text-red-600 text-2xl"></i></div>`;
            
            const lineName = dep.line?.name || dep.line?.id || '???';
            $('detail-line-badge').textContent = lineName;
            $('detail-train-direction').textContent = dep.direction || 'Unbekanntes Ziel';
            $('detail-operator').textContent = dep.line?.operator?.name || 'Unbekanntes Unternehmen';
            $('detail-trip-id').textContent = `TRIP: ${tripId.split('|')[0]}`;

            // Try the same API that provided the departure first
            const endpoints = dep.sourceApi ? [dep.sourceApi, ...API_ENDPOINTS, VRR_API] : [...API_ENDPOINTS, VRR_API];
            
            let tripData = null;
            let lastError = null;

            for (const apiBase of endpoints) {
                try {
                    console.log(`Fetching trip details from: ${apiBase} for tripId: ${tripId}`);
                    // Ensure tripId is properly encoded for the specific API
                    const res = await fetch(`${apiBase}/trips/${encodeURIComponent(tripId)}?stopovers=true&remarks=true`);
                    
                    if (!res.ok) {
                        console.warn(`Trip details failed on ${apiBase}: ${res.status}`);
                        continue;
                    }
                    
                    tripData = await res.json();
                    if (tripData && (tripData.stopovers || tripData.trip)) {
                        console.log(`Successfully loaded trip details from ${apiBase}`);
                        break;
                    }
                } catch (err) {
                    console.error(`Error fetching trip from ${apiBase}:`, err);
                    lastError = err;
                }
            }

            if (tripData) {
                renderItinerary(tripData.stopovers || tripData.trip?.stopovers || [], tripData.remarks || tripData.trip?.remarks || []);
            } else {
                itinerary.innerHTML = `
                    <div class="py-20 text-center space-y-4">
                        <p class="text-red-500 font-bold">Fahrtverlauf konnte nicht geladen werden.</p>
                        <p class="text-[10px] text-gray-500 mono opacity-50">${lastError ? lastError.message : 'Keine Daten von den APIs erhalten'}</p>
                        <p class="text-[10px] text-gray-400">Mögliche Ursache: Die Trip-ID ist für diesen Server ungültig oder abgelaufen.</p>
                    </div>
                `;
            }
        }

        function renderItinerary(stopovers, tripRemarks = []) {
            const container = $('trip-itinerary');
            container.innerHTML = '';

            const translationMap = {
                "Number of bicycles conveyed limited": "Fahrradmitnahme begrenzt",
                "Vehicle-bound boarding aid available": "Fahrzeuggebundene Einstiegshilfe vorhanden",
                "WiFi available": "WLAN verfügbar",
                "Air conditioning": "Klimaanlage",
                "Step-free access": "Stufenfreier Zugang",
                "Power sockets available": "Steckdosen verfügbar",
                "Quiet zone": "Ruhebereich",
                "Area for people with reduced mobility": "Bereich für mobilitätseingeschränkte Personen"
            };

            const translate = (text) => translationMap[text] || text;

            // Render stopovers
            stopovers.forEach(stop => {
                const isCancelled = stop.cancelled;
                const isAdditional = stop.additional;
                
                const schedArr = stop.plannedArrival ? new Date(stop.plannedArrival) : null;
                const actualArr = stop.arrival ? new Date(stop.arrival) : null;
                const schedDep = stop.plannedDeparture ? new Date(stop.plannedDeparture) : null;
                const actualDep = stop.departure ? new Date(stop.departure) : null;

                const hasLiveArr = actualArr && (schedArr && Math.abs(actualArr.getTime() - schedArr.getTime()) > 1000);
                const hasLiveDep = actualDep && (schedDep && Math.abs(actualDep.getTime() - schedDep.getTime()) > 1000);

                const formatTime = (sched, actual, hasLive) => {
                    if (!sched) return '';
                    const now = new Date();
                    const isPast = actual && (actual.getTime() < now.getTime());
                    
                    const planStr = `<span class="text-gray-500/40 font-normal mr-2">${sched.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>`;
                    
                    if (!hasLive && !actual) {
                        return `${planStr}<span class="text-gray-500/50 font-normal">${sched.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>`;
                    }

                    if (isPast) {
                        // Echtzeit-Signal gesendet: Fett + Sekunden
                        return `${planStr}<span class="precision-time text-green-500 font-bold">${actual.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>`;
                    } else {
                        // Prognose: Dünn, ohne Sekunden
                        return `${planStr}<span class="thin-prognosis text-green-500/70 font-light italic">${actual.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>`;
                    }
                };

                const stopItem = document.createElement('div');
                stopItem.className = `relative itinerary-item flex items-start gap-6 ${isCancelled ? 'opacity-40' : ''}`;
                
                const indicator = document.createElement('div');
                indicator.className = `absolute left-[13px] top-1.5 w-3.5 h-3.5 rounded-full border-2 border-white dark:border-zinc-950 z-10 
                    ${isCancelled ? 'bg-gray-500' : (isAdditional ? 'bg-blue-500' : 'bg-red-600')}`;
                stopItem.appendChild(indicator);

                stopItem.innerHTML += `
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center gap-4">
                            <div>
                                <h4 class="font-bold text-sm ${isCancelled ? 'line-through' : ''} ${isAdditional ? 'text-blue-500' : ''}">
                                    ${stop.stop.name} ${isAdditional ? '<span class="text-[10px] ml-1 uppercase">[Zusatzhalt]</span>' : ''}
                                </h4>
                                <div class="text-[10px] mono flex items-center gap-2">
                                    <span class="${stop.prognosis?.platform && stop.prognosis.platform !== stop.plannedPlatform ? 'platform-changed' : 'text-gray-500'}">
                                        ${stop.platform ? 'GLEIS ' + stop.platform : '---'}
                                    </span>
                                    ${stop.remarks?.length > 0 ? `<span class="text-red-400 truncate max-w-[150px]"><i class="fas fa-exclamation-triangle mr-1"></i>${translate(stop.remarks[0].text)}</span>` : ''}
                                </div>
                            </div>
                            <div class="text-right mono text-[10px] leading-tight shrink-0">
                                ${schedArr ? `<div class="flex items-center justify-end gap-1"><span class="text-gray-600 text-[8px]">AN</span> ${formatTime(schedArr, actualArr, hasLiveArr)}</div>` : ''}
                                ${schedDep ? `<div class="flex items-center justify-end gap-1"><span class="text-gray-600 text-[8px]">AB</span> ${formatTime(schedDep, actualDep, hasLiveDep)}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(stopItem);
            });

            // Render Trip Remarks at the end
            if (tripRemarks.length > 0) {
                const remarksContainer = document.createElement('div');
                remarksContainer.className = 'mt-4 pt-4 border-t border-gray-100 dark:border-zinc-900 space-y-1';
                tripRemarks.forEach(rem => {
                    const translatedText = translate(rem.text);
                    const rDiv = document.createElement('div');
                    rDiv.className = 'text-[10px] text-red-500 font-medium flex items-start gap-2';
                    rDiv.innerHTML = `<i class="fas fa-info-circle mt-0.5"></i> <span>${translatedText}</span>`;
                    remarksContainer.appendChild(rDiv);
                });
                container.appendChild(remarksContainer);
            }
        }

        init();
    </script>
</body>
</html>
