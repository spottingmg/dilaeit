<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --sub: #a1a1a6; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; --orange: #ff9f0a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--db-red); font-weight: 900; margin: 0; text-transform: lowercase; }
        input { padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; outline: none; width: 100%; box-sizing: border-box; }
        #dropdown { position: absolute; top: 55px; left: 0; right: 0; background: var(--card); border-radius: 12px; z-index: 100; border: 1px solid var(--border); display: none; max-height: 200px; overflow-y: auto; }
        .dd-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        
        .row { background: var(--card); padding: 14px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid var(--border); cursor: pointer; }
        .line-badge { background: var(--db-red); color: white; padding: 3px 7px; border-radius: 5px; font-weight: 800; font-size: 12px; }
        
        .time-box { text-align: right; }
        .plan { font-size: 12px; color: var(--sub); font-weight: 300; line-height: 1.3; }
        .actual { font-size: 18px; }
        .v-green { color: var(--green); }
        .v-red { color: var(--red); }

        /* Overlay Fahrtverlauf */
        #ov { display:none; position:fixed; inset:0; background:var(--bg); z-index:1000; overflow-y:auto; padding:20px; }
        .ov-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; position:sticky; top:0; background:var(--bg); padding:10px 0; border-bottom:1px solid var(--border); }
        .stop-row { display: grid; grid-template-columns: 140px 1fr; gap: 10px; padding: 15px 0; border-bottom: 1px solid var(--border); align-items: start; }
        .stop-times { display: flex; gap: 12px; align-items: start; }
        .prog { font-weight: 300; font-size: 15px; line-height: 1.3; text-align: right; min-width: 75px; }
        .has-seconds { font-weight: 900 !important; font-variant-numeric: tabular-nums; } 
        .passed { opacity: 0.7; } 
        .cancelled { text-decoration: line-through; color: var(--red) !important; }
        .remarks { font-size: 11px; color: var(--orange); margin-top: 4px; font-weight: 400; line-height: 1.2; }
        .platform { font-size: 12px; font-weight: 800; color: var(--sub); background: var(--border); padding: 1px 4px; border-radius: 4px; margin-left: 5px; }
        
        #archive-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>dilaeit</h1>
    <div style="font-size: 12px; color: var(--sub);">V6 Ultra Live</div>
</div>

<div class="search-area" style="position:relative; margin-bottom:20px;">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div id="dropdown"></div>
    <div style="display: flex; gap: 8px; margin-top:8px;">
        <input type="date" id="sel_date" style="flex:1">
        <input type="time" id="sel_time" style="flex:1">
    </div>
</div>

<div id="results"></div>

<div id="ov">
    <div class="ov-header">
        <h2 id="ov-title" style="margin:0; font-size:20px;"></h2>
        <span onclick="closeOv()" style="font-size:35px; cursor:pointer; line-height:1;">&times;</span>
    </div>
    <div id="ov-content"></div>
</div>

<div id="archive-section">
    <div style="font-size:12px; color:var(--sub); margin-bottom:10px;">ARCHIV (48H)</div>
    <div id="archive-content"></div>
</div>

<script>
    const API = "https://v6.db.transport.rest";
    let timer;

    const n = new Date();
    document.getElementById('sel_date').value = n.toISOString().split('T')[0];
    document.getElementById('sel_time').value = n.toTimeString().slice(0,5);

    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if(q.length < 2) { dd.style.display = 'none'; return; }
        try {
            const res = await fetch(`${API}/locations?query=${encodeURIComponent(q)}&results=5`);
            const data = await res.json();
            dd.innerHTML = data.map(s => `<div class="dd-item" onclick="pick('${s.id}', '${s.name}')">${s.name}</div>`).join('');
            dd.style.display = 'block';
        } catch(e) {}
    }

    function pick(id, name) {
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadBoard(id);
    }

    async function loadBoard(id) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "Lade...";
        const d = document.getElementById('sel_date').value;
        const t = document.getElementById('sel_time').value;
        const iso = new Date(`${d}T${t}`).toISOString();

        try {
            const res = await fetch(`${API}/stops/${id}/departures?when=${iso}&duration=60`);
            const deps = await res.json();
            
            resDiv.innerHTML = (deps.departures || deps).map(d => {
                const plan = new Date(d.plannedWhen);
                const act = d.when ? new Date(d.when) : plan;
                const delay = d.delay ? Math.round(d.delay / 60) : 0;
                return `
                    <div class="row" onclick="openTrip('${d.tripId}', '${d.line?.name || 'Zug'}')">
                        <div>
                            <span class="line-badge">${d.line?.name || 'Zug'}</span>
                            <div style="font-weight:600; margin-top:4px;">${d.direction}</div>
                        </div>
                        <div class="time-box">
                            <div class="plan">${plan.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                            <div class="actual ${delay >= 1 ? 'v-red' : 'v-green'}">${act.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { resDiv.innerHTML = "Fehler beim Abruf."; }
    }

    async function openTrip(tripId, lineName) {
        const ov = document.getElementById('ov');
        const cont = document.getElementById('ov-content');
        document.getElementById('ov-title').innerText = lineName;
        ov.style.display = 'block';
        cont.innerHTML = "Lade Verlauf...";

        try {
            const res = await fetch(`${API}/trips/${encodeURIComponent(tripId)}`);
            const data = await res.json();
            const now = new Date();
            
            cont.innerHTML = data.trip.stopovers.map(s => {
                const parseTime = (iso, isActual = false) => {
                    if(!iso) return null;
                    const dt = new Date(iso);
                    // Bei Echtzeit (isActual) erzwingen wir Sekundenanzeige für "Bahn-Expert-Gefühl"
                    const options = isActual ? {hour:'2-digit', minute:'2-digit', second:'2-digit'} : {hour:'2-digit', minute:'2-digit'};
                    return {
                        hm: dt.toLocaleTimeString('de-DE', options),
                        hasSec: isActual,
                        raw: dt
                    };
                };

                const pAn = parseTime(s.plannedArrival) || {hm:'--:--'};
                const pAb = parseTime(s.plannedDeparture) || {hm:'--:--'};
                const aAn = parseTime(s.arrival || s.plannedArrival, !!s.arrival);
                const aAb = parseTime(s.departure || s.plannedDeparture, !!s.departure);
                
                const isPassed = (s.departure ? new Date(s.departure) : new Date(s.arrival)) < now;
                const delAn = s.arrivalDelay / 60 || 0;
                const delAb = s.departureDelay / 60 || 0;

                const isCancelled = s.cancelled;
                const platform = s.prognosedPlatform || s.plannedPlatform;
                
                // Begründungen und Infos filtern
                const reason = s.remarks?.filter(r => r.type === 'warning' || r.type === 'status').map(r => r.text).join(' | ');

                return `
                    <div class="stop-row ${isPassed ? 'passed' : ''}">
                        <div class="stop-times">
                            <div class="plan">${pAn.hm}<br>${pAb.hm}</div>
                            <div class="prog">
                                <div class="${isCancelled ? 'cancelled' : (delAn >= 1 ? 'v-red' : 'v-green')} ${aAn?.hasSec ? 'has-seconds' : ''}">${aAn?.hm || ''}</div>
                                <div class="${isCancelled ? 'cancelled' : (delAb >= 1 ? 'v-red' : 'v-green')} ${aAb?.hasSec ? 'has-seconds' : ''}">${aAb?.hm || ''}</div>
                            </div>
                        </div>
                        <div>
                            <div style="font-weight:600; font-size:15px;">
                                ${s.stop.name} 
                                ${platform ? `<span class="platform">${platform}</span>` : ''}
                                ${s.additional ? '<span style="color:var(--orange); font-size:10px; margin-left:5px;">ZUSATZHALT</span>' : ''}
                            </div>
                            ${reason ? `<div class="remarks">${reason}</div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { cont.innerHTML = "Details nicht verfügbar."; }
        
        addToArchive(tripId, lineName, new Date().toLocaleTimeString());
    }

    function addToArchive(id, name, time) {
        let arc = JSON.parse(localStorage.getItem('dilaeit_arc') || '[]');
        arc.unshift({id, name, time, ts: Date.now()});
        const limit = Date.now() - (48*3600*1000);
        arc = arc.filter((v,i,a) => a.findIndex(t=>(t.id===v.id))===i && v.ts > limit);
        localStorage.setItem('dilaeit_arc', JSON.stringify(arc.slice(0,10)));
        renderArchive();
    }

    function renderArchive() {
        const arc = JSON.parse(localStorage.getItem('dilaeit_arc') || '[]');
        document.getElementById('archive-content').innerHTML = arc.map(a => `
            <div class="row" style="padding:10px; margin-bottom:5px; font-size:13px; opacity:0.8">
                <strong>${a.name}</strong> <span style="margin-left:auto; opacity:0.5">${a.time.slice(0,5)}</span>
            </div>`).join('');
    }

    function closeOv() { document.getElementById('ov').style.display='none'; }
    renderArchive();
</script>
</body>
</html>
