                "waiting for additional coaches":                    "Bereitstellung weiterer Wagen",
                "decoupling of coaches":                             "Abhängen von Wagen",
                "objects on the track":                              "Gegenstände auf der Strecke",
                "Replacement service":                               "Ersatzverkehr mit Bus ist eingerichtet",
                "Delay due to construction work":                    "Bauarbeiten",
                "boarding assistance":                               "Unterstützung beim Ein- und Ausstieg",
                "overhead line fault":                               "Reparatur an der Oberleitung",
                "Delay due to a track obstruction":                  "Streckensperrung",
                "signal fault":                                      "Reparatur an einem Signal",
                "Delay due to a technical defect":                   "Reparatur am Zug",
                "technical defect on the route":                     "Reparatur an der Strecke",
                "points failure":                                    "defektes Stellwerk",
                "level crossing fault":                              "technischer Defekt an einem Bahnübergang",
                "temporary speed restriction":                       "vorübergehend verminderte Geschwindigkeit auf der Strecke",
                "Delay due to a broken down train":                  "Verspätung eines vorausfahrenden Zuges",
                "Delay of previous train":                           "Verspätung eines vorausfahrenden Zuges",
                "waiting for an oncoming train":                     "Warten auf einen entgegenkommenden Zug",
                "train overtaken":                                   "Vorfahrt eines anderen Zuges",
                "waiting for free entry":                            "Vorfahrt eines anderen Zuges",
                "delayed provision of the train":                    "verspätete Bereitstellung des Zuges",
                "Delay from previous journey":                       "Verspätung aus vorheriger Fahrt",
                "short-term staff shortage":                         "kurzfristiger Personalausfall",
                "short-term illness of staff":                       "kurzfristige Erkrankung von Personal",
                "delayed staff from previous journey":               "verspätetes Personal aus vorheriger Fahrt",
                "strike":                                            "Streik",
                "storm effects":                                     "Unwetterauswirkungen",
                "track availability currently restricted":           "Verfügbarkeit der Gleise derzeit eingeschränkt",
                "technical defect on another train":                 "technischer Defekt an einem anderen Zug",
                "additional stop for boarding and alighting":        "zusätzlicher Halt zum Ein- und Ausstieg",
                "Train is diverted":                                 "Umleitung des Zuges",
                "Train is diverted. Stops are omitted.":             "Umleitung des Zuges. Einige Halte entfallen.",
                "snow and ice":                                      "Schnee und Eis",
                "weather-related reduced speed":                     "witterungsbedingt verminderte Geschwindigkeit",
                "defective door":                                    "defekte Tür",
                "technical defect resolved":                         "behobener technischer Defekt am Zug",
                "technical inspection of the train":                 "technische Untersuchung am Zug",
                "switch failure":                                    "Reparatur an der Weiche",
                "landslide":                                         "Erdrutsch",
                "flooding":                                          "Hochwasser",
                "official measure":                                  "behördliche Maßnahme",
                "high passenger volume":                             "hohes Fahrgastaufkommen verlängert Ein- und Ausstieg",
                "train running at reduced speed":                    "Zug verkehrt mit verminderter Geschwindigkeit",
                "Stops are omitted":                                 "Einige Halte entfallen.",
                "Platform change":                                   "Gleiswechsel.",
                "Change of platform":                                "Gleiswechsel.",
                "Track change":                                      "Gleiswechsel.",
                "Stop cancelled":                                    "Halt entfällt.",
                "Additional stop":                                   "Zusatzhalt.",
                "Special service":                                   "Sonderfahrt.",
                "Train is cancelled":                                "Zug fällt aus.",
                "Unfortunately, the train is cancelled.":            "Zug fällt aus.",
                "The train is cancelled due to a technical defect.": "Reparatur am Zug.",
                "The train is cancelled due to construction work.":  "Bauarbeiten.",
                "The train is cancelled due to a staff shortage.":   "kurzfristiger Personalausfall.",
                // ── Qualitätsmeldungen (Typ Q) ────────────────────────────────────────
                "WiFi available":                                    "WLAN verfügbar.",
                "WLAN not available":                                "WLAN nicht verfügbar",
                "WiFi not available in one or more coaches":         "WLAN in einem/mehreren Wagen nicht verfügbar",
                "info/entertainment not available":                  "Info-/Entertainment nicht verfügbar",
                "today: multi-purpose compartment at the front":     "Heute: Mehrzweckabteil vorne",
                "today: multi-purpose compartment at the rear":      "Heute: Mehrzweckabteil hinten",
                "today: 1st class at the front":                    "Heute: 1. Klasse vorne",
                "today: 1st class at the rear":                     "Heute: 1. Klasse hinten",
                "no 1st class":                                      "1. Klasse fehlt",
                "no multi-purpose compartment":                      "Mehrzweckabteil fehlt",
                "different coach order":                             "andere Reihenfolge der Wagen",
                "several coaches missing":                           "mehrere Wagen fehlen",
                "Vehicle-bound boarding aid available":              "fahrzeuggebundene Einstiegshilfe vorhanden.",
                "defective vehicle-bound boarding aid":              "defekte fahrzeuggebundene Einstiegshilfe",
                "train running in correct formation":                "Zug verkehrt richtig gereiht",
                "one coach missing":                                 "ein Wagen fehlt",
                "entire train without reservation":                  "gesamter Zug ohne Reservierung",
                "individual coaches without reservation":            "einzelne Wagen ohne Reservierung",
                "no quality defects":                                "keine Qualitätsmängel",
                "reservations available again":                      "Reservierungen sind wieder vorhanden",
                "no catering":                                       "kein gastronomisches Angebot",
                "On-board restaurant":                               "Bordrestaurant.",
                "Bicycles conveyed - not possible":                  "Fahrradmitnahme nicht möglich.",
                "Number of bicycles conveyed limited":               "Eingeschränkte Fahrradbeförderung.",
                "Bicycles conveyed":                                 "Fahrradmitnahme möglich.",
                "Bicycles conveyed - subject to reservation":        "Fahrradmitnahme – Reservierung erforderlich.",
                "Bicycles conveyed - subject to availability":       "Fahrradmitnahme – je nach Verfügbarkeit.",
                "no accessible facilities":                          "behindertengerechte Einrichtung fehlt",
                "replacement catering":                              "Ersatzbewirtschaftung",
                "WC accessible for wheelchair users":                "Rollstuhlgerechtes WC vorhanden.",
                "no accessible toilet":                              "Universal-WC fehlt",
                "overcrowded with compensation":                     "Überbesetzung mit Kulanzleistungen",
                "overcrowded without compensation":                  "Überbesetzung ohne Kulanzleistungen",
                "other quality defects":                             "sonstige Qualitätsmängel",
                "operational delays":                                "Verzögerungen im Betriebsablauf",
                "Step-free access":                                  "Stufenfreier Zugang.",
                "Power sockets available":                           "Steckdosen verfügbar.",
                "Quiet zone":                                        "Ruhebereich.",
                "Air conditioning":                                  "Klimaanlage vorhanden.",
                "Area for people with reduced mobility":             "Bereich für mobilitätseingeschränkte Personen.",
            };

            // Regex-Muster für dynamische Meldungen mit eingebetteten Liniennamen.
            // Die API liefert z.B. "Bus 605 heading towards Büdeshm.-Kempten from here"
            // oder "Throughbinding from line X" – der Linienname ist variabel.
            const regexTranslations = [
                // "Bus 605 heading towards Büdeshm.-Kempten from here"
                // → Fahrzeug kommt von woanders und fährt ab hier als diese Linie
                {
                    pattern: /^(.+?)\s+heading towards\s+(.+?)\s+from here\.?$/i,
                    replace: (_, line, dest) =>
                        `Durchbindung: Kommt als Linie ${line.trim()} aus Richtung ${dest.trim()}.`
                },
                // "Bus 605 heading towards Kempten - Bingen Stadtbf"
                // → Fahrzeug fährt ab hier als andere Linie weiter
                {
                    pattern: /^(.+?)\s+heading towards\s+(.+?)\.?$/i,
                    replace: (_, line, dest) =>
                        `Durchbindung: Fährt weiter als Linie ${line.trim()} Richtung ${dest.trim()}.`
                },
                // Generische Throughbinding-Varianten der DB/VRR API
                {
                    pattern: /^throughbinding\s+from\s+(?:line\s+)?(.+)$/i,
                    replace: (_, line) => `Durchbindung von Linie ${line.trim()}.`
                },
                {
                    pattern: /^throughbinding\s+(?:on|as|to)\s+(?:line\s+)?(.+)$/i,
                    replace: (_, line) => `Durchbindung auf Linie ${line.trim()}.`
                },
                {
                    pattern: /^continues?\s+as\s+(?:line\s+)?(.+)$/i,
                    replace: (_, line) => `Fährt weiter als Linie ${line.trim()}.`
                },
                {
                    pattern: /^coming\s+from\s+(?:line\s+)?(.+)$/i,
                    replace: (_, line) => `Kommt als Linie ${line.trim()}.`
                },
                // "Delay of approx. 5 minutes"
                {
                    pattern: /^delay\s+of\s+approx\.?\s+(\d+)\s+minutes?\.?$/i,
                    replace: (_, min) => `Verspätung von ca. ${min} Minuten.`
                },
                // "Cancelled due to …"
                {
                    pattern: /^cancelled\s+due\s+to\s+(.+)$/i,
                    replace: (_, reason) => `Fällt aus wegen ${reason.trim()}.`
                },
                // "Stop X is not served"
                {
                    pattern: /^stop\s+(.+?)\s+is\s+not\s+served\.?$/i,
                    replace: (_, stop) => `Halt ${stop.trim()} entfällt.`
                },
            ];

            // Übersetzt einen API-Hinweistext: erst statische Map, dann Regex-Muster
            const translate = (text) => {
                if (!text) return '';
                // 1. Exakter Treffer in der statischen Map
                if (translationMap[text]) return translationMap[text];
                // 2. Regex-Muster durchprobieren
                for (const { pattern, replace } of regexTranslations) {
                    const m = text.match(pattern);
                    if (m) return text.replace(pattern, replace);
                }
                // 3. Unbekannt: Originaltext zurückgeben
                return text;
            };

            const sortedStopovers = [...stopovers].sort((a, b) => {
                return new Date(a.plannedDeparture || a.plannedArrival) - new Date(b.plannedDeparture || b.plannedArrival);
            });

            sortedStopovers.forEach(stop => {
                const isCancelled  = stop.cancelled;
                const isAdditional = stop.additional;

                const schedArr  = stop.plannedArrival   ? new Date(stop.plannedArrival)   : null;
                const actualArr = stop.arrival          ? new Date(stop.arrival)           : null;
                const schedDep  = stop.plannedDeparture ? new Date(stop.plannedDeparture) : null;
                const actualDep = stop.departure        ? new Date(stop.departure)         : null;

                const hasLiveArr = actualArr && schedArr && Math.abs(actualArr - schedArr) > 1000;
                const hasLiveDep = actualDep && schedDep && Math.abs(actualDep - schedDep) > 1000;

                const formatTime = (sched, actual, hasLive) => {
                    if (!sched) return '';
                    const isPast  = actual && actual.getTime() < Date.now();
                    const delay   = actual && sched ? Math.round((actual - sched) / 60000) : null;
                    // Soll-Zeit: deutlich sichtbar, nicht ausgeblendet
                    const planStr = `<span class="text-gray-400 dark:text-gray-500 text-[10px] font-mono mr-1.5">${sched.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>`;
                    let delayStr  = '';
                    if (delay !== null && delay !== 0) {
                        const dc   = delay >= 1 ? 'text-red-500' : 'text-blue-400';
                        const sign = delay > 0 ? '+' : '';
                        delayStr   = `<span class="text-[9px] font-bold ${dc} ml-1">${sign}${Math.abs(delay)}'</span>`;
                    }
                    // Keine Echtzeitdaten: nur Soll-Zeit, normal
                    if (!hasLive && !actual) {
                        return `<span class="text-gray-300 dark:text-gray-200 font-mono font-medium">${sched.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>`;
                    }
                    const rtColor = delay !== null
                        ? (delay >= 1 ? 'text-red-400' : (delay <= -1 ? 'text-blue-400' : 'text-green-400'))
                        : 'text-green-400';
                    if (isPast) {
                        // Echtzeit bestätigt – fett + Sekunden
                        return `${planStr}<span class="precision-time ${rtColor}">${actual.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>${delayStr}`;
                    } else {
                        // Prognose – kursiv, aber lesbar
                        return `${planStr}<span class="thin-prognosis ${rtColor} italic text-[11px]">${actual.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}</span>${delayStr}`;
                    }
                };

                const stopItem = document.createElement('div');
                stopItem.className = `relative itinerary-item ${isCancelled ? 'opacity-40' : ''}`;
                stopItem.innerHTML = `
                    <div class="absolute left-2 top-2 w-3.5 h-3.5 rounded-full border-2 border-white dark:border-zinc-950 z-10 ${isCancelled ? 'bg-gray-500' : (isAdditional ? 'bg-blue-500' : 'bg-red-600')}"></div>
                    <div class="itinerary-item-content">
                        <div class="flex justify-between items-start gap-2">
                            <div class="min-w-0">
                                <h4 class="font-semibold ${isCancelled ? 'line-through' : ''} ${isAdditional ? 'text-blue-500' : ''} text-sm">
                                    ${stop.stop.name} ${isAdditional ? '<span class="text-[10px] ml-1 uppercase">[Zusatzhalt]</span>' : ''}
                                </h4>
                                <div class="itinerary-info mt-1 text-gray-600 dark:text-gray-300">
                                    ${(() => {
                                        const planned  = stop.plannedPlatform || stop.stop?.station?.entrances?.[0] || null;
                                        const actual   = stop.platform || stop.arrivalPlatform || stop.departurePlatform || null;
                                        const changed  = planned && actual && actual !== planned;
                                        if (!planned && !actual) return '';
                                        const display  = actual || planned;
                                        const cls      = changed ? 'platform-changed' : 'text-gray-500 dark:text-gray-400';
                                        const label    = changed
                                            ? `Gleis <span class="line-through opacity-50">${planned}</span> → <span>${actual}</span>`
                                            : `Gleis ${display}`;
                                        return `<span class="${cls} font-semibold">${label}</span>`;
                                    })()}
                                    ${isCancelled ? '<span class="text-red-500 font-semibold block mt-1">Halt entfällt</span>' : ''}
                                    ${stop.remarks?.length > 0 ? `<span class="text-red-400 block truncate max-w-full mt-1"><i class="fas fa-exclamation-triangle mr-1"></i>${translate(stop.remarks[0].text)}</span>` : ''}
                                </div>
                            </div>
                            <div class="text-right mono text-[11px] leading-tight shrink-0">
                                ${schedArr ? `<div class="flex items-center justify-end gap-1"><span class="text-gray-600 text-[8px]">AN</span> ${formatTime(schedArr, actualArr, hasLiveArr)}</div>` : ''}
                                ${schedDep ? `<div class="flex items-center justify-end gap-1"><span class="text-gray-600 text-[8px]">AB</span> ${formatTime(schedDep, actualDep, hasLiveDep)}</div>` : ''}
                            </div>
                        </div>
                    </div>`;
                container.appendChild(stopItem);
            });

            if (tripRemarks.length > 0) {
                const remarksContainer = document.createElement('div');
                remarksContainer.className = 'mt-4 pt-4 border-t border-gray-100 dark:border-zinc-900 space-y-1';
                tripRemarks.forEach(rem => {
                    const rDiv = document.createElement('div');
                    rDiv.className = 'text-[10px] text-red-500 font-medium flex items-start gap-2';
                    rDiv.innerHTML = `<i class="fas fa-info-circle mt-0.5"></i> <span>${translate(rem.text)}</span>`;
                    remarksContainer.appendChild(rDiv);
                });
                container.appendChild(remarksContainer);
            }
        }

        init();
    </script>
