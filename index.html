<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --sub: #a1a1a6; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; }
        [data-theme="light"] { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --border: #d2d2d7; --green: #008f39; --red: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; }
        .header { background: var(--bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--db-red); text-transform: lowercase; }
        .search-area { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        input { padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 16px; color: var(--text); width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--db-red); }
        .time-row { display: flex; gap: 10px; }
        .btn-jetzt { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0 15px; font-weight: bold; cursor: pointer; }
        #dropdown { position: absolute; left: 20px; right: 20px; top: 60px; background: var(--card); border: 1px solid var(--border); z-index: 9999; display: none; border-radius: 10px; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .item:last-child { border: none; }
        .row { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .line-id { color: var(--db-red); font-weight: 800; font-size: 18px; }
        .dest { font-size: 15px; font-weight: 600; }
        .t-row { text-align: right; font-variant-numeric: tabular-nums; }
        .t-soll { color: var(--sub); font-size: 12px; display: block; }
        .v-red { color: var(--red); } .v-green { color: var(--green); }
        .live-confirmed { font-weight: 900; }
        .past-stop { opacity: 0.3; filter: grayscale(1); }
        .ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .ov-bar { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; position: sticky; top: 0; border-bottom: 1px solid var(--border); }
        .stop-row { padding: 15px 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 120px 1fr 40px; align-items: center; }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <h1 onclick="location.reload()">dilaeit</h1>
    <div onclick="toggleTheme()" id="themeIcon" style="cursor:pointer">☀️</div>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div class="time-row">
        <input type="date" id="date_inp">
        <input type="time" id="time_inp">
        <button class="btn-jetzt" onclick="setNow()">Jetzt</button>
    </div>
    <div id="dropdown"></div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar">
        <span id="ov_title" style="font-weight:800;">Verlauf</span>
        <span onclick="closeOv()" style="cursor:pointer; font-size:20px;">✕</span>
    </div>
    <div id="trip_content"></div>
</div>

<script>
    const API_VRR = "https://v6.vrr.transport.rest";
    const API_DB = "https://v6.db.transport.rest";
    let activeId = "", timer, currentApi = API_VRR, tripTimer, currentTripData = null;

    setNow(false);

    async function fetchS(url) {
        try {
            const r = await fetch(url, { method: 'GET' });
            return r.ok ? await r.json() : null;
        } catch (e) { console.error("Fetch error:", e); return null; }
    }

    function setNow(refresh = true) {
        const now = new Date();
        document.getElementById('date_inp').value = now.toISOString().split('T')[0];
        document.getElementById('time_inp').value = now.toTimeString().substring(0, 5);
        if(refresh && activeId) loadDeps();
    }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }

        dd.innerHTML = '<div class="item" style="color:var(--sub)">Suche...</div>';
        dd.style.display = 'block';

        // Parallel-Abfrage für maximale Trefferquote
        const [vrrData, dbData] = await Promise.all([
            fetchS(`${API_VRR}/locations?query=${encodeURIComponent(q)}&results=10`),
            fetchS(`${API_DB}/locations?query=${encodeURIComponent(q)}&results=10`)
        ]);

        const results = [...(vrrData?.locations || vrrData || []), ...(dbData?.locations || dbData || [])];
        
        if (results.length > 0) {
            const unique = {};
            const html = results
                .filter(r => r.id && r.name && (r.type === 'stop' || r.type === 'station'))
                .filter(r => { if(unique[r.id]) return false; unique[r.id]=true; return true; })
                .map(l => `<div class="item" onclick="pick('${l.id}', '${l.name}')">${l.name.replace(',','')}</div>`)
                .join('');
            
            dd.innerHTML = html || '<div class="item">Keine Station gefunden</div>';
        } else {
            dd.innerHTML = '<div class="item">Keine Ergebnisse</div>';
        }
    }

    function pick(id, name) {
        activeId = id;
        document.getElementById('inp').value = name.split(',')[0];
        document.getElementById('dropdown').style.display = 'none';
        // Wir probieren VRR, wenn ID mit 'de:' beginnt, sonst DB
        currentApi = id.includes('de:') ? API_VRR : API_DB;
        loadDeps();
    }

    async function loadDeps() {
        const res = document.getElementById('results');
        const d = document.getElementById('date_inp').value;
        const t = document.getElementById('time_inp').value;
        const when = d && t ? `&when=${new Date(`${d}T${t}`).toISOString()}` : "";
        
        res.innerHTML = "<div style='padding:40px; text-align:center; opacity:0.5'>Lade Abfahrten...</div>";
        
        const data = await fetchS(`${currentApi}/stops/${encodeURIComponent(activeId)}/departures?duration=60${when}`);
        const deps = data?.departures || data || [];

        if(!deps.length) { res.innerHTML = "<div style='padding:20px; text-align:center;'>Nichts gefunden.</div>"; return; }

        res.innerHTML = deps.map(d => {
            const time = new Date(d.when || d.plannedWhen);
            const planned = new Date(d.plannedWhen);
            const isLive = d.prognosisType === 'prognosed' || d.prognosisType === 'actual';
            const diff = Math.round((time - planned) / 60000);
            
            return `<div class="row" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${d.direction}')">
                <div>
                    <div class="line-id">${d.line.name}</div>
                    <div class="dest">${d.direction?.split(',')[0] || ''}</div>
                </div>
                <div class="t-row">
                    <span class="t-soll">${planned.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</span>
                    <span class="${diff > 0 ? 'v-red' : 'v-green'} ${isLive ? 'live-confirmed' : ''}">
                        ${time.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second: isLive ? '2-digit' : undefined})}
                    </span>
                </div>
            </div>`;
        }).join('');
    }

    async function loadTrip(tid, line, dest) {
        currentTripData = { tid, line, dest };
        document.getElementById('ov_trip').style.display = 'block';
        refreshTrip();
        clearInterval(tripTimer);
        tripTimer = setInterval(refreshTrip, 30000);
    }

    async function refreshTrip() {
        if(!currentTripData) return;
        const { tid, line, dest } = currentTripData;
        const api = (line.match(/^(RE|RB|S|ICE|IC)/i)) ? API_DB : currentApi;
        const data = await fetchS(`${api}/trips/${encodeURIComponent(tid)}`);
        const stops = data?.trip?.stopovers || data?.stopovers || [];
        
        document.getElementById('ov_title').innerText = `${line} ➔ ${dest.split(',')[0]}`;
        const now = Date.now();

        document.getElementById('trip_content').innerHTML = stops.map(s => {
            const depTime = new Date(s.departure || s.plannedDeparture || s.arrival || s.plannedArrival).getTime();
            const isPast = now > depTime + 30000;
            const live = s.departure || s.arrival;
            
            return `<div class="stop-row ${isPast ? 'past-stop' : ''}">
                <div style="font-size:12px; font-variant-numeric: tabular-nums;">
                    ${s.plannedArrival ? 'An ' + s.plannedArrival.substring(11,16) : ''}<br>
                    <b class="${live ? 'live-confirmed' : ''}">${(s.departure || s.arrival || '').substring(11,19)}</b>
                </div>
                <div style="font-weight:600; font-size:14px;">${s.stop.name.split(',')[0]}</div>
                <div style="font-size:11px; text-align:right; color:var(--sub)">${s.platform || ''}</div>
            </div>`;
        }).join('');
    }

    function closeOv() { document.getElementById('ov_trip').style.display = 'none'; clearInterval(tripTimer); }
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }
    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeIcon').innerText = isDark ? '🌙' : '☀️';
    }
</script>
</body>
</html>
