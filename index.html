<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit | V6 Realtime</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #8e8e93; --border: #2c2c2e; --green: #30d158; --red: #ff453a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; -webkit-font-smoothing: antialiased; }
        h1 { color: var(--db-red); font-weight: 900; margin: 0; text-transform: lowercase; font-size: 28px; }
        .input-container { position: relative; margin-bottom: 15px; }
        input { padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 17px; width: 100%; box-sizing: border-box; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--db-red); }
        #dropdown { position: absolute; top: 60px; left: 0; right: 0; background: #2c2c2e; border-radius: 14px; z-index: 2000; display: none; max-height: 300px; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dd-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; color: white; }
        .row { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .line-badge { background: var(--db-red); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 13px; }
        .time-box { text-align: right; min-width: 115px; font-variant-numeric: tabular-nums; }
        .plan { font-size: 11px; color: var(--sub); }
        .actual { font-size: 19px; }
        .sec-thin { opacity: 0.4; font-weight: 300; font-size: 15px; }
        .sec-bold { opacity: 1; font-weight: 900; font-size: 17px; }
        .v-green { color: var(--green); }
        .v-red { color: var(--red); }
        #ov { display:none; position:fixed; inset:0; background:var(--bg); z-index:3000; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<div class="header" style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
    <h1>dilaeit</h1>
    <div style="font-size: 10px; color: var(--sub); font-weight: 700;">V6 ULTRA REALTIME</div>
</div>

<div class="input-container">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div id="dropdown"></div>
    <div style="display: flex; gap: 8px; margin-top:8px;">
        <input type="date" id="sel_date">
        <input type="time" id="sel_time">
    </div>
</div>

<div id="results"></div>

<div id="ov">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="ov-title" style="margin:0;"></h2>
        <span onclick="closeOv()" style="font-size:40px; cursor:pointer;">&times;</span>
    </div>
    <div id="ov-content"></div>
</div>
    <script>
const API_BASE = "https://v6.vrr.transport.rest";
    // Wir nutzen jetzt primär diesen Proxy, da er am stabilsten für VRR ist
    const PROXY = "https://api.allorigins.win/get?url=";
    let timer;

    // Zeit-Setup
    const setTime = () => {
        const now = new Date();
        document.getElementById('sel_date').value = now.toISOString().split('T')[0];
        document.getElementById('sel_time').value = now.toTimeString().slice(0,5);
    };
    setTime();

    async function fetchData(url) {
        try {
            const response = await fetch(PROXY + encodeURIComponent(url));
            if (!response.ok) throw new Error("Netzwerk-Antwort war nicht ok");
            const data = await response.json();
            // AllOrigins gibt die Daten im Feld 'contents' als String zurück
            return JSON.parse(data.contents);
        } catch (error) {
            console.error("Fehler beim Abrufen:", error);
            throw error;
        }
    }

    function debounceSearch() {
        clearTimeout(timer);
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        
        if (q.length < 3) {
            dd.style.display = 'none';
            return;
        }

        // Wir warten 800ms, um nicht zu viele Anfragen zu senden
        timer = setTimeout(async () => {
            dd.style.display = 'block';
            dd.innerHTML = '<div class="dd-item" style="color:var(--sub)">Suche läuft...</div>';
            
            try {
                const data = await fetchData(`${API_BASE}/locations?query=${q}&results=10`);
                
                if (!data || data.length === 0) {
                    dd.innerHTML = '<div class="dd-item">Keine Station gefunden.</div>';
                    return;
                }

                // Nur echte Stationen/Stops anzeigen
                const stations = data.filter(item => item.type === 'stop' || item.type === 'station');
                
                if (stations.length === 0) {
                    dd.innerHTML = '<div class="dd-item">Keine Haltestelle gefunden.</div>';
                } else {
                    dd.innerHTML = stations.map(s => `
                        <div class="dd-item" onclick="pick('${s.id}', '${s.name}')">
                            🚉 ${s.name} <br>
                            <small style="color:var(--sub); font-size:10px;">${s.location?.address || 'VRR Gebiet'}</small>
                        </div>
                    `).join('');
                }
            } catch (e) {
                dd.innerHTML = '<div class="dd-item" style="color:var(--red)">Proxy belegt. Bitte 5 Sek. warten.</div>';
            }
        }, 800);
    }

    function pick(id, name) {
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadBoard(id);
    }

    async function loadBoard(id) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<div style='padding:40px; text-align:center; opacity:0.5;'>Lade Abfahrten...</div>";
        
        const d = document.getElementById('sel_date').value;
        const t = document.getElementById('sel_time').value;
        const iso = new Date(`${d}T${t}`).toISOString();

        try {
            const data = await fetchData(`${API_BASE}/stops/${id}/departures?when=${iso}&duration=60`);
            const deps = data.departures || data;

            if (!deps || deps.length === 0) {
                resDiv.innerHTML = "<div style='padding:20px; text-align:center;'>Aktuell keine Fahrten.</div>";
                return;
            }

            resDiv.innerHTML = deps.map(d => {
                const plan = new Date(d.plannedWhen);
                const act = new Date(d.when || d.plannedWhen);
                const delay = d.delay !== null ? Math.round(d.delay / 60) : 0;
                const isReal = d.when !== null;

                return `
                    <div class="row" onclick="openTrip('${d.tripId}', '${d.line?.name}', '${d.direction}')">
                        <div>
                            <span class="line-badge">${d.line?.name || '???'}</span>
                            <div style="font-weight:700; margin-top:8px;">${d.direction}</div>
                        </div>
                        <div class="time-box">
                            <div class="plan">Plan: ${plan.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                            <div class="actual ${delay >= 1 ? 'v-red' : 'v-green'}">
                                ${act.getHours().toString().padStart(2, '0')}:${act.getMinutes().toString().padStart(2, '0')}<span class="${isReal ? 'sec-bold' : 'sec-thin'}">:${act.getSeconds().toString().padStart(2, '0')}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        } catch (e) {
            resDiv.innerHTML = "<div style='padding:20px; color:var(--red); text-align:center;'>Fehler beim Laden. <br> Bitte kurz warten.</div>";
        }
    }

    async function openTrip(tripId, line, dir) {
        if (!tripId) return;
        const ov = document.getElementById('ov');
        ov.style.display = 'block';
        document.getElementById('ov-title').innerText = line + " → " + dir;
        document.getElementById('ov-content').innerHTML = "Lade Trip-Details...";

        try {
            const data = await fetchData(`${API_BASE}/trips/${tripId}`);
            document.getElementById('ov-content').innerHTML = data.trip.stopovers.map(s => {
                const time = new Date(s.departure || s.arrival || s.plannedArrival);
                return `
                    <div style="padding:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:600; max-width:70%;">${s.stop.name}</div>
                        <div style="color:var(--sub); font-variant-numeric: tabular-nums;">${time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>`;
            }).join('');
        } catch (e) {
            document.getElementById('ov-content').innerHTML = "Verlauf momentan nicht abrufbar.";
        }
    }

    function closeOv() { document.getElementById('ov').style.display = 'none'; }
        </script>
</body>
</html>
