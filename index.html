<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --green: #008f39; --red: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; text-transform: lowercase; }
        
        .header { background: var(--card); padding: 18px 20px; border-bottom: 1px solid #d2d2d7; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: -1px; color: var(--db-red); }
        
        .search-area { padding: 20px; background: var(--card); border-bottom: 1px solid #d2d2d7; }
        input[type="text"] { width: 100%; padding: 16px; background: #f2f2f2; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; text-transform: lowercase; }
        .time-controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 12px; }
        .time-controls input { padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 13px; background: #fff; }
        .now-btn { padding: 10px; background: #eee; border: 1px solid #d2d2d7; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; line-height: 1.2; text-transform: lowercase; }

        .row { padding: 20px; background: var(--card); border-bottom: 1px solid #f0f0f2; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .line-id { color: var(--db-red); font-weight: 800; font-size: 24px; line-height: 1; }
        .dest { font-size: 14px; font-weight: 600; display: block; margin-top: 4px; }
        
        .time-stack { text-align: right; }
        .t-plan { font-size: 12px; color: var(--sub); display: block; margin-bottom: 2px; }
        .t-ist { font-size: 20px; font-weight: 800; display: block; }
        
        .v-red { color: var(--red) !important; }
        .v-green { color: var(--green) !important; }

        /* Fahrtverlauf Modal (Dunkel wie im Screenshot) */
        .ov { display: none; position: fixed; inset: 0; background: #222; color: #eee; z-index: 100000; overflow-y: auto; text-transform: none; }
        .ov-bar { background: #333; padding: 15px 20px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        
        .stop-row { padding: 12px 20px; border-bottom: 1px solid #333; display: flex; align-items: flex-start; }
        .stop-times { width: 95px; text-align: left; font-variant-numeric: tabular-nums; flex-shrink: 0; font-size: 14px; display: flex; gap: 8px; }
        .soll-t { color: #888; } /* Soll-Zeit immer grau */
        
        .be-red { color: #ff4d4d; font-weight: 700; }
        .be-green { color: #4dff4d; font-weight: 700; }

        .stop-info { flex-grow: 1; padding-left: 5px; }
        .be-stop-name { font-weight: 500; font-size: 15px; }
        .be-rl100 { font-size: 12px; color: #777; margin-left: 6px; }

        #dropdown, #archive-view { position: absolute; left: 20px; right: 20px; background: #fff; color: #333; border: 1px solid #d2d2d7; z-index: 9999; display: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-transform: lowercase;}
        .item { padding: 15px; border-bottom: 1px solid #f0f0f2; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <span onclick="location.reload()" style="cursor:pointer; font-size:20px;">↻</span>
        <h1>dilaeit</h1>
    </div>
    <span onclick="toggleArchive()" style="cursor:pointer; font-size:14px; font-weight: 600; color: var(--sub);">archiv</span>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="search yur staeischn..." oninput="debounceSearch()" autocomplete="off">
    <div class="time-controls">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
        <button class="now-btn" onclick="setNow()">teim aet sis moment</button>
    </div>
    <div id="dropdown"></div>
    <div id="archive-view"></div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar"><span id="ov_title" style="font-weight:800; text-transform:lowercase;">treen info</span><span onclick="closeOv()" style="cursor:pointer; font-size:24px;">✕</span></div>
    <div id="trip_content"></div>
</div>

<script>
    const API = "https://v6.db.transport.rest";
    let activeId = "";
    let timer;

    function setNow() {
        const n = new Date();
        document.getElementById('dateInput').value = n.toISOString().split('T')[0];
        document.getElementById('timeInput').value = n.toTimeString().slice(0, 5);
        if(activeId) loadDeps();
    }
    setNow();

    function formatT(iso) { 
        if (!iso) return '--:--'; 
        return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); 
    }
    
    function getDelayClass(ist, soll) {
        if (!ist || !soll) return 'v-green'; 
        return (new Date(ist).getTime() > new Date(soll).getTime()) ? 'v-red' : 'v-green';
    }

    function getBEColorClass(ist, soll) {
        if (!ist || !soll) return 'be-green'; 
        return (new Date(ist).getTime() === new Date(soll).getTime()) ? 'be-green' : 'be-red';
    }

    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }

    async function doSearch() {
        const q = document.getElementById('inp').value;
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }
        dd.style.display = 'block';
        try {
            const r = await fetch(`${API}/locations?query=${encodeURIComponent(q)}&results=5`);
            const data = await r.json();
            dd.innerHTML = data.map(l => `<div class="item" onclick="pick('${l.id}', '${l.name}')">${l.name}</div>`).join('');
        } catch (e) { dd.innerHTML = "<div style='padding:15px;'>error.</div>"; }
    }

    function pick(id, name) {
        activeId = id; document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadDeps();
    }

    async function loadDeps() {
        const dt = new Date(`${document.getElementById('dateInput').value}T${document.getElementById('timeInput').value}`).toISOString();
        const res = document.getElementById('results');
        res.innerHTML = "<div style='padding:40px; text-align:center;'>saenking...</div>";
        try {
            const r = await fetch(`${API}/stops/${encodeURIComponent(activeId)}/departures?when=${dt}&duration=60`);
            const data = await r.json();
            res.innerHTML = data.departures.map(d => {
                const ist = d.when || d.plannedWhen;
                const soll = d.plannedWhen;
                const ziel = d.direction || (d.destination ? d.destination.name : "endstation");
                return `<div class="row" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${ziel.replace(/'/g,"")}')">
                    <div><span class="line-id">${d.line.name}</span><span class="dest">${ziel}</span></div>
                    <div class="time-stack">
                        <span class="t-plan">${formatT(soll)}</span>
                        <span class="t-ist ${getDelayClass(ist, soll)}">${formatT(ist)}</span>
                    </div>
                </div>`;
            }).join('');
        } catch (e) { res.innerHTML = "<div style='padding:40px; text-align:center;'>no data.</div>"; }
    }

    async function loadTrip(tid, line, dest) {
        saveToArchive(tid, line, dest);
        document.getElementById('ov_trip').style.display = 'block';
        const cont = document.getElementById('trip_content');
        cont.innerHTML = "<div style='padding:50px; text-align:center;'>lading...</div>";
        try {
            const r = await fetch(`${API}/trips/${encodeURIComponent(tid)}`);
            const data = await r.json();
            document.getElementById('ov_title').innerText = line + " -> " + dest;
            cont.innerHTML = data.trip.stopovers.map(s => {
                const soll = s.plannedDeparture || s.plannedArrival;
                const ist = s.departure || s.arrival || soll;
                
                const nameMatch = s.stop.name.match(/^(.*?) \[(.*?)\]$/);
                const stopName = nameMatch ? nameMatch[1] : s.stop.name;
                const rl100 = nameMatch ? `[${nameMatch[2]}]` : '';

                return `
                <div class="stop-row">
                    <div class="stop-times">
                        <span class="soll-t">${formatT(soll)}</span>
                        <span class="${getBEColorClass(ist, soll)}">${formatT(ist)}</span>
                    </div>
                    <div class="stop-info">
                        <span class="be-stop-name">${stopName}</span><span class="be-rl100">${rl100}</span>
                    </div>
                </div>`}).join('');
        } catch (e) { cont.innerHTML = "<div style='padding:50px; text-align:center;'>trip lost.</div>"; }
    }

    function saveToArchive(tid, line, dest) {
        let arc = JSON.parse(localStorage.getItem('aerror_arc') || "[]");
        arc = arc.filter(x => x.tid !== tid).slice(0, 9);
        arc.unshift({tid, line, dest, time: new Date().toLocaleString()});
        localStorage.setItem('aerror_arc', JSON.stringify(arc));
    }

    function toggleArchive() {
        const v = document.getElementById('archive-view');
        v.style.display = v.style.display === 'block' ? 'none' : 'block';
        const arc = JSON.parse(localStorage.getItem('aerror_arc') || "[]");
        v.innerHTML = arc.length ? arc.map(a => `<div class="item" onclick="loadTrip('${a.tid}','${a.line}','${a.dest}')"><b>${a.line}</b> -> ${a.dest}<br><small>${a.time}</small></div>`).join('') : "<div style='padding:20px;'>empty.</div>";
    }

    function closeOv() { document.getElementById('ov_trip').style.display = 'none'; }
</script>
</body>
</html>
