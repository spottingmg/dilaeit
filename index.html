<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit | Verspätungsmonitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --sub: #a1a1a6; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; --hover: #3a3a3c; }
        [data-theme="light"] { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --border: #d2d2d7; --green: #008f39; --red: #ff3b30; --hover: #f2f2f7; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; overflow-x: hidden; }
        .header { background: var(--bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--db-red); text-transform: lowercase; cursor: pointer; }
        
        .search-area { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        input { padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-size: 16px; color: var(--text); outline: none; }
        input:focus { border-color: var(--db-red); }

        #dropdown { position: absolute; left: 20px; right: 20px; top: 60px; background: var(--card); border: 1px solid var(--border); z-index: 6000; display: none; border-radius: 12px; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dd-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; }

        .row { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
        .line-badge { background: var(--db-red); color: white; font-weight: 900; padding: 3px 7px; border-radius: 5px; font-size: 13px; margin-bottom: 4px; display: inline-block; }
        .cancelled { text-decoration: line-through; opacity: 0.6; }
        
        .remarks { font-size: 11px; color: var(--red); margin-top: 4px; display: block; font-weight: 600; }
        .platform-badge { font-size: 11px; background: var(--border); padding: 2px 5px; border-radius: 4px; margin-top: 5px; display: inline-block; }

        .ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .ov-bar { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; position: sticky; top: 0; border-bottom: 1px solid var(--border); }
        
        .stop-row { padding: 12px 20px; display: grid; grid-template-columns: 90px 1fr 60px; gap: 10px; border-bottom: 1px solid var(--border); align-items: center; }
        .t-plan { font-size: 10px; color: var(--sub); text-decoration: line-through; }
        .t-act { font-weight: bold; font-size: 14px; }
        .v-delay { color: var(--red); }
        .v-ontime { color: var(--green); }
        .status-tag { font-size: 9px; padding: 2px 4px; border-radius: 3px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <h1 onclick="location.reload()">dilaeit</h1>
    <span onclick="toggleTheme()" id="themeIcon" style="cursor:pointer;">🌙</span>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div id="dropdown"></div>
    <div style="display:flex; gap:8px;">
        <input type="date" id="date_inp">
        <input type="time" id="time_inp">
        <button style="background:var(--db-red); color:white; border:none; border-radius:10px; padding:0 15px; font-weight:bold;" onclick="setNow()">Jetzt</button>
    </div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar"><span id="ov_title"></span><span onclick="closeOv()" style="cursor:pointer; font-size:24px;">✕</span></div>
    <div id="trip_content"></div>
</div>

<script>
    const APIS = { DB: "https://v6.db.transport.rest", VRR: "https://v6.vrr.transport.rest" };
    let activeId = "", activeApi = "", timer;

    function setNow() {
        const n = new Date();
        document.getElementById('date_inp').value = n.toISOString().split('T')[0];
        document.getElementById('time_inp').value = n.toTimeString().slice(0,5);
    }

    async function doSearch() {
        const q = document.getElementById('inp').value;
        if(q.length < 3) return;
        const dd = document.getElementById('dropdown');
        dd.style.display = 'block';
        dd.innerHTML = '...';
        
        const results = await Promise.allSettled([
            fetch(`${APIS.DB}/locations?query=${encodeURIComponent(q)}&results=5`).then(r => r.json()),
            fetch(`${APIS.VRR}/locations?query=${encodeURIComponent(q)}&results=5`).then(r => r.json())
        ]);
        
        let html = '';
        results.forEach((res, i) => {
            if(res.status === 'fulfilled') {
                const data = Array.isArray(res.value) ? res.value : (res.value.stations || res.value.stops || []);
                data.forEach(l => {
                    html += `<div class="dd-item" onclick="pick('${l.id}','${l.name}','${i==0?APIS.DB:APIS.VRR}')">
                        <span>${l.name}</span><small>${i==0?'DB':'VRR'}</small>
                    </div>`;
                });
            }
        });
        dd.innerHTML = html;
    }

    function pick(id, name, api) {
        activeId = id; activeApi = api;
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadDeps();
    }

    async function loadDeps() {
        const res = document.getElementById('results');
        res.innerHTML = "Lade...";
        const when = `${document.getElementById('date_inp').value}T${document.getElementById('time_inp').value}`;
        
        try {
            const data = await fetch(`${activeApi}/stops/${encodeURIComponent(activeId)}/departures?duration=60&when=${when}&remarks=true`).then(r => r.json());
            const deps = data.departures || data;
            
            res.innerHTML = deps.map(d => {
                const isCancelled = d.cancelled;
                const delay = Math.round((new Date(d.when) - new Date(d.plannedWhen)) / 60000);
                const reasons = (d.remarks || []).filter(r => r.type === 'warning').map(r => r.text);
                
                return `
                <div class="row" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${activeApi}')">
                    <div style="flex:1">
                        <span class="line-badge">${d.line.name}</span>
                        <div class="${isCancelled ? 'cancelled' : ''}" style="font-weight:bold">${d.direction}</div>
                        ${isCancelled ? '<span class="remarks">⚠️ Fahrt fällt aus</span>' : ''}
                        ${reasons.map(r => `<span class="remarks">⚠️ ${r}</span>`).join('')}
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:12px; opacity:0.6">${fTime(d.plannedWhen)}</div>
                        <div class="t-act ${delay > 0 ? 'v-delay' : 'v-ontime'}">${isCancelled ? '--:--' : fTime(d.when)}</div>
                        <div class="platform-badge">${d.platform ? (activeApi.includes('vrr') ? 'Steig ' : 'Gl. ') + d.platform : '--'}</div>
                    </div>
                </div>`;
            }).join('');
        } catch(e) { res.innerHTML = "Fehler."; }
    }

    async function loadTrip(tid, line, api) {
        if(!tid) return;
        document.getElementById('ov_trip').style.display = 'block';
        const cont = document.getElementById('trip_content');
        cont.innerHTML = "Lade Verlauf...";
        
        try {
            const trip = await fetch(`${api}/trips/${encodeURIComponent(tid)}`).then(r => r.json());
            const stops = trip.stopovers || trip.trip.stopovers;
            document.getElementById('ov_title').innerText = line;
            
            cont.innerHTML = stops.map(s => {
                const arrDel = Math.round((new Date(s.arrival) - new Date(s.plannedArrival)) / 60000);
                const depDel = Math.round((new Date(s.departure) - new Date(s.plannedDeparture)) / 60000);
                
                return `
                <div class="stop-row ${s.cancelled ? 'cancelled' : ''}">
                    <div style="display:flex; flex-direction:column; font-size:11px;">
                        ${s.plannedArrival ? `<div><span class="t-plan">${fTime(s.plannedArrival)}</span> <span class="${arrDel>0?'v-delay':'v-ontime'}">${fTime(s.arrival)}</span></div>` : ''}
                        ${s.plannedDeparture ? `<div><span class="t-plan">${fTime(s.plannedDeparture)}</span> <span class="${depDel>0?'v-delay':'v-ontime'}">${fTime(s.departure)}</span></div>` : ''}
                    </div>
                    <div>
                        <div style="font-weight:bold">${s.stop.name}</div>
                        ${s.cancelled ? '<b style="color:var(--red); font-size:10px;">HALT ENTFÄLLT</b>' : ''}
                        ${s.additional ? '<b style="color:var(--green); font-size:10px;">ZUSATZHALT</b>' : ''}
                    </div>
                    <div style="font-size:12px; text-align:right">${s.platform || ''}</div>
                </div>`;
            }).join('');
        } catch(e) { cont.innerHTML = "Trip-Daten nicht verfügbar."; }
    }

    function fTime(iso) { return iso ? new Date(iso).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}) : ''; }
    function closeOv() { document.getElementById('ov_trip').style.display = 'none'; }
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }
    function toggleTheme() {
        const d = document.body;
        const isDark = d.getAttribute('data-theme') === 'dark';
        d.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
    }
    setNow();
</script>
</body>
</html>
