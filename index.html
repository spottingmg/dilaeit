<script>
    const API_VRR = "https://v6.vrr.transport.rest";
    const API_DB = "https://v6.db.transport.rest";
    let activeId = "", timer;
    let currentSourceIsDB = false; // Merkt sich, welche Quelle gerade aktiv ist

    // ... (cleanN, isTrain, getPlat, getLiveState bleiben gleich)

    async function fetchS(path, useDB = false) {
        try {
            let r = await fetch((useDB ? API_DB : API_VRR) + path);
            if (!r.ok && !useDB) { 
                // Fallback: Wenn VRR fehlschlägt, versuche DB
                r = await fetch(API_DB + path);
                currentSourceIsDB = true;
            }
            return await r.json();
        } catch (e) { return null; }
    }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }
        
        // Erst VRR versuchen
        let data = await fetchS(`/locations?query=${encodeURIComponent(q)}&results=10`, false);
        let stops = Array.isArray(data) ? data : (data?.locations || []);

        // Wenn VRR nichts findet, DB versuchen
        if (stops.length === 0) {
            data = await fetchS(`/locations?query=${encodeURIComponent(q)}&results=10`, true);
            stops = Array.isArray(data) ? data : (data?.locations || []);
            currentSourceIsDB = true;
        } else {
            currentSourceIsDB = false;
        }

        if (stops.length > 0) {
            dd.style.display = 'block';
            dd.setAttribute('data-type', 'search');
            dd.innerHTML = stops.map(l => `<div class="item" onclick="pick('${l.id}', '${l.name}')">${l.name} ${currentSourceIsDB ? '<small>(DB)</small>' : ''}</div>`).join('');
        }
    }

    async function loadDeps() {
        if(!activeId) return;
        const res = document.getElementById('results');
        const dVal = document.getElementById('date_inp').value, tVal = document.getElementById('time_inp').value;
        let timeParam = (dVal && tVal) ? `&when=${new Date(`${dVal}T${tVal}`).toISOString()}` : "";
        res.innerHTML = "<div style='padding:40px; text-align:center; color:var(--sub)'>Lade Monitor...</div>";
        
        // Nutze die Quelle, die bei der Suche erfolgreich war
        const data = await fetchS(`/stops/${encodeURIComponent(activeId)}/departures?duration=120${timeParam}`, currentSourceIsDB);
        if(!data) { res.innerHTML = "Keine Daten gefunden."; return; }
        
        const deps = Array.isArray(data) ? data : (data.departures || []);
        // ... (Rest der Anzeige-Logik bleibt gleich)
    }

    // Beim Verlauf erzwingen wir für Züge weiterhin die DB für die Sekunden-Präzision
    async function loadTrip(tid, line, dest) {
        // ... (Archiv-Logik)
        const forceDB = isTrain(line) || currentSourceIsDB;
        const data = await fetchS(`/trips/${encodeURIComponent(tid)}`, forceDB);
        // ... (Anzeige-Logik)
    }
</script>
