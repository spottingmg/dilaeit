<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --db-red: #c50014; --bg: #000000; --card: #1c1c1e; --text: #ffffff; 
            --sub: #8e8e93; --border: #2c2c2e; --green: #30d158; --red: #ff453a; --orange: #ff9f0a;
        }
        @media (prefers-color-scheme: light) {
            :root { --bg: #f2f2f7; --card: #ffffff; --text: #000000; --sub: #8e8e93; --border: #e5e5ea; }
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        h1 { color: var(--db-red); font-weight: 900; margin: 0; font-size: 24px; letter-spacing: -1px; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 10px; }
        input { 
            flex: 1; padding: 14px; background: var(--card); border: 1px solid var(--border); 
            border-radius: 12px; color: var(--text); font-size: 16px; outline: none; 
        }
        .btn { 
            padding: 0 20px; background: var(--db-red); border: none; border-radius: 12px; 
            color: white; font-weight: bold; cursor: pointer;
        }

        #dropdown { 
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 15px; display: none; overflow: hidden;
        }
        .dd-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }

        .row { 
            background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .cancelled { opacity: 0.5; text-decoration: line-through; border-left: 4px solid var(--red); }
        
        .line-badge { background: var(--db-red); color: white; padding: 3px 8px; border-radius: 4px; font-weight: 800; font-size: 12px; }
        .platform { font-size: 12px; background: var(--border); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .changed-plat { color: var(--red); font-weight: bold; border: 1px solid var(--red); }
        
        .time-box { text-align: right; min-width: 100px; }
        .plan { font-size: 11px; color: var(--sub); }
        .actual { font-size: 18px; font-variant-numeric: tabular-nums; }
        .sec { font-size: 14px; font-weight: 900; }
        .thin { font-weight: 300; opacity: 0.5; }
        
        .delay-msg { font-size: 11px; color: var(--orange); margin-top: 4px; font-weight: bold; }
        
        #ov { display:none; position:fixed; inset:0; background:var(--bg); z-index:9000; padding:20px; overflow-y:auto; }
        .stop-row { 
            padding: 12px 0; border-left: 2px solid var(--border); padding-left: 15px; 
            position: relative; display: flex; justify-content: space-between;
        }
        .stop-row::before { 
            content: ''; position: absolute; left: -6px; top: 18px; 
            width: 10px; height: 10px; background: var(--border); border-radius: 50%; 
        }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
    <h1>dilaeit</h1>
    <div style="display:flex; gap:5px;">
        <input type="date" id="sel_date" style="padding:5px; font-size:12px;">
        <input type="time" id="sel_time" style="padding:5px; font-size:12px;">
    </div>
</div>

<div class="search-box">
    <input type="text" id="inp" placeholder="Station..." onkeypress="if(event.key==='Enter') startSearch()">
    <button class="btn" onclick="startSearch()">🔍</button>
</div>

<div id="dropdown"></div>
<div id="results"></div>

<div id="ov">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="ov-title" style="margin:0; font-size:18px;"></h2>
        <button onclick="closeOv()" class="btn">Schließen</button>
    </div>
    <div id="ov-info" style="margin:10px 0; font-size:13px; color:var(--orange);"></div>
    <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
    <div id="ov-content"></div>
</div>

<script>
    const API = "https://v6.vrr.transport.rest";
    const PROXY = "https://api.allorigins.win/get?url=";

    // Uhrzeit Initialisierung
    const now = new Date();
    document.getElementById('sel_date').value = now.toISOString().split('T')[0];
    document.getElementById('sel_time').value = now.toTimeString().slice(0,5);

    async function call(path) {
        const res = await fetch(PROXY + encodeURIComponent(API + path));
        if (!res.ok) throw new Error();
        const json = await res.json();
        return JSON.parse(json.contents);
    }

    async function startSearch() {
        const q = document.getElementById('inp').value;
        const dd = document.getElementById('dropdown');
        if(q.length < 2) return;
        dd.style.display = 'block';
        dd.innerHTML = '<div class="dd-item">Suche läuft...</div>';
        try {
            const stations = await call(`/locations?query=${q}&results=5`);
            dd.innerHTML = stations.map(s => `<div class="dd-item" onclick="pick('${s.id}','${s.name}')">🚉 ${s.name}</div>`).join('');
        } catch(e) { dd.innerHTML = '<div class="dd-item" style="color:red">Fehler: Proxy/API Limit erreicht</div>'; }
    }

    function pick(id, name) {
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadBoard(id);
    }

    function formatTime(iso, plannedIso) {
        const d = iso ? new Date(iso) : new Date(plannedIso);
        const h = d.getHours().toString().padStart(2, '0');
        const m = d.getMinutes().toString().padStart(2, '0');
        const s = d.getSeconds().toString().padStart(2, '0');
        // Wenn Echtzeit-Sekunden vorhanden (iso != planned), dann fett mit Sekunden
        if (iso && iso !== plannedIso) {
            return `${h}:${m}<span class="sec">:${s}</span>`;
        }
        return `${h}:${m}<span class="sec thin">:00</span>`;
    }

    async function loadBoard(id) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "Lade...";
        const dt = document.getElementById('sel_date').value;
        const tm = document.getElementById('sel_time').value;
        try {
            const data = await call(`/stops/${id}/departures?when=${dt}T${tm}:00Z&duration=60`);
            const deps = data.departures || data;
            resDiv.innerHTML = deps.map(d => {
                const isCancelled = d.cancelled;
                const delay = d.delay !== null ? Math.round(d.delay/60) : 0;
                const plat = d.platform || d.plannedPlatform;
                const isPlatChanged = d.platform && d.platform !== d.plannedPlatform;
                
                return `
                    <div class="row ${isCancelled ? 'cancelled' : ''}" onclick="openTrip('${d.tripId}','${d.line.name}','${d.direction}')">
                        <div style="max-width:65%;">
                            <span class="line-badge">${d.line.name}</span>
                            ${plat ? `<span class="platform ${isPlatChanged ? 'changed-plat' : ''}">Gleis ${plat}</span>` : ''}
                            <div style="font-weight:bold; margin-top:5px; font-size:15px;">${d.direction}</div>
                            ${d.remarks?.filter(r => r.type === 'warning').map(r => `<div class="delay-msg">⚠️ ${r.text}</div>`).join('') || ''}
                        </div>
                        <div class="time-box">
                            <div class="plan">Plan: ${new Date(d.plannedWhen).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                            <div class="actual ${delay > 0 ? 'var-red' : 'v-green'}" style="color:${delay > 0 ? 'var(--red)' : 'var(--green)'}">
                                ${formatTime(d.when, d.plannedWhen)}
                            </div>
                            ${delay !== 0 ? `<div style="font-size:11px; font-weight:bold;">${delay > 0 ? '+' : ''}${delay} Min</div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { resDiv.innerHTML = "Fehler beim Laden."; }
    }

    async function openTrip(tripId, line, dir) {
        const ov = document.getElementById('ov');
        ov.style.display = 'block';
        document.getElementById('ov-title').innerText = `${line} → ${dir}`;
        document.getElementById('ov-content').innerHTML = "Lade Verlauf...";
        try {
            const t = await call(`/trips/${tripId}`);
            document.getElementById('ov-info').innerText = t.trip.remarks?.map(r => r.text).join(' • ') || '';
            document.getElementById('ov-content').innerHTML = t.trip.stopovers.map(s => {
                const arr = s.arrival || s.plannedArrival;
                const dep = s.departure || s.plannedDeparture;
                const pArr = s.plannedArrival;
                const plat = s.platform || s.plannedPlatform;
                const isCanceled = s.cancelled;

                return `
                    <div class="stop-row" style="${isCanceled ? 'text-decoration:line-through; color:var(--red);' : ''}">
                        <div>
                            <b style="font-size:14px;">${s.stop.name}</b>
                            ${plat ? `<div style="font-size:10px; color:var(--sub)">Gleis ${plat}</div>` : ''}
                            ${s.additional ? `<div style="color:var(--orange); font-size:10px;">Zusatzhalt</div>` : ''}
                        </div>
                        <div style="text-align:right;">
                            <div class="actual" style="font-size:14px;">${formatTime(dep || arr, s.plannedDeparture || s.plannedArrival)}</div>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { document.getElementById('ov-content').innerHTML = "Details nicht verfügbar."; }
    }

    function closeOv() { document.getElementById('ov').style.display = 'none'; }
</script>
</body>
</html>
