<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --sub: #a1a1a6; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; --blue: #0a84ff; --hover: #3a3a3c; }
        [data-theme="light"] { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --border: #d2d2d7; --green: #008f39; --red: #ff3b30; --blue: #007aff; --hover: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; overflow-x: hidden; }
        .header { background: var(--bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--db-red); text-transform: lowercase; cursor: pointer; }
        .search-area { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 5000; }
        .api-switch { display: flex; background: var(--card); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
        .sw-btn { flex: 1; text-align: center; padding: 8px; font-size: 12px; font-weight: bold; border-radius: 7px; cursor: pointer; transition: all 0.2s; color: var(--sub); }
        .sw-btn.active { background: var(--db-red); color: white; }
        .time-row { display: flex; gap: 8px; }
        .time-row input { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; outline: none; }
        .btn-now { background: var(--db-red); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; }
        #dropdown { position: absolute; left: 20px; right: 20px; top: 155px; background: var(--card); border: 1px solid var(--border); z-index: 10001; display: none; border-radius: 10px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dd-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .dd-item:hover { background: var(--hover); }
        input[type="text"] { padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 18px; color: var(--text); width: 100%; box-sizing: border-box; outline: none; }
        
        /* Liste Styling */
        .row { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .row:hover { background: var(--hover); }
        .line-id { color: var(--db-red); font-weight: 900; font-size: 20px; margin-bottom: 2px; }
        .t-act { font-weight: 900; font-size: 18px; }
        .t-act b { color: var(--text); border-bottom: 2px solid var(--db-red); }
        .t-plan { color: var(--sub); font-size: 14px; font-weight: 500; }

        /* Overview / Trip */
        .ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .ov-bar { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; position: sticky; top: 0; border-bottom: 1px solid var(--border); align-items: center; z-index: 10; }
        .stop-row { padding: 14px 20px; position: relative; display: grid; grid-template-columns: 140px 1fr 50px; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        .stop-times { font-variant-numeric: tabular-nums; line-height: 1.4; }
        .t-label { font-size: 10px; color: var(--sub); font-weight: 800; display: block; margin-top: 4px; }
        
        .v-delay { color: var(--red) !important; }
        .v-ontime { color: var(--green) !important; }
        .plat-tag { font-size: 12px; background: var(--border); padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .remarks { font-size: 12px; color: var(--red); font-weight: 600; margin-top: 6px; display: block; }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <h1 onclick="location.reload()">dilaeit</h1>
    <span onclick="toggleTheme()" id="themeIcon" style="cursor:pointer; font-size: 20px;">🌙</span>
</div>

<div class="search-area">
    <div class="api-switch">
        <div id="sw-vrr" class="sw-btn active" onclick="setApi('VRR')">VRR (NRW Local)</div>
        <div id="sw-db" class="sw-btn" onclick="setApi('DB')">DB / Fernverkehr</div>
    </div>
    <input type="text" id="inp" placeholder="Station (z.B. Düsseldorf Hbf)" oninput="debounceSearch()" autocomplete="off">
    <div class="time-row">
        <input type="date" id="date_inp" onchange="updateTimeSession(); if(activeId) loadDeps();">
        <input type="time" id="time_inp" step="1" onchange="updateTimeSession(); if(activeId) loadDeps();">
        <button class="btn-now" onclick="setNow()">Jetzt</button>
    </div>
    <div id="dropdown"></div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar">
        <span id="ov_title" style="font-weight:900; font-size: 16px;"></span>
        <span onclick="closeOv()" style="cursor:pointer; font-size:28px;">✕</span>
    </div>
    <div id="trip_content"></div>
</div>

<script>
    const API_VRR = "https://v6.vrr.transport.rest";
    const API_DB = "https://v6.db.transport.rest";
    let activeId = "", timer, currentApi = API_VRR, selectedSearchApi = 'VRR', currentTripData = null;

    init();

    function init() {
        if (!sessionStorage.getItem('lastDate')) setNow(false);
        restoreSession();
    }

    function setApi(api) {
        selectedSearchApi = api;
        document.getElementById('sw-vrr').className = api === 'VRR' ? 'sw-btn active' : 'sw-btn';
        document.getElementById('sw-db').className = api === 'DB' ? 'sw-btn active' : 'sw-btn';
        if(document.getElementById('inp').value.length > 2) doSearch();
    }

    // Präzise Zeitformatierung mit Sekunden-Erkennung
    function fTime(dateStr, mode = 'list') {
        if(!dateStr) return "--:--";
        const d = new Date(dateStr);
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        
        if (mode === 'list') return `${hh}:${mm}`;
        // Im Trip-Modus Sekunden fett markieren
        return `${hh}:${mm}:<b>${ss}</b>`;
    }

    function getDelayInfo(plan, act) {
        if (!act || !plan) return { cls: "", diff: "" };
        const diff = Math.round((new Date(act) - new Date(plan)) / 1000 / 60);
        if (diff > 0) return { cls: "v-delay", diff: `+${diff}` };
        if (diff < 0) return { cls: "v-ontime", diff: `${diff}` };
        return { cls: "v-ontime", diff: "" };
    }

    function setNow(refresh = true) {
        const now = new Date();
        document.getElementById('date_inp').value = now.toISOString().split('T')[0];
        // Sekunden im Input mitsenden für präzisere Abfrage
        document.getElementById('time_inp').value = now.toTimeString().split(' ')[0];
        updateTimeSession();
        if(refresh && activeId) loadDeps();
    }

    function updateTimeSession() {
        sessionStorage.setItem('lastDate', document.getElementById('date_inp').value);
        sessionStorage.setItem('lastTime', document.getElementById('time_inp').value);
    }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }
        
        const apiUrl = selectedSearchApi === 'VRR' ? API_VRR : API_DB;
        try {
            // VRR braucht oft fuzzy=true oder spezifische Suchparameter
            const res = await fetch(`${apiUrl}/locations?query=${encodeURIComponent(q)}&results=10`).then(r => r.json());
            const locations = Array.isArray(res) ? res : (res.locations || []);
            
            dd.style.display = locations.length ? 'block' : 'none';
            dd.innerHTML = locations
                .filter(l => l.type === 'stop' || l.id)
                .map(l => `<div class="dd-item" onclick="pick('${l.id}', '${l.name.replace(/'/g, "\\'")}', '${apiUrl}')">
                    <strong>${l.name}</strong><br><small style="color:var(--sub)">${l.id}</small>
                </div>`).join('');
        } catch(e) { console.error(e); }
    }

    function pick(id, name, api) {
        activeId = id;
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        currentApi = api;
        sessionStorage.setItem('lastStation', JSON.stringify({id, name, api: currentApi}));
        loadDeps();
    }

    async function loadDeps() {
        if(!activeId) return;
        const res = document.getElementById('results');
        res.innerHTML = "<div style='padding:20px; opacity:0.6;'>Suche Abfahrten...</div>";
        
        // WICHTIG: Korrektes Zeitformat für die API (Lokalzeit mit Offset verhindern Fehler)
        const dt = document.getElementById('date_inp').value;
        const tm = document.getElementById('time_inp').value;
        const when = `${dt}T${tm}`;

        try {
            const url = `${currentApi}/stops/${encodeURIComponent(activeId)}/departures?duration=60&results=40&when=${encodeURIComponent(when)}&remarks=true`;
            const data = await fetch(url).then(r => r.json());
            const deps = data.departures || data || [];
            res.innerHTML = deps.length ? deps.map(d => renderRow(d)).join('') : "<div style='padding:20px;'>Keine Fahrten.</div>";
        } catch(e) { res.innerHTML = "Fehler beim Laden."; }
    }

    function renderRow(d) {
        const plan = d.plannedWhen;
        const act = d.when || plan;
        const delay = getDelayInfo(plan, d.when);
        
        // Automatisches "NRW-Routing": Busse/Trams sollen VRR nutzen
        const isLocalNRW = ["bus", "tram", "suburban", "subway"].includes(d.line.mode);
        const remarkText = (d.remarks || []).filter(r => r.type === 'warning').map(r => r.text).join(' +++ ');

        return `<div class="row" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${(d.direction || "Ziel").replace(/'/g, "\\'")}', '${currentApi}')">
            <div style="flex:1; padding-right:10px;">
                <div class="line-id">${d.line.name}</div>
                <div style="font-size:16px; font-weight:700;">${d.direction || "Unbekannt"}</div>
                ${remarkText ? `<span class="remarks">${remarkText}</span>` : ''}
            </div>
            <div style="text-align:right; min-width:80px;">
                <div class="t-plan">${fTime(plan)}</div>
                <div class="t-act ${delay.cls}">${fTime(act)} <small>${delay.diff}</small></div>
                <div style="font-size:11px; color:var(--sub); font-weight:bold; margin-top:4px;">${d.platform ? 'GL. ' + d.platform : ''}</div>
            </div>
        </div>`;
    }

    async function loadTrip(tid, line, dest, apiOrigin) {
        if(!tid) return;
        currentTripData = { tid, line, dest, apiOrigin };
        document.getElementById('ov_trip').style.display = 'block';
        document.getElementById('trip_content').innerHTML = "<div style='padding:20px;'>Lade Details...</div>";
        
        try {
            const trip = await fetch(`${apiOrigin}/trips/${encodeURIComponent(tid)}`).then(r => r.json());
            const stops = trip.stopovers || (trip.trip && trip.trip.stopovers) || [];
            renderTripContent(stops);
        } catch(e) { console.error(e); }
    }

    function renderTripContent(stops) {
        document.getElementById('ov_title').innerText = `${currentTripData.line} ➔ ${currentTripData.dest}`;
        document.getElementById('trip_content').innerHTML = stops.map(s => {
            const delayArr = getDelayInfo(s.plannedArrival, s.arrival);
            const delayDep = getDelayInfo(s.plannedDeparture, s.departure);

            return `<div class="stop-row">
                <div class="stop-times">
                    ${s.plannedArrival ? `
                        <span class="t-label">AN</span>
                        <span class="t-plan">${fTime(s.plannedArrival)}</span>
                        <span class="t-act ${delayArr.cls}">${fTime(s.arrival, 'trip')}</span>
                    ` : ''}
                    ${s.plannedDeparture ? `
                        <span class="t-label">AB</span>
                        <span class="t-plan">${fTime(s.plannedDeparture)}</span>
                        <span class="t-act ${delayDep.cls}">${fTime(s.departure, 'trip')}</span>
                    ` : ''}
                </div>
                <div style="font-weight:700; font-size:16px; ${s.cancelled ? 'text-decoration:line-through; opacity:0.5;' : ''}">
                    ${s.stop.name}
                </div>
                <div style="text-align:right;"><span class="plat-tag">${s.platform || '—'}</span></div>
            </div>`;
        }).join('');
    }

    function closeOv() { document.getElementById('ov_trip').style.display = 'none'; }
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }
    function toggleTheme() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
    }
    function restoreSession() {
        const ld = sessionStorage.getItem('lastDate'), lt = sessionStorage.getItem('lastTime'), ls = sessionStorage.getItem('lastStation');
        if(ld) document.getElementById('date_inp').value = ld;
        if(lt) document.getElementById('time_inp').value = lt;
        if(ls) { 
            const s = JSON.parse(ls); 
            activeId = s.id; 
            document.getElementById('inp').value = s.name; 
            currentApi = s.api; 
            setApi(currentApi.includes('vrr') ? 'VRR' : 'DB');
            loadDeps(); 
        }
    }
</script>
</body>
</html>
