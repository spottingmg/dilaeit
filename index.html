<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --sub: #a1a1a6; --border: #3a3a3c; --green: #32d74b; --red: #ff453a; }
        [data-theme="light"] { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --border: #d2d2d7; --green: #008f39; --red: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--db-red); text-transform: lowercase; cursor: pointer; }
        
        .search-area { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 5000; }
        .time-row { display: flex; gap: 8px; }
        .time-row input { flex: 1; padding: 10px; font-size: 14px; }
        .btn-now { background: var(--db-red); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; }

        #dropdown { position: absolute; left: 20px; right: 20px; top: 55px; background: var(--card); border: 1px solid var(--border); z-index: 10000; display: none; border-radius: 10px; max-height: 350px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        input { padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 16px; color: var(--text); width: 100%; box-sizing: border-box; outline: none; }

        .archive-section { padding: 0 20px 20px; }
        .archive-title { font-size: 11px; color: var(--sub); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        .row { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .line-id { color: var(--db-red); font-weight: 800; font-size: 18px; }
        
        .ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .ov-bar { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; position: sticky; top: 0; border-bottom: 1px solid var(--border); align-items: center; }
        
        .stop-row { padding: 12px 20px; position: relative; display: grid; grid-template-columns: 155px 1fr 65px; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .stop-row::before { content: ""; position: absolute; left: 172px; top: 0; bottom: 0; width: 2px; background: var(--border); z-index: 1; }
        .stop-row:first-child::before { top: 50%; }
        .stop-row:last-child::before { bottom: 50%; }

        .stop-times { font-size: 11px; font-variant-numeric: tabular-nums; line-height: 1.6; z-index: 2; }
        .time-group { display: flex; gap: 6px; align-items: center; }
        .t-plan { color: var(--sub); width: 40px; }
        .t-act { min-width: 70px; }
        .t-lbl { color: var(--sub); font-size: 9px; width: 18px; text-transform: uppercase; font-weight: bold; }

        .stop-name-box { position: relative; padding-left: 25px; z-index: 2; min-width: 0; }
        .stop-name-box::before { content: ""; position: absolute; left: -4px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg); border: 2px solid var(--sub); }
        .v-green { color: var(--green) !important; }
        .is-live { font-weight: 900 !important; }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <h1 onclick="location.reload()">dilaeit</h1>
    <span onclick="toggleTheme()" id="themeIcon" style="cursor:pointer;">☀️</span>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div id="dropdown"></div>
    
    <div class="time-row">
        <input type="date" id="date_inp" onchange="updateTimeSession()">
        <input type="time" id="time_inp" onchange="updateTimeSession()">
        <button class="btn-now" onclick="setNow()">Jetzt</button>
    </div>
</div>

<div id="archive_container" class="archive-section" style="display:none;">
    <div class="archive-title">Zuletzt angesehen (48h)</div>
    <div id="archive_list"></div>
</div>

<div id="results"></div>

<div id="ov_trip" class="ov">
    <div class="ov-bar">
        <span id="ov_title" style="font-weight:800; font-size: 14px;"></span>
        <span onclick="closeOv()" style="cursor:pointer; font-size:24px;">✕</span>
    </div>
    <div id="trip_content"></div>
</div>

<script>
    const API_VRR = "https://v6.vrr.transport.rest";
    const API_DB = "https://v6.db.transport.rest";
    let activeId = "", timer, currentApi = API_VRR, tripTimer, currentTripData = null;

    // Initialisierung
    setNow(false); 
    initArchive();
    restoreSession();

    function fTime(date, sec = false) {
        if(!date) return "";
        return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: sec ? '2-digit' : undefined });
    }

    function setNow(refresh = true) {
        const now = new Date();
        document.getElementById('date_inp').value = now.toISOString().split('T')[0];
        document.getElementById('time_inp').value = now.toTimeString().split(' ')[0].substring(0, 5);
        updateTimeSession();
        if(refresh && activeId) loadDeps();
    }

    function updateTimeSession() {
        sessionStorage.setItem('lastDate', document.getElementById('date_inp').value);
        sessionStorage.setItem('lastTime', document.getElementById('time_inp').value);
    }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if (q.length < 3) { dd.style.display = 'none'; return; }
        dd.style.display = 'block';
        const [vrr, db] = await Promise.allSettled([
            fetch(`${API_VRR}/locations?query=${encodeURIComponent(q)}&results=5`).then(r => r.json()),
            fetch(`${API_DB}/locations?query=${encodeURIComponent(q)}&results=5`).then(r => r.json())
        ]);
        let combined = [...(vrr.value || []), ...(db.value || [])];
        dd.innerHTML = combined.map(l => `<div style="padding:12px; border-bottom:1px solid var(--border);" onclick="pick('${l.id}', '${l.name}')">${l.name}</div>`).join('');
    }

    function pick(id, name) {
        activeId = id;
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        currentApi = id.includes('de:') ? API_VRR : API_DB;
        sessionStorage.setItem('lastStation', JSON.stringify({id, name, api: currentApi}));
        loadDeps();
    }

    async function loadDeps() {
        if(!activeId) return;
        const res = document.getElementById('results');
        res.innerHTML = "<div style='padding:20px; opacity:0.6;'>Lade...</div>";
        
        const dt = document.getElementById('date_inp').value;
        const tm = document.getElementById('time_inp').value;
        const dtParam = `&when=${dt}T${tm}:00`;

        try {
            const data = await fetch(`${currentApi}/stops/${encodeURIComponent(activeId)}/departures?duration=60${dtParam}`).then(r => r.json());
            const deps = data.departures || data || [];
            res.innerHTML = deps.map(d => renderRow(d)).join('');
        } catch(e) { res.innerHTML = "Fehler beim Laden."; }
    }

    function renderRow(d) {
        const plan = new Date(d.plannedWhen || d.when);
        const act = d.when ? new Date(d.when) : null;
        const isLive = !!d.when;
        const direction = (!d.direction || d.direction === "null") ? "Ziel unbekannt" : d.direction;
        return `<div class="row" onclick="loadTrip('${d.tripId}', '${d.line.name}', '${direction}', '${currentApi}')">
            <div style="flex:1;">
                <div class="line-id">${d.line.name}</div>
                <div style="font-size:14px; font-weight:600;">${direction}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-size:11px; color:var(--sub)">${fTime(plan)}</div>
                <div class="${isLive ? 'v-green is-live' : ''}">${fTime(act || plan, isLive)}</div>
            </div>
        </div>`;
    }

    async function loadTrip(tid, line, dest, apiOrigin) {
        saveToArchive(tid, line, dest, apiOrigin);
        currentTripData = { tid, line, dest, apiOrigin };
        sessionStorage.setItem('currentTrip', JSON.stringify(currentTripData));
        document.getElementById('ov_trip').style.display = 'block';
        refreshTrip();
        clearInterval(tripTimer);
        tripTimer = setInterval(refreshTrip, 15000);
    }

    async function refreshTrip() {
        if(!currentTripData) return;
        const api = (currentTripData.line.match(/^(RE|RB|S|ICE|IC)/i)) ? API_DB : currentTripData.apiOrigin;
        try {
            const trip = await fetch(`${api}/trips/${encodeURIComponent(currentTripData.tid)}`).then(r => r.json());
            const stops = trip.stopovers || trip.trip.stopovers;
            document.getElementById('ov_title').innerText = `${currentTripData.line} ➔ ${currentTripData.dest}`;
            document.getElementById('trip_content').innerHTML = stops.map(s => {
                const pArr = s.plannedArrival ? new Date(s.plannedArrival) : null;
                const aArr = s.arrival ? new Date(s.arrival) : pArr;
                const isLive = !!s.arrival;
                return `<div class="stop-row">
                    <div class="stop-times">
                        <div class="time-group">
                            <span class="t-lbl">an</span>
                            <span class="t-plan">${fTime(pArr)}</span>
                            <span class="t-act ${isLive ? 'v-green is-live' : ''}">${fTime(aArr, isLive)}</span>
                        </div>
                    </div>
                    <div class="stop-name-box"><div class="stop-name">${s.stop.name}</div></div>
                    <div class="stop-plat">${s.platform || ''}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    function restoreSession() {
        const lastStation = sessionStorage.getItem('lastStation');
        const currentTrip = sessionStorage.getItem('currentTrip');
        const lDate = sessionStorage.getItem('lastDate');
        const lTime = sessionStorage.getItem('lastTime');

        if(lDate) document.getElementById('date_inp').value = lDate;
        if(lTime) document.getElementById('time_inp').value = lTime;

        if(lastStation) {
            const s = JSON.parse(lastStation);
            activeId = s.id;
            document.getElementById('inp').value = s.name;
            currentApi = s.api;
            loadDeps();
        }
        if(currentTrip) {
            const t = JSON.parse(currentTrip);
            loadTrip(t.tid, t.line, t.dest, t.apiOrigin);
        }
    }

    function saveToArchive(tid, line, dest, api) {
        let arch = JSON.parse(localStorage.getItem('dilaeit_arch') || '[]');
        arch = arch.filter(i => i.tid !== tid).unshift({ tid, line, dest, api, ts: Date.now() });
        localStorage.setItem('dilaeit_arch', JSON.stringify(arch.slice(0, 10)));
        renderArchive();
    }

    function initArchive() { renderArchive(); }

    function renderArchive() {
        const arch = JSON.parse(localStorage.getItem('dilaeit_arch') || '[]');
        const container = document.getElementById('archive_container');
        if(arch.length === 0) return;
        container.style.display = 'block';
        document.getElementById('archive_list').innerHTML = arch.map(i => `
            <div class="row" style="padding: 10px 0;" onclick="loadTrip('${i.tid}', '${i.line}', '${i.dest}', '${i.api}')">
                <span style="color:var(--db-red); font-weight:bold; width:50px;">${i.line}</span>
                <span style="flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis;">${i.dest}</span>
            </div>
        `).join('');
    }

    function closeOv() { 
        document.getElementById('ov_trip').style.display = 'none'; 
        clearInterval(tripTimer); 
        sessionStorage.removeItem('currentTrip'); 
    }
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }
    function toggleTheme() {
        const b = document.body;
        const next = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', next);
    }
</script>
</body>
</html>
