<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit | V8 PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --db-red: #c50014; --bg: #000000; --card: #1c1c1e; --text: #ffffff; 
            --sub: #8e8e93; --border: #2c2c2e; --green: #30d158; --red: #ff453a; --orange: #ff9f0a;
        }
        @media (prefers-color-scheme: light) {
            :root { --bg: #f2f2f7; --card: #ffffff; --text: #000000; --sub: #8e8e93; --border: #e5e5ea; }
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--db-red); font-weight: 900; margin: 0; font-size: 26px; }

        .search-area { display: flex; gap: 8px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; outline: none; }
        .search-btn { background: var(--db-red); border: none; padding: 0 20px; border-radius: 12px; color: white; cursor: pointer; font-size: 18px; }

        .dt-picker { display: flex; gap: 5px; margin-bottom: 15px; }
        .dt-picker input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; font-size: 12px; flex: 1; }

        #dropdown { background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: none; margin-bottom: 15px; max-height: 250px; overflow-y: auto; }
        .dd-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }

        .row { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
        .cancelled { opacity: 0.4; border-left: 4px solid var(--red); }
        .line-info { display: flex; flex-direction: column; gap: 5px; max-width: 65%; }
        .line-badge { background: var(--db-red); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 13px; width: fit-content; }
        .direction { font-weight: 700; font-size: 16px; margin-top: 4px; }
        .platform { font-size: 12px; color: var(--orange); font-weight: 600; }
        .reason { font-size: 11px; color: var(--orange); margin-top: 5px; line-height: 1.3; }

        .time-area { text-align: right; min-width: 100px; }
        .plan-time { font-size: 11px; color: var(--sub); }
        .real-time { font-size: 20px; font-variant-numeric: tabular-nums; margin-bottom: 2px; }
        .sec-bold { font-weight: 900; }
        .sec-thin { font-weight: 300; opacity: 0.5; font-size: 15px; }
        .delay-info { font-size: 12px; font-weight: 800; }

        #ov { display:none; position:fixed; inset:0; background:var(--bg); z-index:9999; padding:20px; overflow-y:auto; }
        .stop-row { display: flex; justify-content: space-between; padding: 12px 0; border-left: 2px solid var(--border); padding-left: 15px; position: relative; }
        .stop-row::after { content: ''; position: absolute; left: -6px; top: 18px; width: 10px; height: 10px; background: var(--border); border-radius: 50%; }
        .add-stop { color: var(--orange); font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>dilaeit</h1>
    <div class="dt-picker">
        <input type="date" id="sel_date">
        <input type="time" id="sel_time">
    </div>
</div>

<div class="search-area">
    <input type="text" id="inp" placeholder="Haltestelle suchen..." onkeypress="if(event.key==='Enter') startSearch()">
    <button class="search-btn" onclick="startSearch()">🔍</button>
</div>

<div id="dropdown"></div>
<div id="results"></div>

<div id="ov">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="ov-title" style="margin:0;"></h2>
        <button onclick="closeOv()" style="padding:10px 20px; border-radius:10px; border:none; background:var(--border); color:var(--text);">Schließen</button>
    </div>
    <div id="ov-content"></div>
</div>

<script>
    const PROXY = "https://api.allorigins.win/get?url=";
    const API = "https://v6.vrr.transport.rest";

    // Init Datum/Zeit
    const now = new Date();
    document.getElementById('sel_date').value = now.toISOString().split('T')[0];
    document.getElementById('sel_time').value = now.toTimeString().slice(0,5);

    async function fetchVRR(path) {
        const response = await fetch(PROXY + encodeURIComponent(API + path));
        if (!response.ok) throw new Error("Limit");
        const json = await response.json();
        return JSON.parse(json.contents);
    }

    function formatTimeHTML(iso, planned) {
        const d = iso ? new Date(iso) : new Date(planned);
        const h = d.getHours().toString().padStart(2, '0');
        const m = d.getMinutes().toString().padStart(2, '0');
        const s = d.getSeconds().toString().padStart(2, '0');
        
        // Wenn Echtzeit-Daten (iso) da sind, Sekunden fett anzeigen
        const secClass = iso ? 'sec-bold' : 'sec-thin';
        return `${h}:${m}<span class="${secClass}">:${s}</span>`;
    }

    async function startSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if(q.length < 2) return;
        
        dd.style.display = 'block';
        dd.innerHTML = '<div class="dd-item">Suchen...</div>';
        
        try {
            const data = await fetchVRR(`/locations?query=${q}&results=5`);
            dd.innerHTML = data.map(s => `<div class="dd-item" onclick="pick('${s.id}','${s.name}')">🚉 ${s.name}</div>`).join('');
        } catch(e) { dd.innerHTML = '<div class="dd-item" style="color:var(--red)">Limit erreicht. Bitte 30 Sek. warten.</div>'; }
    }

    function pick(id, name) {
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadBoard(id);
    }

    async function loadBoard(id) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<div style='text-align:center; padding:50px;'>Lade Echtzeitdaten...</div>";
        
        const date = document.getElementById('sel_date').value;
        const time = document.getElementById('sel_time').value;
        
        try {
            const data = await fetchVRR(`/stops/${id}/departures?when=${date}T${time}:00&duration=60&remarks=true`);
            const deps = data.departures || data;
            
            resDiv.innerHTML = deps.map(d => {
                const delay = d.delay !== null ? Math.round(d.delay / 60) : 0;
                const isCancelled = d.cancelled;
                const platform = d.platform || d.plannedPlatform;
                
                return `
                    <div class="row ${isCancelled ? 'cancelled' : ''}" onclick="openTrip('${d.tripId}','${d.line.name}','${d.direction}')">
                        <div class="line-info">
                            <span class="line-badge">${d.line.name}</span>
                            <div class="direction">${d.direction}</div>
                            ${platform ? `<div class="platform">Gleis ${platform}</div>` : ''}
                            ${d.remarks?.filter(r => r.type === 'warning').map(r => `<div class="reason">⚠️ ${r.text}</div>`).join('')}
                        </div>
                        <div class="time-area">
                            <div class="plan-time">Plan: ${new Date(d.plannedWhen).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                            <div class="real-time" style="color:${delay > 0 ? 'var(--red)' : 'var(--green)'}">
                                ${formatTimeHTML(d.when, d.plannedWhen)}
                            </div>
                            <div class="delay-info" style="color:${delay > 0 ? 'var(--red)' : 'var(--green)'}">
                                ${delay > 0 ? '+' + delay : (delay < 0 ? delay : 'pünktlich')}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { resDiv.innerHTML = "<div style='color:var(--red); text-align:center;'>Proxy-Fehler. Versuche es gleich nochmal.</div>"; }
    }

    async function openTrip(tripId, line, dir) {
        const ov = document.getElementById('ov');
        ov.style.display = 'block';
        document.getElementById('ov-title').innerText = line + " → " + dir;
        document.getElementById('ov-content').innerHTML = "Lade Fahrplan...";
        
        try {
            const data = await fetchVRR(`/trips/${tripId}`);
            document.getElementById('ov-content').innerHTML = data.trip.stopovers.map(s => {
                const time = s.departure || s.arrival || s.plannedDeparture || s.plannedArrival;
                const plan = s.plannedDeparture || s.plannedArrival;
                const isCancelled = s.cancelled;
                
                return `
                    <div class="stop-row" style="${isCancelled ? 'text-decoration:line-through; opacity:0.5;' : ''}">
                        <div>
                            <b style="font-size:15px;">${s.stop.name}</b>
                            <div style="font-size:10px; color:var(--sub)">${s.platform ? 'Gleis ' + s.platform : ''}</div>
                            ${s.additional ? '<div class="add-stop">Zusatzhalt</div>' : ''}
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:14px; font-weight:bold;">${formatTimeHTML(time, plan)}</div>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { document.getElementById('ov-content').innerHTML = "Fahrtverlauf aktuell nicht verfügbar."; }
    }

    function closeOv() { document.getElementById('ov').style.display = 'none'; }
</script>
</body>
</html>
