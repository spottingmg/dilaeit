<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dilaeit | V6 Ultra Realtime</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --db-red: #c50014; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #8e8e93; --border: #2c2c2e; --green: #30d158; --red: #ff453a; --orange: #ff9f0a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; -webkit-font-smoothing: antialiased; }
        h1 { color: var(--db-red); font-weight: 900; margin: 0; text-transform: lowercase; font-size: 28px; }
        
        /* Eingabefelder */
        .input-container { position: relative; margin-bottom: 15px; }
        input { padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 17px; width: 100%; box-sizing: border-box; outline: none; }
        
        /* Dropdown Fix */
        #dropdown { position: absolute; top: 60px; left: 0; right: 0; background: #2c2c2e; border-radius: 14px; z-index: 2000; display: none; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        .dd-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; color: white; }
        .dd-item:last-child { border: none; }

        /* Ergebnis-Zeilen */
        .row { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .line-badge { background: var(--db-red); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 13px; }
        .time-box { text-align: right; min-width: 115px; font-variant-numeric: tabular-nums; }
        .plan { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
        .actual { font-size: 19px; }
        
        /* Sekunden-Logik */
        .sec-thin { opacity: 0.4; font-weight: 300; font-size: 15px; }
        .sec-bold { opacity: 1; font-weight: 900; font-size: 17px; color: inherit; }
        
        .v-green { color: var(--green); }
        .v-red { color: var(--red); }
        .platform { font-size: 11px; font-weight: 900; background: var(--border); color: #fff; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        
        /* Overlay */
        #ov { display:none; position:fixed; inset:0; background:var(--bg); z-index:3000; padding:20px; overflow-y:auto; }
        .stop-row { display: grid; grid-template-columns: 120px 1fr; gap: 15px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .passed { opacity: 0.3; }
    </style>
</head>
<body>

<div class="header" style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
    <h1>dilaeit</h1>
    <div style="font-size: 10px; color: var(--sub); font-weight: 700;">V6 ULTRA REALTIME</div>
</div>

<div class="input-container">
    <input type="text" id="inp" placeholder="Station suchen..." oninput="debounceSearch()" autocomplete="off">
    <div id="dropdown"></div>
    <div style="display: flex; gap: 8px; margin-top:8px;">
        <input type="date" id="sel_date" style="flex:1.5; font-size: 14px; padding: 12px;">
        <input type="time" id="sel_time" style="flex:1; font-size: 14px; padding: 12px;">
    </div>
</div>

<div id="results"></div>

<div id="ov">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="ov-title" style="margin:0; font-size: 20px;"></h2>
        <span onclick="closeOv()" style="font-size:40px; cursor:pointer; line-height:1;">&times;</span>
    </div>
    <div id="ov-content"></div>
</div>

<script>
    const API = "https://v6.vrr.transport.rest";
    let timer;

    // Zeit-Setup Initialisierung
    const now = new Date();
    document.getElementById('sel_date').value = now.toISOString().split('T')[0];
    document.getElementById('sel_time').value = now.toTimeString().slice(0,5);

    function formatTimeHTML(date, isRealtime) {
        const h = date.getHours().toString().padStart(2, '0');
        const m = date.getMinutes().toString().padStart(2, '0');
        const s = date.getSeconds().toString().padStart(2, '0');
        const secClass = isRealtime ? 'sec-bold' : 'sec-thin';
        return `${h}:${m}<span class="${secClass}">:${s}</span>`;
    }

    function debounceSearch() { clearTimeout(timer); timer = setTimeout(doSearch, 400); }

    async function doSearch() {
        const q = document.getElementById('inp').value.trim();
        const dd = document.getElementById('dropdown');
        if(q.length < 2) { dd.style.display = 'none'; return; }
        
        try {
            const res = await fetch(`${API}/locations?query=${encodeURIComponent(q)}&results=10`);
            const data = await res.json();
            if(data.length > 0) {
                dd.style.display = 'block';
                dd.innerHTML = data.filter(s => s.type === 'stop' || s.type === 'station')
                    .map(s => `<div class="dd-item" onclick="pick('${s.id}', '${s.name}')">🚉 ${s.name}</div>`).join('');
            }
        } catch(e) { console.error("Search Error"); }
    }

    function pick(id, name) {
        document.getElementById('inp').value = name;
        document.getElementById('dropdown').style.display = 'none';
        loadBoard(id);
    }

    async function loadBoard(id) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<div style='padding:40px; text-align:center; opacity:0.5;'>Lade...</div>";
        
        const d = document.getElementById('sel_date').value;
        const t = document.getElementById('sel_time').value;
        const iso = new Date(`${d}T${t}`).toISOString();

        try {
            const res = await fetch(`${API}/stops/${encodeURIComponent(id)}/departures?when=${iso}&duration=60`);
            const data = await res.json();
            const deps = data.departures || data;

            resDiv.innerHTML = deps.map(d => {
                const plan = new Date(d.plannedWhen);
                const act = new Date(d.when || d.plannedWhen);
                const delay = d.delay !== null ? Math.round(d.delay / 60) : 0;
                const colorClass = delay >= 1 ? 'v-red' : 'v-green';
                const isRealtime = d.when !== null;

                return `
                    <div class="row" onclick="openTrip('${d.tripId}', '${d.line?.name}', '${d.direction}')">
                        <div>
                            <span class="line-badge">${d.line?.name || '???'}</span>
                            <div style="font-weight:700; margin-top:8px;">${d.direction}</div>
                        </div>
                        <div class="time-box">
                            <div class="plan">Plan: ${plan.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                            <div class="actual ${colorClass}">
                                ${formatTimeHTML(act, isRealtime)}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { resDiv.innerHTML = "Fehler beim Laden."; }
    }

    async function openTrip(tripId, lineName, direction) {
        if(!tripId) return;
        const ov = document.getElementById('ov');
        ov.style.display = 'block';
        document.getElementById('ov-title').innerText = lineName + " → " + direction;
        document.getElementById('ov-content').innerHTML = "Lade Verlauf...";

        try {
            const res = await fetch(`${API}/trips/${encodeURIComponent(tripId)}`);
            const data = await res.json();
            const nowTime = new Date();

            document.getElementById('ov-content').innerHTML = data.trip.stopovers.map(s => {
                const pTime = new Date(s.plannedDeparture || s.plannedArrival);
                const aTime = new Date(s.departure || s.arrival || pTime);
                const delay = s.departureDelay !== undefined ? Math.round(s.departureDelay / 60) : 0;
                const isRealtime = (s.departure !== null && s.departure !== undefined);
                const isPassed = aTime < nowTime;

                return `
                    <div class="stop-row ${isPassed ? 'passed' : ''}">
                        <div class="time-box" style="text-align:left;">
                            <div class="actual ${delay >= 1 ? 'v-red' : 'v-green'}" style="font-size:16px;">
                                ${formatTimeHTML(aTime, isRealtime)}
                            </div>
                            <div class="plan">Plan: ${pTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                        <div>
                            <div style="font-weight:700;">${s.stop.name}</div>
                            ${s.plannedPlatform ? `<span class="platform">${s.plannedPlatform}</span>` : ''}
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { document.getElementById('ov-content').innerHTML = "Fehler im Verlauf."; }
    }

    function closeOv() { document.getElementById('ov').style.display = 'none'; }
</script>
</body>
</html>
